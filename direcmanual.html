<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Directorio de Manuales — The Mendoza Law Firm</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#1C2340;--gold:#C9A84C;--gold-light:#E8D4A0;--cream:#F5F0E8;
  --white:#FFFFFF;--muted:#8A91A8;--border:#D8DCE8;--row-hover:#F0EDE6;
  --act-bg:#EAF3FF;--act-txt:#1A4A7A;--build-bg:#FDF3E3;--build-txt:#7A4A00;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh;color:var(--navy);padding:28px 20px 48px;}
.container{max-width:1100px;margin:0 auto;}

.header{background:var(--navy);border-radius:10px 10px 0 0;padding:20px 28px;display:flex;align-items:center;gap:18px;border-bottom:2px solid var(--gold);}
.header-title{font-family:'Cormorant Garamond',serif;color:var(--white);font-size:20px;font-weight:600;letter-spacing:0.03em;}
.header-sub{color:var(--gold-light);font-size:11px;letter-spacing:0.1em;text-transform:uppercase;margin-top:3px;}

.stats{display:flex;background:var(--white);border:1px solid var(--border);border-top:none;}
.stat{flex:1;padding:14px 16px;text-align:center;border-right:1px solid var(--border);}
.stat:last-child{border-right:none;}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--navy);line-height:1;}
.stat-l{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:4px;}

.controls{padding:10px 14px;border:1px solid var(--border);border-top:none;background:#FAFAF7;display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.search-bar{flex:1;min-width:180px;padding:8px 12px;font-size:13px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:5px;background:var(--white);color:var(--navy);outline:none;transition:border-color .2s,box-shadow .2s;}
.search-bar:focus{border-color:var(--gold);box-shadow:0 0 0 2px rgba(201,168,76,.15);}
.search-bar::placeholder{color:var(--muted);}
.status-btn{padding:7px 13px;font-size:12px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:5px;background:var(--white);color:#4A5568;cursor:pointer;white-space:nowrap;transition:all .15s;}
.status-btn.active{background:var(--navy);color:var(--white);border-color:var(--navy);}
.status-btn:not(.active):hover{background:#EEF0F6;border-color:#aaa;}

.area-row{padding:10px 14px;border:1px solid var(--border);border-top:none;background:#F7F4EE;display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.area-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-right:4px;white-space:nowrap;}
.area-btn{padding:6px 14px;font-size:11px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:20px;background:var(--white);color:#4A5568;cursor:pointer;white-space:nowrap;transition:all .15s;}
.area-btn.active{background:var(--gold);color:var(--navy);border-color:var(--gold);font-weight:500;}
.area-btn:not(.active):hover{background:#EDE8DC;border-color:#bbb;}

.table-wrap{border:1px solid var(--border);border-top:none;background:var(--white);overflow:hidden;}
table{width:100%;border-collapse:collapse;}
thead tr{background:#F0EDE6;}
th{font-size:10px;font-weight:500;color:var(--muted);text-align:left;padding:10px 12px;text-transform:uppercase;letter-spacing:0.07em;border-bottom:1px solid var(--border);font-family:'DM Sans',sans-serif;}
td{padding:10px 12px;border-bottom:1px solid #EEEAE2;vertical-align:middle;font-size:13px;}
tr:last-child td{border-bottom:none;}
tbody tr{transition:background .12s;}
tbody tr:hover td{background:var(--row-hover);}
.num-cell{color:var(--muted);font-size:11px;width:34px;}
.area-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;background:#EEEAE2;color:#4A4030;font-weight:500;white-space:nowrap;}
.status-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:3px;font-weight:500;white-space:nowrap;}
.s-act{background:var(--act-bg);color:var(--act-txt);}
.s-build{background:var(--build-bg);color:var(--build-txt);}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-act{background:var(--act-txt);}
.dot-build{background:var(--build-txt);}
.resp-cell,.date-cell{font-size:12px;color:#5A6272;}
.open-btn{font-size:11px;color:#2B5DA8;text-decoration:none;padding:4px 10px;border:1px solid #C0CFEA;border-radius:4px;white-space:nowrap;background:var(--white);transition:all .15s;font-family:'DM Sans',sans-serif;}
.open-btn:hover{background:#EBF2FA;border-color:#2B5DA8;}
.no-link{font-size:11px;color:var(--muted);}

.empty-state{text-align:center;padding:4rem 2rem;}
.empty-icon{font-size:32px;margin-bottom:12px;opacity:.4;}
.empty-title{font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--navy);margin-bottom:6px;}
.empty-sub{font-size:12px;color:var(--muted);}

.pager{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border:1px solid var(--border);border-top:none;border-radius:0 0 10px 10px;background:#FAFAF7;}
.pager-info{font-size:11px;color:var(--muted);}
.pager-btns{display:flex;gap:6px;}
.pg-btn{padding:5px 14px;font-size:12px;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:4px;background:var(--white);color:#4A5568;cursor:pointer;transition:all .15s;}
.pg-btn:disabled{opacity:.3;cursor:default;}
.pg-btn:not(:disabled):hover{background:#EEF0F6;color:var(--navy);}

/* ── AREA BREAKDOWN MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,35,64,.45);backdrop-filter:blur(3px);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--white);border-radius:10px;width:min(560px,92vw);max-height:85vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{background:var(--navy);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:2px solid var(--gold);}
.modal-title{font-family:'Cormorant Garamond',serif;color:var(--white);font-size:17px;font-weight:600;letter-spacing:0.03em;}
.modal-close{background:none;border:none;color:var(--gold-light);font-size:20px;cursor:pointer;line-height:1;padding:2px 6px;border-radius:3px;transition:background .15s;}
.modal-close:hover{background:rgba(255,255,255,.12);}
.modal-body{padding:20px;overflow-y:auto;}
.area-row-stat{display:flex;align-items:center;gap:10px;margin-bottom:13px;}
.area-row-stat:last-child{margin-bottom:0;}
.area-name{font-size:12px;font-weight:500;color:var(--navy);width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.area-bar-wrap{flex:1;background:#EEF0F6;border-radius:20px;height:8px;overflow:hidden;}
.area-bar{height:100%;border-radius:20px;background:var(--gold);transition:width .4s ease;}
.area-count{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:var(--navy);width:28px;text-align:right;flex-shrink:0;}
.modal-total{margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.modal-total-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;}
.modal-total-n{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;color:var(--navy);}
.breakdown-btn{padding:7px 13px;font-size:12px;font-family:'DM Sans',sans-serif;border:1px solid var(--gold);border-radius:5px;background:var(--white);color:var(--navy);cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:5px;}
.breakdown-btn:hover{background:var(--gold);color:var(--navy);}
</style>
</head>

const PAGE_SIZE=15;
let currentPage=1, statusFilter=null, areaFilter=null;

// 30–80% → En actualización | <30% → En construcción
function statusOf(p){ return (p>=30&&p<=80)?'act':'build'; }
function statusBadge(p){
  return statusOf(p)==='act'
    ?`<span class="status-badge s-act"><span class="dot dot-act"></span>En actualización</span>`
    :`<span class="status-badge s-build"><span class="dot dot-build"></span>En construcción</span>`;
}

function hasFilter(){ return statusFilter!==null||areaFilter!==null||document.getElementById('search').value.trim()!==''; }

function filtered(){
  if(!hasFilter()) return [];
  const q=document.getElementById('search').value.toLowerCase();
  return all.filter(it=>{
    const mq=!q||it.name.toLowerCase().includes(q)||(it.resp&&it.resp.toLowerCase().includes(q));
    const ms=statusFilter===null||statusOf(it.pct)===statusFilter;
    const ma=areaFilter===null||it.area===areaFilter;
    return mq&&ms&&ma;
  });
}

function setStatus(f){
  statusFilter=(statusFilter===f)?null:f;
  ['act','build'].forEach(x=>document.getElementById('sf-'+x).classList.toggle('active',x===statusFilter));
  goPage(1);
}

function setArea(a){
  areaFilter=(areaFilter===a)?null:a;
  ['Orgánico','Psychology','Case Review','People','RFE','CS','TI','Admin','Other','Back Office']
    .forEach(x=>document.getElementById('af-'+x).classList.toggle('active',x===areaFilter));
  goPage(1);
}

function openModal(){
  // Count per area
  const areaOrder=['Orgánico','Packet Plus','Psychology','Case Review','People','RFE','CS','TI','Admin','Other','Back Office'];
  const counts={};
  all.forEach(it=>{ counts[it.area]=(counts[it.area]||0)+1; });
  const max=Math.max(...Object.values(counts));

  const rows=areaOrder.filter(a=>counts[a]).map(a=>`
    <div class="area-row-stat">
      <span class="area-name">${a}</span>
      <div class="area-bar-wrap"><div class="area-bar" style="width:${Math.round(counts[a]/max*100)}%"></div></div>
      <span class="area-count">${counts[a]}</span>
    </div>`).join('');

  document.getElementById('modal-body').innerHTML=`
    ${rows}
    <div class="modal-total">
      <span class="modal-total-label">Total manuales</span>
      <span class="modal-total-n">${all.length}</span>
    </div>`;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); }
function closeModalOutside(e){ if(e.target===document.getElementById('modal-overlay')) closeModal(); }

function onSearch(){ goPage(1); }

function goPage(p){
  const items=filtered();
  const idle=!hasFilter();
  const total=items.length;
  const pages=Math.max(1,Math.ceil(total/PAGE_SIZE));
  currentPage=Math.min(Math.max(1,p),pages);
  const slice=items.slice((currentPage-1)*PAGE_SIZE,currentPage*PAGE_SIZE);

  document.getElementById('tbody').innerHTML=idle
    ?`<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">📂</div><div class="empty-title">Selecciona un área o filtro</div><div class="empty-sub">Usa los botones de arriba para explorar los manuales.</div></div></td></tr>`
    :total===0
      ?`<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-title">Sin resultados</div><div class="empty-sub">Intenta con otros filtros.</div></div></td></tr>`
      :slice.map((it,i)=>`
        <tr>
          <td class="num-cell">${(currentPage-1)*PAGE_SIZE+i+1}</td>
          <td>${it.name}</td>
          <td><span class="area-badge">${it.area}</span></td>
          <td>${statusBadge(it.pct)}</td>
          <td class="resp-cell">${it.resp||'—'}</td>
          <td class="date-cell">${it.desde||'—'}</td>
          <td>${it.url?`<a class="open-btn" href="${it.url}" target="_blank">Abrir →</a>`:`<span class="no-link">—</span>`}</td>
        </tr>`).join('');

  document.getElementById('pager-info').textContent=(!idle&&total>0)
    ?`Mostrando ${(currentPage-1)*PAGE_SIZE+1}–${Math.min(currentPage*PAGE_SIZE,total)} de ${total}`:'';
  document.getElementById('btn-prev').disabled=idle||currentPage===1;
  document.getElementById('btn-next').disabled=idle||currentPage===pages||total===0;

  const tAct  =all.filter(i=>statusOf(i.pct)==='act').length;
  const tBuild=all.filter(i=>statusOf(i.pct)==='build').length;
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-n">${all.length}</div><div class="stat-l">Total manuales</div></div>
    <div class="stat"><div class="stat-n">${tAct}</div><div class="stat-l">En actualización</div></div>
    <div class="stat"><div class="stat-n">${tBuild}</div><div class="stat-l">En construcción</div></div>`;
}

goPage(1);
