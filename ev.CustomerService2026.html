<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificación Operativa CS — The Mendoza Law Firm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f1f3a;
  --navy-2:#173159;
  --navy-3:#21477c;
  --gold:#c9a227;
  --gold-light:#e8cd6c;
  --cream:#f7f2e6;
  --cream-deep:#eee4cd;
  --paper:#fffdf8;
  --ink:#1c1c1c;
  --ink-soft:#5b5b56;
  --line:rgba(16,32,60,.14);
  --ok:#2f7d4f;
  --ok-bg:#e7f1ea;
  --warn:#b3402a;
  --warn-bg:#f7e9e4;
  --mid:#a3791f;
  --mid-bg:#f6efdc;
  --radius:10px;
  --shadow:0 10px 30px -12px rgba(15,31,58,.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:600;margin:0;color:var(--navy);}
.eyebrow{
  font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;
  letter-spacing:.18em;
  font-size:.72rem;
  font-weight:600;
  color:var(--gold);
}
.eyebrow.dark{color:var(--navy-3);}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}
a{color:var(--navy-3);}

/* ===================== LAYOUT ===================== */
#app{min-height:100vh;}
.app-shell{display:flex;min-height:100vh;}
.sidebar{
  width:308px;flex:0 0 308px;
  background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
  color:#eef2f8;padding:28px 22px;display:flex;flex-direction:column;gap:22px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.main{flex:1;min-width:0;padding:36px 48px 80px;}
.brandmark{display:flex;align-items:center;gap:12px;}
.brandmark .seal{
  width:42px;height:42px;border:2px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--gold);font-size:1.1rem;
  flex:none;
}
.brandmark .tt{font-family:'Barlow Condensed',sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:.68rem;color:#b9c4d8;}
.brandmark .tt strong{display:block;font-size:.92rem;letter-spacing:.06em;color:#fff;font-weight:600;font-family:'DM Sans',sans-serif;margin-top:2px;}

/* Credential card */
.credential{
  background:linear-gradient(160deg,#13284a, #0c1830);
  border:1px solid rgba(201,162,39,.35);
  border-radius:var(--radius);
  padding:16px 16px 14px;
  position:relative;overflow:hidden;
}
.credential::before{
  content:"";position:absolute;top:-30px;right:-30px;width:110px;height:110px;
  background:radial-gradient(circle, rgba(201,162,39,.25), transparent 70%);
}
.credential .ribbon{
  position:absolute;top:10px;right:-26px;background:var(--gold);color:var(--navy);
  font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;padding:3px 30px;transform:rotate(35deg);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.credential .row{display:flex;gap:12px;align-items:flex-start;}
.cred-avatar{
  width:46px;height:46px;border-radius:8px;background:rgba(201,162,39,.16);
  border:1px solid rgba(201,162,39,.4);display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--gold-light);font-size:1.25rem;flex:none;
}
.cred-name{font-family:'Cormorant Garamond',serif;font-size:1.18rem;color:#fff;font-weight:600;line-height:1.15;}
.cred-meta{font-size:.72rem;color:#aab8cf;margin-top:2px;}
.cred-fields{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;font-size:.74rem;color:#cfd8e8;border-top:1px dashed rgba(201,162,39,.3);padding-top:10px;}
.cred-fields b{display:block;font-family:'Barlow Condensed',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.6rem;color:#8ea0bf;font-weight:600;margin-bottom:1px;}
.cred-fields span{color:#f1f4fa;font-weight:500;}
.folio{margin-top:10px;font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:#7e90ad;}

/* Progress overall */
.progress-block .pb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.progress-block .pb-top .pct{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gold-light);}
.bar{height:6px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:6px;transition:width .35s ease;}
.timer-row{display:flex;align-items:center;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;font-size:.78rem;color:#cfd8e8;margin-top:4px;}
.timer-row .tval{font-size:1.05rem;color:#fff;font-weight:600;}
.toggle{
  width:34px;height:18px;border-radius:10px;background:rgba(255,255,255,.14);position:relative;border:none;flex:none;
}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s ease;}
.toggle.on{background:var(--gold);}
.toggle.on::after{left:18px;}

/* Section nav */
.section-nav{display:flex;flex-direction:column;gap:3px;flex:1;}
.sn-title{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.18em;font-size:.66rem;color:#8ea0bf;margin:4px 0 6px 4px;}
.sn-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
  background:transparent;border:1px solid transparent;color:#c4cee2;text-align:left;width:100%;
  font-size:.84rem;transition:background .15s ease;
}
.sn-item:hover{background:rgba(255,255,255,.05);}
.sn-item.active{background:rgba(201,162,39,.14);border-color:rgba(201,162,39,.35);color:#fff;}
.sn-num{
  width:24px;height:24px;border-radius:50%;border:1.5px solid #50658a;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:.74rem;font-weight:700;flex:none;color:#aab8cf;
}
.sn-item.active .sn-num{border-color:var(--gold);color:var(--gold-light);}
.sn-item.done .sn-num{background:var(--gold);border-color:var(--gold);color:var(--navy);}
.sn-item.done .sn-num::after{content:"✓";}
.sn-text{flex:1;}
.sn-text .sn-name{display:block;font-weight:500;}
.sn-text .sn-count{display:block;font-size:.66rem;color:#7e90ad;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;}

.sidebar-foot{font-family:'Barlow Condensed',sans-serif;font-size:.64rem;letter-spacing:.1em;color:#6f82a3;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.08);padding-top:12px;}

/* ===================== REGISTRATION ===================== */
.reg-screen{
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 20px;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,39,.10), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(33,71,124,.18), transparent 45%),
    var(--navy);
}
.reg-card{
  max-width:560px;width:100%;background:var(--paper);border-radius:14px;padding:42px 44px 38px;
  box-shadow:var(--shadow);position:relative;border:1px solid var(--line);
}
.reg-card::before{
  content:"";position:absolute;inset:14px;border:1px solid rgba(201,162,39,.35);border-radius:8px;pointer-events:none;
}
.reg-head{text-align:center;margin-bottom:26px;}
.reg-head .seal-lg{
  width:64px;height:64px;margin:0 auto 14px;border:2px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;
  color:var(--gold);font-size:1.6rem;
}
.reg-head h1{font-size:1.9rem;margin-bottom:4px;}
.reg-head p{color:var(--ink-soft);font-size:.92rem;max-width:420px;margin:8px auto 0;}
.reg-form{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:22px;}
.reg-form .full{grid-column:1/-1;}
.field label{
  display:block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.12em;
  font-size:.68rem;font-weight:600;color:var(--navy-3);margin-bottom:6px;
}
.field input{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:.92rem;
  font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);
}
.field input:focus{outline:none;border-color:var(--gold);background:#fff;}
.reg-note{
  margin-top:20px;font-size:.78rem;color:var(--ink-soft);background:var(--cream);border-radius:8px;padding:12px 14px;
  border-left:3px solid var(--gold);
}
.btn{
  border:none;border-radius:8px;padding:13px 26px;font-weight:600;font-size:.92rem;
  display:inline-flex;align-items:center;gap:8px;justify-content:center;transition:transform .1s ease, box-shadow .1s ease;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover:not(:disabled){background:var(--navy-3);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-light);}
.btn-ghost{background:transparent;color:var(--navy);border:1px solid var(--line);}
.btn-ghost:hover{border-color:var(--navy-3);}
.btn-block{width:100%;margin-top:24px;justify-content:center;}
.err-msg{color:var(--warn);font-size:.74rem;margin-top:14px;text-align:center;min-height:1em;}

/* ===================== MAIN CONTENT ===================== */
.section-head{margin-bottom:22px;}
.section-head .eyebrow{margin-bottom:6px;}
.section-head h2{font-size:1.95rem;margin-bottom:6px;}
.section-head .desc{color:var(--ink-soft);font-size:.93rem;max-width:780px;}
.q-meter{
  display:flex;align-items:center;justify-content:space-between;margin:18px 0 22px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;font-size:.78rem;color:var(--ink-soft);
  text-transform:uppercase;
}
.q-meter .bar{flex:1;margin:0 16px;background:var(--cream-deep);}
.q-meter .bar>i{background:linear-gradient(90deg,var(--navy-3),var(--gold));}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:28px 30px;box-shadow:var(--shadow);
}
.case-brief{
  background:var(--cream-deep);border-radius:var(--radius);padding:20px 22px;margin-bottom:20px;
  border-left:4px solid var(--navy-3);
}
.case-brief h4{font-size:1.15rem;margin-bottom:8px;}
.case-brief .tag{
  display:inline-block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;
  font-size:.62rem;font-weight:700;background:var(--navy);color:var(--gold-light);padding:3px 9px;border-radius:4px;margin-bottom:8px;
}
.case-brief p{font-size:.9rem;margin:6px 0;}
.case-brief .label{font-weight:700;color:var(--navy);}

.q-prompt{font-size:1.08rem;margin-bottom:18px;line-height:1.6;}
.q-prompt .scenario{display:block;color:var(--ink-soft);font-size:.92rem;margin-bottom:10px;font-style:italic;}

.options{display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--line);border-radius:8px;
  cursor:pointer;background:var(--cream);transition:all .12s ease;
}
.opt:hover{border-color:var(--navy-3);background:#fff;}
.opt.selected{border-color:var(--gold);background:var(--cream-deep);box-shadow:0 0 0 1px var(--gold) inset;}
.opt .opt-letter{
  flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--navy-3);color:var(--navy-3);
  display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;
}
.opt.selected .opt-letter{background:var(--gold);border-color:var(--gold);color:var(--navy);}
.opt .opt-text{font-size:.92rem;padding-top:2px;}

/* note builder fields */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.field-grid .full{grid-column:1/-1;}
.fb-field label{
  display:block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;
  font-size:.68rem;font-weight:700;color:var(--navy-3);margin-bottom:6px;
}
.fb-field select{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--cream);
  font-family:'DM Sans',sans-serif;font-size:.86rem;color:var(--ink);
}
.fb-field select:focus{outline:none;border-color:var(--gold);}

/* order4 */
.order-list{display:flex;flex-direction:column;gap:10px;}
.order-row{display:flex;align-items:center;gap:14px;padding:12px 14px;border:1px solid var(--line);border-radius:8px;background:var(--cream);}
.order-row select{
  width:64px;flex:none;padding:8px;border:1px solid var(--line);border-radius:6px;background:#fff;font-weight:700;
  font-family:'Barlow Condensed',sans-serif;text-align:center;color:var(--navy);
}
.order-row .order-text{font-size:.9rem;}
.order-cats{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 16px;}
.order-cats span{
  font-family:'Barlow Condensed',sans-serif;font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;
  background:var(--navy);color:var(--gold-light);padding:4px 10px;border-radius:4px;
}

/* nav buttons */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:26px;}
.nav-row .right{display:flex;gap:10px;}

/* intro / overview */
.intro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:24px;}
.intro-card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;
  display:flex;gap:14px;align-items:flex-start;
}
.intro-card .num{
  font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--gold);flex:none;width:40px;
}
.intro-card h4{font-size:1.05rem;margin-bottom:4px;}
.intro-card p{font-size:.82rem;color:var(--ink-soft);margin:0;}

/* ===================== RESULTS ===================== */
.results-wrap{max-width:920px;margin:0 auto;}
.cred-stamp{
  display:flex;justify-content:center;margin:6px 0 28px;
}
.stamp{
  width:190px;height:190px;border-radius:50%;border:3px double var(--gold);position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(circle,#fff,var(--cream) 80%);box-shadow:var(--shadow);
}
.stamp .stamp-lvl{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.5rem;color:var(--navy);line-height:1.1;padding:0 18px;}
.stamp .stamp-sub{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:.6rem;color:var(--gold);margin-top:6px;font-weight:700;}
.stamp .stamp-score{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:2.6rem;color:var(--gold);margin-top:2px;}
.results-head{text-align:center;margin-bottom:8px;}
.results-head h2{font-size:2.1rem;}
.results-head .sub{color:var(--ink-soft);font-size:.9rem;margin-top:4px;}

.cat-table{width:100%;border-collapse:collapse;margin:22px 0;}
.cat-table th{
  text-align:left;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;
  font-size:.68rem;color:var(--navy-3);padding:8px 10px;border-bottom:2px solid var(--navy);
}
.cat-table td{padding:10px 10px;border-bottom:1px solid var(--line);font-size:.86rem;vertical-align:middle;}
.cat-table .catbar{background:var(--cream-deep);border-radius:6px;height:8px;overflow:hidden;width:160px;}
.cat-table .catbar>i{display:block;height:100%;border-radius:6px;}
.tagpill{
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:.66rem;font-weight:700;
  padding:3px 9px;border-radius:5px;display:inline-block;
}
.tagpill.ok{background:var(--ok-bg);color:var(--ok);}
.tagpill.mid{background:var(--mid-bg);color:var(--mid);}
.tagpill.warn{background:var(--warn-bg);color:var(--warn);}

.feedback-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px;}
.fb-block{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
.fb-block h3{font-size:1.15rem;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.fb-block ul{margin:0;padding-left:18px;font-size:.85rem;color:var(--ink-soft);}
.fb-block ul li{margin-bottom:6px;}
.fb-block.full{grid-column:1/-1;}
.rec-box{
  margin-top:18px;padding:18px 20px;border-radius:var(--radius);background:var(--navy);color:#eef2f8;
}
.rec-box h3{color:var(--gold-light);font-size:1.15rem;margin-bottom:8px;}
.rec-box p{font-size:.9rem;margin:0;}

.results-actions{display:flex;justify-content:center;gap:12px;margin:28px 0 6px;}

/* print */
@media print{
  .sidebar,.nav-row,.results-actions,.no-print{display:none !important;}
  .main{padding:0;}
  body{background:#fff;}
  .card,.fb-block,.intro-card{box-shadow:none;}
  .results-wrap{max-width:100%;}
}

@media (max-width:980px){
  .app-shell{flex-direction:column;}
  .sidebar{position:relative;height:auto;width:100%;flex:none;}
  .main{padding:24px 18px;}
  .reg-form{grid-template-columns:1fr;}
  .field-grid,.intro-grid,.feedback-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* =========================================================================
   DATA — Question banks per section
   ========================================================================= */
const SECTIONS = [
  {id:1, key:'theory',     title:'Conocimiento Teórico',              desc:'40 reactivos de opción múltiple que cubren la operación completa de Customer Service: Inbound, Outbound, Remarcaciones, Videollamadas, LawPay, USCIS, TramCase, ClickUp, Slack, Escalaciones, Travel Calls, Compliance, Antifraude, Terceros, VDPC y Emergencias.', points:15},
  {id:2, key:'errors',     title:'Identificación de Errores',          desc:'20 escenarios donde un asesor comete un error operativo. Debes identificar qué se hizo mal, qué política se incumplió y cuál era la acción correcta.', points:10},
  {id:3, key:'escalation', title:'Escalar o No Escalar',                desc:'25 escenarios complejos. Para cada uno, decide el canal correcto: resolver directamente, escalar por ClickUp, por Slack, al Team Leader, o a Dirección/MGM.', points:15},
  {id:4, key:'simulator',  title:'Simulador Operativo',                 desc:'10 simulaciones de llamadas reales con contexto, historial del cliente, estado emocional e información (relevante e irrelevante). Cada caso incluye varias decisiones operativas.', points:20},
  {id:5, key:'tramcase',   title:'Notas en TramCase',                   desc:'15 ejercicios donde construyes la nota correcta en TramCase: título, Reason, Solution, Behavior, CN y, cuando aplica, Internal Note — incluyendo escenarios de Compliance y discrepancias DCL.', points:10},
  {id:6, key:'emergencies',title:'Emergencias Críticas',                desc:'15 escenarios de emergencia (ICE, detenciones, redadas, Bar Complaint, demandas, redes sociales, Bar Number, abogado externo). Ordena la secuencia correcta de respuesta.', points:10},
  {id:7, key:'compliance', title:'Compliance y Antifraude',             desc:'20 preguntas situacionales sobre lista de no contacto, discrepancias DCL, frases prohibidas, scripts habilitados, fraude, fabricación de evidencia y promesas indebidas.', points:10},
  {id:8, key:'mastercase', title:'Caso Maestro Final',                  desc:'Un caso integral de alta complejidad que combina cliente molesto, retraso de USCIS, solicitud de expediente, amenaza en redes, posible fraude, Travel Call e información contradictoria. 25 preguntas derivadas.', points:10},
];

// Escalation options are fixed for Section 3
const ESCALATION_OPTIONS = [
  {k:'A', t:'Resolver directamente'},
  {k:'B', t:'Escalar por ClickUp (formulario de llamadas)'},
  {k:'C', t:'Escalar por Slack'},
  {k:'D', t:'Escalar al Team Leader (TL)'},
  {k:'E', t:'Escalar a Dirección / MGM'},
];

const ORDER_CATS = ['Acción Inmediata','Escalación','Documentación','Comunicación con el Cliente'];

const DATA = {
  theory: [
    {id:'t01', prompt:'¿Cuál es el canal principal de recepción de llamadas entrantes del asesor Inbound?', options:['8x8 Contact Center','ClickUp','LawPay','Google Chat'], correct:0},
    {id:'t02', prompt:'¿Cuál es la función principal del asesor Outbound?', options:['Atender llamadas entrantes de clientes con casos activos','Gestionar tareas salientes asignadas por otras áreas y realizar llamadas outbound y de remarcación','Procesar pagos en LawPay exclusivamente','Dar seguimiento únicamente a RFEs en USCIS.gov'], correct:1},
    {id:'t03', prompt:'En el flujo de llamada perfecta (Inbound), ¿qué se debe hacer ANTES de dar cualquier información al cliente?', options:['Confirmar el motivo exacto de la llamada','Solicitar y verificar los 3 filtros de seguridad (candados)','Pedir 3 minutos para revisar el caso','Ofrecer asistencia adicional al cliente'], correct:1},
    {id:'t04', prompt:'Si un cliente no pasa los 3 filtros de seguridad, ¿cuál es el Reason of Call correcto a registrar?', options:["'Regular status'", "'Case status'", "\"CI didn't pass security filters\"", "'Needs packet speed up'"], correct:2},
    {id:'t05', prompt:'Antes de marcar una llamada outbound asignada por ClickUp, ¿qué debe revisar primero el asesor?', options:['La hoja de tiempos de procesamiento vigente','La descripción completa de la tarea en ClickUp para entender qué solicita el cliente y qué área la originó','El formulario de Cancelaciones','El canal de Slack #cs-dvs'], correct:1},
    {id:'t06', prompt:'Si en TramCase ya existe una nota reciente de que el cliente llamó por su cuenta a CS, ¿qué debe hacer el asesor outbound con su tarea?', options:['Llamar de todas formas para confirmar la información','Marcar la tarea como Completado sin realizar la llamada','Escalar al TL antes de decidir qué hacer','Reagendar la tarea para el día siguiente'], correct:1},
    {id:'t07', prompt:'En una remarcación automática donde el cliente no contesta, ¿qué significa cambiar el estado de la tarea a "En curso"?', options:['El sistema sigue remarcando indefinidamente','El sistema deja de remarcar y el caso pasa al equipo de TEXTOS para seguimiento','La llamada se marca como Completado de forma permanente','La tarea se cancela automáticamente'], correct:1},
    {id:'t08', prompt:'¿Cuál es el script de presentación OBLIGATORIO en una remarcación automática?', options:['«Buen día, le habla [nombre], gracias por llamar a The Mendoza Law Firm.»','«Buen día, me comunico de The Mendoza Law Firm, mi nombre es [tu nombre] y el motivo de esta llamada es por una solicitud que nos hizo para que lo contactáramos de vuelta.»','«Buenos días, gracias por comunicarse a The Mendoza Law Firm, le atiende [tu nombre].»','«Le habla [tu nombre] de The Mendoza Law Firm. Por motivos de seguridad, le voy a confirmar sus filtros.»'], correct:1},
    {id:'t09', prompt:'En una videollamada de CS, ¿qué ventana NO debe compartirse nunca con el cliente?', options:['La página oficial de la abogada','La ventana con TramCase, Dropbox, tiempos de procesamiento, Registro de llamadas y ClickUp','Una presentación de bienvenida preparada','Documentos del cliente que el agente quiera mostrarle'], correct:1},
    {id:'t10', prompt:'¿Desde qué cuenta debe conectarse el asesor a Google Meet para que la grabación y el transcript se generen automáticamente?', options:['Su cuenta personal de Google','La cuenta "support"','Cualquier cuenta con licencia de Meet','La cuenta de 8x8 Work'], correct:1},
    {id:'t11', prompt:'Si el cliente tiene un agente de Collections asignado y prefiere pagar con dicho agente, ¿qué debe hacer el asesor de CS?', options:['Procesar el cobro de todas formas en LawPay','Escalar en el formulario de Collections del Registro de llamadas','Decirle al cliente que debe llamar en otro momento','Informarle que no es posible pagar con su agente'], correct:1},
    {id:'t12', prompt:'Después de procesar un cobro en LawPay, ¿cuáles son las 3 acciones obligatorias post-cobro?', options:['Confirmar el monto verbalmente, agradecer y colgar','Copiar el comprobante, dejarlo en las notas de TramCase y enviarlo por mensaje de texto al cliente desde TramCase','Enviar el comprobante por correo electrónico y cerrar el caso','Registrar el pago en ClickUp y notificar al área de Collections'], correct:1},
    {id:'t13', prompt:'¿Qué se debe hacer SIEMPRE antes de informar al cliente sobre el estatus de su caso?', options:['Informar con base en la experiencia de casos similares anteriores','Verificar el estatus en el portal oficial de USCIS y complementar con la revisión en TramCase','Preguntar al TL en cada llamada antes de responder','Consultar el canal de Slack #rfe-comunications'], correct:1},
    {id:'t14', prompt:'El caso presenta atraso respecto a los tiempos de USCIS y falta un recibo inicial. ¿Qué acción corresponde?', options:['Generar un E-Request hacia Back Office','Generar un Missing Receipt hacia Back Office','Escalar directamente a Dirección y MGM','Informar al cliente que debe esperar, sin escalar nada'], correct:1},
    {id:'t15', prompt:'En una llamada inbound estándar cuyo motivo fue una consulta de estatus, ¿cuál es el título correcto de la nota en TramCase?', options:["'Outgoing Call / Case status'", "'Incoming Call / Case status'", "'TEXT MSG UPDATE'", "'Outgoing Call / Chat Request'"], correct:1},
    {id:'t16', prompt:'¿Qué identifica específicamente el título de nota "Outgoing Call / Chat Request"?', options:['Una llamada inbound estándar con consulta de estatus','Una llamada saliente que provino de una tarea de ClickUp, no una outbound genérica','Un mensaje de texto proactivo enviado al cliente','Una nota de emergencia tipo ICE o detención'], correct:1},
    {id:'t17', prompt:'¿Qué debe verificarse en CADA caso antes de cerrar la nota en TramCase?', options:['Que el cliente tenga correo electrónico registrado','Que el caso tenga número de cliente y fecha de nacimiento — si faltan, completarlos','Que el cliente haya confirmado por escrito la llamada','Que el caso aparezca en LawPay'], correct:1},
    {id:'t18', prompt:'¿Cuál es el medio PRINCIPAL para registrar TODAS las llamadas con el cliente, inbound y outbound?', options:['Una nota en TramCase únicamente, sin formulario','El formulario de llamadas en ClickUp','El canal de Slack #cs-dvs','Un correo dirigido a Dirección'], correct:1},
    {id:'t19', prompt:'¿Qué tipos de escalación se realizan DIRECTAMENTE por el formulario de ClickUp?', options:['Cancelación, Back Office, Call Backs y PCR','RFE, Bar Complaint y reportes de Compliance','Travel Call y solicitudes de NTA','Detenciones y citas con ICE'], correct:0},
    {id:'t20', prompt:'¿En qué canal de Slack se reporta que un cliente de la lista de no contacto se comunicó con CS?', options:['#cs-dvs', '#cdmx-oficina', '#compliance-help', '#rfe-comunications'], correct:2},
    {id:'t21', prompt:'¿Cuándo se utiliza el canal de Slack #rfe-comunications?', options:['Cuando el cliente solicita una consulta con la abogada','Cuando USCIS solicita información extra (RFE) en el caso del cliente','Cuando hay un problema relacionado con el horario de la oficina','Cuando el cliente reporta un posible intento de fraude'], correct:1},
    {id:'t22', prompt:'¿Cuál es la única forma correcta de ofrecer una callback al cliente?', options:['Cuando el cliente insiste varias veces, se le puede ofrecer directamente','Nunca sin autorización previa del TL: el asesor identifica la necesidad, notifica al TL, el TL autoriza y entonces se ofrece o agenda','Cuando el caso está en estatus regular, sin necesidad de autorización','Cuando el asesor tiene más de un año de antigüedad puede decidir por su cuenta'], correct:1},
    {id:'t23', prompt:'¿Por qué medios se contacta al Team Leader (TL) para una escalación urgente?', options:['Únicamente por correo electrónico interno','Por Google Chat (Hangouts) o directamente por 8x8','Por el formulario de llamadas de ClickUp','Por mensaje de WhatsApp personal'], correct:1},
    {id:'t24', prompt:'Un cliente menciona que ya consultó con otro abogado y solicita hablar con MGM. Según el mapa de escalaciones, esto corresponde a:', options:['Resolver directamente con empatía, sin escalar','Escalar por Slack en #cs-dvs','Escalar a Dirección + MGM vía el TL','Registrar una nota y continuar la llamada sin más acción'], correct:2},
    {id:'t25', prompt:'¿Cuál es la vigencia mínima del EAD requerida para que un cliente pueda viajar (Travel Call)?', options:['6 meses', '9 meses', '11 meses', '18 meses'], correct:2},
    {id:'t26', prompt:'Un cliente tiene EAD vigente con Advance Parole, pero ha tenido contacto previo con USCIS. ¿Puede viajar?', options:['Sí, sin ninguna restricción','No: no debe cruzar checkpoints ni viajar, aunque tenga el EAD','Sí, siempre que tenga pasaporte vigente','Sí, si lo autoriza el área de Back Office'], correct:1},
    {id:'t27', prompt:'Un cliente de la lista de no contacto llama y el agente ya pasó los filtros de seguridad y lo identificó en el listado. ¿Qué frase de cierre está HABILITADA por Compliance?', options:['«No podemos hablar con usted, vamos a colgar.»','«Tenemos prohibido contactarlo por instrucción de Compliance.»','«Gracias por la información. Para asegurar que su solicitud se atienda por el canal correcto, vamos a escalarla internamente. Por el momento no podemos continuar con más detalles en esta llamada, pero su solicitud quedará registrada para el seguimiento correspondiente. Le deseamos buen día.»','«No podemos continuar con esta comunicación.»'], correct:2},
    {id:'t28', prompt:'Después de cerrar una llamada con un cliente en lista de no contacto usando el speech habilitado, ¿qué acción es obligatoria?', options:['Ninguna acción adicional, la llamada queda cerrada','Levantar reporte en Slack #compliance-help informando que el cliente se contactó con CS','Bloquear el número directamente en 8x8','Enviar un correo a Dirección con el audio de la llamada'], correct:1},
    {id:'t29', prompt:'Si el agente identifica una discrepancia entre lo que dice el cliente y la DCL registrada, ¿qué palabra está PROHIBIDA en la nota de TramCase?', options:['"Revisión"', '"Canalizar"', '"Discrepancia"', '"Proceso"'], correct:2},
    {id:'t30', prompt:'¿Cuándo se activa el protocolo del Disclaimer Preventivo Anti-Fraude?', options:['Solo cuando el cliente confiesa abiertamente que mintió','Cuando el agente detecta intención de fabricar, exagerar o tergiversar información, sea por desesperación o desconocimiento','Únicamente si el cliente lo solicita expresamente','Solo en casos relacionados con VAWA'], correct:1},
    {id:'t31', prompt:'Durante el script anti-fraude, ¿qué acción debe realizar el agente?', options:['Colgar la llamada de inmediato tras detectar la señal','Leer el script al cliente y enviarlo por mensaje de texto MIENTRAS continúa la llamada, sin colgar','Esperar a que el cliente termine de hablar y colgar después','Pedir al cliente que llame nuevamente en otro horario'], correct:1},
    {id:'t32', prompt:'Si después del script anti-fraude el cliente continúa con incoherencias o señales de fraude, ¿qué debe hacer el agente?', options:['Ignorarlo y continuar normalmente con el resto de la llamada','Reportar de inmediato a Compliance a través del canal/QR habilitado','Decidir por su cuenta si el caso continúa o se rechaza','Documentar con palabras explícitas el intento de fraude detectado en TramCase'], correct:1},
    {id:'t33', prompt:'Llama un familiar del titular del caso pidiendo información sobre el expediente. ¿Qué debe hacer el agente?', options:['Confirmar si existe un caso activo, pero sin dar más detalles','No confirmar ni negar la existencia de ningún caso, y no dar información aunque sea familiar directo','Dar información general sin datos sensibles','Pedir que el familiar envíe una autorización por correo y luego dar información'], correct:1},
    {id:'t34', prompt:'Internamente, si el agente identifica que sí existe un caso al recibir la llamada de un tercero no autorizado, ¿qué debe hacer?', options:['Informar al tercero que efectivamente existe un caso','Contactar al titular por canales autorizados, sin informar nada al llamante','Pedir al tercero los datos del titular para confirmarlo','Escalar de inmediato a Dirección antes de cualquier otra acción'], correct:1},
    {id:'t35', prompt:'En la metodología VDPC, ¿qué representa la letra "P"?', options:['Procedimiento', 'Puente — conectar con la solución', 'Política interna', 'Proceso operativo'], correct:1},
    {id:'t36', prompt:'Según la regla del Puente en VDPC, ¿cómo se debe actuar con un cliente muy enojado?', options:['Dando la mayor cantidad de información posible para tranquilizarlo','A mayor molestia, menor explicación: ir más rápido hacia la acción','Repitiendo la disculpa varias veces antes de continuar','Transfiriendo la llamada de inmediato sin resolver nada'], correct:1},
    {id:'t37', prompt:'En la fase de Cierre (C) de VDPC, ¿qué se le debe prometer al cliente?', options:['Resultados específicos y plazos garantizados','Acompañamiento, nunca resultados','Que el caso será aprobado en automático','Un descuento sobre su mensualidad'], correct:1},
    {id:'t38', prompt:'Un cliente informa que fue detenido por ICE. ¿Qué debe hacer el agente ANTES de terminar la llamada?', options:['Decirle que la firma no puede ayudarlo en este tipo de casos','Notificar al TL de inmediato, con máxima prioridad','Pedirle que contrate un abogado externo de inmediato','Transferir la llamada al área de LawPay'], correct:1},
    {id:'t39', prompt:'Si ICE está actualmente en la puerta del cliente, ¿cuál es la ÚNICA excepción para que el cliente deba responder y abrir?', options:['Si los agentes muestran solo su placa','Si presentan una orden firmada por un juez (judge\'s order) con su nombre','Si insisten en tocar varias veces','Si el cliente tiene documentos migratorios vigentes a la mano'], correct:1},
    {id:'t40', prompt:'Un cliente menciona "Bar Complaint" o solicita el Bar Number de la abogada. ¿Qué nivel de riesgo y escalación corresponde?', options:['MEDIUM — escalar a Back Office y continuar','HIGH — escalar únicamente a Dirección','CRITICAL — escalar de inmediato a Dirección + MGM + Atty escalation, sin colgar la llamada','LOW — documentar y continuar la llamada con normalidad'], correct:2},
  ],
  errors: [
    {id:'e01', context:'El agente recibe una llamada y el cliente da su nombre completo y pregunta directamente por el estatus de su caso. El agente revisa TramCase, localiza el caso y le informa el estatus actual sin solicitar más datos.', prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no usó el saludo corporativo completo. Política incumplida: uso del nombre completo de la firma. Acción correcta: repetir el saludo antes de continuar.',
      "Error: no ofreció asistencia adicional al cliente. Política incumplida: paso 7 del flujo de 11 pasos. Acción correcta: preguntar '¿hay algo más en lo que pueda servirle?' antes de dar el estatus.",
      'Error: no solicitó ni verificó los 3 filtros de seguridad antes de dar información. Política incumplida: candados de seguridad obligatorios en cada llamada. Acción correcta: solicitar nombre completo, número de cliente o fecha de nacimiento, y teléfono/correo/dirección antes de revelar cualquier dato del caso.',
      "Error: no pidió 3 minutos para revisar el caso antes de responder. Política incumplida: bloques de espera de 3 minutos. Acción correcta: solicitar 3 minutos y regresar diciendo 'gracias por su espera' antes de informar."
    ], correct:2},
    {id:'e02', context:'El agente realiza una llamada outbound desde una tarea de ClickUp. Al contestar el cliente, el agente se presenta y de inmediato comienza a explicar el motivo de la llamada y detalles del caso.', prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no revisó la tarea de ClickUp antes de marcar. Política incumplida: leer la descripción completa de la tarea antes de llamar. Acción correcta: revisar la tarea y TramCase antes de marcar.',
      'Error: no aplicó los candados de seguridad antes de hablar de detalles del caso. Política incumplida: los filtros de seguridad son obligatorios para inbound y outbound sin excepción. Acción correcta: confirmar nombre completo, número de cliente o fecha de nacimiento, y teléfono/correo/dirección antes de mencionar cualquier detalle del caso.',
      'Error: no se asignó la tarea en ClickUp antes de llamar. Política incumplida: cambiar el estado de Pendiente a En curso al iniciar. Acción correcta: asignarse la tarea antes de marcar.',
      "Error: no usó el título de nota 'Outgoing Call / Chat Request'. Política incumplida: estructura de notas para llamadas desde ClickUp. Acción correcta: usar ese título al documentar."
    ], correct:1},
    {id:'e03', context:"Una mujer llama diciendo ser hermana del titular del caso y solicita conocer el estatus porque 'él está ocupado y me pidió que preguntara'. El agente, para ser útil, le indica que el caso está avanzando y que pronto recibirán noticias de USCIS.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: proporcionó información del caso a una tercera persona no autorizada. Política incumplida: protocolo de Terceras Personas — no confirmar ni negar la existencia de ningún caso, ni dar información aunque sea familiar directo. Acción correcta: usar el aviso de confidencialidad y pedir que el titular se comunique directamente.',
      'Error: no verificó los 3 filtros de seguridad con la hermana antes de continuar. Política incumplida: candados de seguridad. Acción correcta: pedirle a la hermana sus propios datos de identidad.',
      'Error: no ofreció agendar una llamada para el titular. Política incumplida: callbacks requieren autorización del TL. Acción correcta: ofrecer un callback al titular.',
      "Error: no documentó la llamada como 'Outgoing Call'. Política incumplida: estructura de notas en TramCase. Acción correcta: registrar la nota con ese título."
    ], correct:0},
    {id:'e04', context:"Llama el papá del cliente y pregunta '¿ya tienen un caso a nombre de mi hijo?'. El agente responde 'sí, efectivamente contamos con su expediente, pero no le puedo dar más detalles por privacidad' y termina la llamada.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: terminó la llamada de forma abrupta sin despedida corporativa. Política incumplida: despedida corporativa obligatoria. Acción correcta: usar la despedida completa con el apellido del cliente.',
      'Error: no escaló la llamada al TL. Política incumplida: toda llamada de un tercero debe escalarse al TL de inmediato. Acción correcta: notificar al TL antes de responder.',
      "Error: no completó la nota en TramCase con el título 'THIRD-PARTY CALL'. Política incumplida: plantilla obligatoria de nota. Acción correcta: usar esa plantilla, sin importar lo que se haya dicho al llamante.",
      'Error: confirmó la existencia de un caso a nombre del cliente ante una persona no autorizada. Política incumplida: nunca confirmar ni negar la existencia de un caso ante terceros, aunque sean familiares directos. Acción correcta: usar el aviso de confidencialidad sin confirmar ni negar nada, e indicar que el titular debe comunicarse directamente.'
    ], correct:3},
    {id:'e05', context:"Un cliente molesto por la demora de su caso pide hablar con un abogado. El agente, para calmarlo, le dice 'claro, le agendo una llamada con el área legal para mañana a las 10am' y cuelga sin avisar a nadie más.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no aplicó la metodología VDPC completa antes de ofrecer algo. Política incumplida: VDPC es obligatorio para clientes molestos. Acción correcta: validar, disculparse, dar el puente y cerrar antes de ofrecer cualquier solución.',
      'Error: ofreció y agendó una callback sin autorización previa del TL. Política incumplida: las callbacks SIEMPRE requieren autorización del TL antes de ofrecerse al cliente. Acción correcta: notificar al TL, esperar su autorización y solo entonces ofrecer o agendar la callback.',
      "Error: no documentó la molestia del cliente en TramCase. Política incumplida: 'lo que no está documentado no existe'. Acción correcta: dejar nota detallada de la molestia.",
      'Error: no verificó el estatus del caso en USCIS antes de ofrecer la llamada. Política incumplida: verificar siempre en USCIS antes de informar. Acción correcta: revisar USCIS antes de prometer cualquier seguimiento.'
    ], correct:1},
    {id:'e06', context:"Durante un proceso de cancelación, el cliente pregunta cuándo recibirá su reembolso. El agente, queriendo tranquilizarlo, le dice 'un asesor le llamará el viernes a las 4pm para darle el detalle del reembolso' sin haber escalado nada todavía.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: contuvo al cliente por más de 2 minutos antes de escalar. Política incumplida: tiempo máximo de contención de 2 minutos en cancelaciones. Acción correcta: escalar al formulario de Cancelaciones tras 2 minutos de contención.',
      "Error: dio información sobre montos de reembolso sin verificar la nota 'CASE CANCELED'. Política incumplida: nunca dar montos ni tiempos sin esa nota previa. Acción correcta: verificar la nota antes de hablar de montos.",
      'Error: comprometió una fecha y hora específica de callback sin autorización del TL ni escalación previa. Política incumplida: las callbacks siempre requieren autorización del TL, y las cancelaciones se escalan por el formulario correspondiente. Acción correcta: informar que un área especializada se comunicará, sin comprometer fecha/hora, y escalar por el formulario de Cancelaciones.',
      "Error: no usó la frase 'Esa información se le dará en la llamada que va a recibir'. Política incumplida: frase estándar para preguntas sobre montos/tiempos. Acción correcta: usar esa frase exacta."
    ], correct:2},
    {id:'e07', context:"Un cliente ansioso pregunta si su I-360 va a ser aprobada. El agente, queriendo darle confianza, le responde: 'No se preocupe, su caso va a salir aprobado pronto, ya casi sale.'", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: prometió un resultado (aprobación) al cliente. Política incumplida: en VDPC, la fase de Cierre promete acompañamiento, nunca resultados. Acción correcta: usar frases de cierre que transmitan confianza y acompañamiento, sin garantizar la aprobación ni los tiempos.',
      'Error: no verificó el estatus en USCIS antes de responder. Política incumplida: verificar siempre el estatus antes de informar. Acción correcta: revisar USCIS y TramCase antes de responder cualquier pregunta sobre el caso.',
      'Error: no usó la metodología VDPC porque el cliente no estaba molesto. Política incumplida: VDPC solo aplica a clientes molestos. Acción correcta: ninguna acción adicional, VDPC no era necesario aquí.',
      'Error: no escaló la pregunta a Back Office. Política incumplida: toda pregunta sobre aprobaciones debe escalarse. Acción correcta: escalar a Back Office la pregunta del cliente.'
    ], correct:0},
    {id:'e08', context:"Un cliente preocupado por los cambios en VAWA pregunta si su caso seguirá adelante. El agente responde: 'Le garantizo al 100% que su VAWA será aprobada, porque la abogada tiene más de 14 años de experiencia y nunca pierde un caso.'", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no compartió el video de referencia de la abogada en Facebook. Política incumplida: compartir el video si el cliente lo requiere. Acción correcta: enviar el enlace del video al cliente.',
      "Error: no registró el Reason of Call como 'Trump questions'. Política incumplida: estructura del Registro de llamadas. Acción correcta: registrar ese Reason of Call.",
      "Error: no mencionó la frase 'afortunadamente' adaptada a la etapa del caso. Política incumplida: guion de contención de la sección de Trump/VAWA. Acción correcta: adaptar la frase 'afortunadamente' según la etapa del caso del cliente.",
      "Error: convirtió un mensaje de confianza/contención en una garantía absoluta de aprobación. Política incumplida: el guion busca generar confianza ('confíe') sin garantizar resultados; nunca se debe prometer una aprobación. Acción correcta: usar el guion de contención (mencionar la experiencia de la abogada y casos previos) sin garantizar el resultado del caso."
    ], correct:3},
    {id:'e09', context:"El cliente menciona que quiere ponerse al corriente con su mensualidad. El agente, que ve la tarjeta guardada en LawPay, procesa directamente el cobro del monto que aparece en el sistema y luego informa al cliente 'ya quedó procesado su pago de $150 USD'.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no verificó si el cliente tiene un agente de Collections asignado. Política incumplida: verificar agente de Collections antes de cualquier cobro. Acción correcta: preguntar si tiene agente y, de ser así, escalar al formulario de Collections.',
      "Error: procesó el cobro sin obtener la autorización verbal explícita del cliente mediante la fraseología obligatoria. Política incumplida: la fraseología de autorización ('¿Me autoriza realizar el cobro por el monto de $[monto]...? ¿Lo autoriza?') es obligatoria, esperando confirmación verbal ANTES de procesar. Acción correcta: leer la fraseología exacta, esperar el 'sí' explícito del cliente y solo entonces procesar el cobro.",
      'Error: no envió el comprobante por mensaje de texto al cliente. Política incumplida: las 3 acciones post-cobro son obligatorias. Acción correcta: enviar el comprobante por TramCase y esperar confirmación de recibido.',
      'Error: no llenó correctamente el concepto del pago en LawPay. Política incumplida: llenar nombre, monto y concepto. Acción correcta: completar todos los campos de LawPay antes de procesar.'
    ], correct:1},
    {id:'e10', context:'El cliente autoriza verbalmente un cobro de $100 USD para su mensualidad. El agente, al llenar LawPay, ingresa por error $150 USD y procesa el cobro sin volver a confirmar con el cliente.', prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no copió el comprobante de pago. Política incumplida: acciones post-cobro obligatorias. Acción correcta: copiar el comprobante antes de continuar.',
      'Error: no preguntó si el cliente tenía agente de Collections. Política incumplida: verificación previa de Collections. Acción correcta: preguntar antes de cualquier cobro.',
      'Error: procesó un monto distinto al autorizado verbalmente por el cliente. Política incumplida: la autorización verbal corresponde a un monto específico; cobrar un monto diferente invalida esa autorización. Acción correcta: corregir el monto en LawPay antes de procesar, y si ya se procesó, detenerse, informar al cliente y escalar para corregir el cobro.',
      "Error: no usó la palabra 'mensualidad' en la fraseología. Política incumplida: fraseología exacta de autorización. Acción correcta: usar la palabra exacta 'mensualidad' o 'pago mensual'."
    ], correct:2},
    {id:'e11', context:"Un cliente llama por tercera vez en el mes preguntando lo mismo sobre su estatus. Dice 'la semana pasada ya me explicaron esto, pero quiero confirmar otra vez'. El agente, sin revisar las notas previas, vuelve a explicar todo desde cero y no marca nada especial en el Registro de llamadas.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no revisó las notas previas en TramCase durante los 3 minutos de revisión, y no marcó el caso en el apartado de Control Operativo pese a ser la tercera llamada en un mes. Política incumplida: revisar siempre notas internas previas, y marcar en Control Operativo cuando el cliente llama más de 3 veces en un mes. Acción correcta: revisar las notas previas antes de responder y registrar el caso en Control Operativo.',
      'Error: no pidió los 3 filtros de seguridad porque el cliente ya había llamado antes. Política incumplida: los filtros se verifican en cada llamada, sin excepción. Acción correcta: pedir los filtros nuevamente.',
      'Error: no escaló el caso a Back Office por atraso. Política incumplida: escalar atrasos a Back Office. Acción correcta: escalar el caso por atraso.',
      'Error: no ofreció una callback al cliente. Política incumplida: callbacks para clientes recurrentes. Acción correcta: ofrecer una callback con autorización del TL.'
    ], correct:0},
    {id:'e12', context:"El agente recibe una tarea de ClickUp para llamar a un cliente y darle seguimiento sobre un documento pendiente. Sin revisar TramCase, marca la llamada; el cliente le dice 'ya hablé con ustedes ayer y entregué todo, ¿por qué me vuelven a llamar?'.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no se asignó la tarea en ClickUp antes de llamar. Política incumplida: asignarse la tarea y cambiar su estado al iniciar. Acción correcta: asignarse la tarea antes de marcar.',
      "Error: no usó el script de identificación del cliente al inicio de la llamada saliente. Política incumplida: script obligatorio '¿es usted el Sr./Sra. [Nombre]?'. Acción correcta: usar el script de identificación.",
      'Error: no consultó al TL antes de llamar. Política incumplida: consultar al TL si hay duda antes de llamar. Acción correcta: consultar al TL antes de marcar.',
      'Error: no revisó las últimas notas en TramCase antes de marcar, lo que generó un contacto innecesario e incómodo para el cliente. Política incumplida: verificar en TramCase si el cliente ya se contactó por su cuenta — si ya lo hizo, marcar la tarea como Completado sin llamar. Acción correcta: revisar TramCase antes de marcar; si ya hay una nota reciente de que el cliente entregó la información, marcar la tarea como Completado sin realizar la llamada.'
    ], correct:3},
    {id:'e13', context:"Durante una llamada por un tema de pago, el cliente menciona de paso: 'la semana pasada me detuvo migración pero ya salí, solo quería preguntar por mi mensualidad'. El agente procesa el pago y continúa la llamada sin mencionar nada más sobre la detención.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no verificó si el cliente tiene agente de Collections. Política incumplida: verificación previa de Collections. Acción correcta: preguntar antes de procesar el pago.',
      "Error: no notificó al TL sobre la mención de una detención, asumiendo que ya no era relevante porque el cliente 'ya salió'. Política incumplida: las emergencias —incluida cualquier mención de detención— tienen prioridad absoluta y deben notificarse al TL de inmediato, sin importar cómo las minimice el cliente. Acción correcta: notificar al TL de inmediato, recopilar la información crítica de la detención y hacer el triple registro, además de continuar con el tema del pago.",
      'Error: no usó la fraseología exacta de autorización de LawPay. Política incumplida: fraseología obligatoria de cobro. Acción correcta: usar la fraseología exacta antes de cobrar.',
      'Error: no ofreció asistencia adicional al final. Política incumplida: paso 7 del flujo de 11 pasos. Acción correcta: preguntar si hay algo más en qué ayudar.'
    ], correct:1},
    {id:'e14', context:"Un cliente informa que tiene una corte migratoria en 48 horas y necesita una copia urgente de su expediente. El agente responde 'está bien, lo voy a anotar' y registra una nota genérica sin escalar nada con prioridad ni pedir los datos del abogado.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no le dijo al cliente que su solicitud sería revisada. Política incumplida: frase de cierre estándar de File Request. Acción correcta: usar la frase de cierre estándar.',
      'Error: no preguntó si el cliente quería cambiar de abogado. Política incumplida: guion para clientes molestos que quieren cambiar de abogado. Acción correcta: preguntar sobre el cambio de abogado.',
      'Error: no recopiló los datos del abogado y la corte ni reportó la solicitud con carácter prioritario dado el plazo de 48 horas. Política incumplida: ante una corte próxima, se deben solicitar los datos del abogado (nombre, teléfono con extensión, correo), el tipo de corte y la fecha, y reportar la solicitud de expediente con prioridad. Acción correcta: recopilar esos datos, reportar el File Request como prioritario por la fecha de corte y escalar con el TL.',
      "Error: no verificó si el caso tenía nota 'CASE CANCELED'. Política incumplida: verificación de cancelación antes de hablar de reembolsos. Acción correcta: verificar la nota antes de continuar."
    ], correct:2},
    {id:'e15', context:"El cliente pregunta cuánto tiempo más tardará su trámite. El agente, sin abrir la hoja de tiempos de procesamiento, responde de memoria: 'normalmente esto tarda unos 8 meses, no se preocupe'.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: informó un plazo de memoria sin consultar la hoja de tiempos de procesamiento vigente. Política incumplida: para plazos, consultar SIEMPRE la hoja de tiempos vigente — nunca informar de memoria. Acción correcta: revisar la hoja de tiempos durante los 3 minutos de revisión y dar el plazo vigente, no uno aproximado de memoria.',
      'Error: no preguntó el motivo de la llamada antes de responder. Política incumplida: paso 3 del flujo, escuchar el motivo sin asumir. Acción correcta: preguntar el motivo antes de dar cualquier información.',
      'Error: no aplicó VDPC porque el cliente no estaba molesto. Política incumplida: VDPC es solo para clientes molestos. Acción correcta: no era necesario aplicar VDPC en este caso.',
      "Error: no marcó el Reason of Call como 'Needs packet speed up'. Política incumplida: Reason of Call para atrasos. Acción correcta: marcar ese Reason of Call."
    ], correct:0},
    {id:'e16', context:"En una videollamada, el cliente pregunta cuánto falta para que llegue su EAD. Aunque el agente tiene la hoja de tiempos abierta en la ventana izquierda (no compartida), responde directamente de memoria sin consultarla, diciendo 'como unas 5 semanas más'.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: compartió la ventana incorrecta durante la videollamada. Política incumplida: solo se comparte la ventana derecha. Acción correcta: verificar qué ventana se está compartiendo.',
      'Error: respondió un plazo de memoria a pesar de tener la hoja de tiempos de procesamiento disponible en la ventana no compartida. Política incumplida: consultar siempre la hoja de tiempos vigente antes de informar plazos, sin importar el canal (llamada o videollamada). Acción correcta: revisar la hoja de tiempos en la ventana izquierda antes de responder, y dar el plazo vigente real.',
      'Error: no confirmó la conexión de audio y video al inicio. Política incumplida: verificación técnica inicial obligatoria. Acción correcta: confirmar audio, video y conexión al inicio.',
      'Error: no documentó la videollamada en el Drive. Política incumplida: las grabaciones y transcripts quedan en Drive/Meetings. Acción correcta: verificar que la grabación y transcript estén activos.'
    ], correct:1},
    {id:'e17', context:"El agente nota que la fecha del incidente que menciona el cliente no coincide con la registrada en la DCL del caso. Escribe en TramCase: 'El cliente indicó que la declaración tiene errores respecto a la fecha del incidente; se detectó discrepancia en la DCL.'", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no marcó el Reason of Call correcto para discrepancias. Política incumplida: estructura de Reason of Call. Acción correcta: usar un Reason of Call específico para DCL.',
      'Error: no escaló la discrepancia al área legal de inmediato por teléfono. Política incumplida: las discrepancias DCL deben escalarse verbalmente y de inmediato. Acción correcta: llamar al área legal antes de colgar.',
      "Error: registró en la nota palabras prohibidas ('errores', 'discrepancia') y describió explícitamente la naturaleza de la diferencia con la DCL. Política incumplida: instrucción de Compliance Jun 2026 — no se debe registrar ninguna nota que mencione explícitamente errores, discrepancias o problemas con la DCL, ni describir en detalle la diferencia. Acción correcta: usar una de las plantillas habilitadas (Opción A u Opción B), con lenguaje neutral, sin detallar la naturaleza de la discrepancia, y escalar al área correspondiente conforme al proceso.",
      'Error: no le informó al cliente que su declaración tenía un error. Política incumplida: transparencia con el cliente sobre su expediente. Acción correcta: explicarle al cliente cuál es el error en su DCL.'
    ], correct:2},
    {id:'e18', context:"El agente escribe en TramCase: 'Se detecta discrepancia en la DCL: el cliente cambió su versión de los hechos sobre el abuso descrito originalmente. Se notifica al cliente que esto podría afectar su caso.'", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no usó el título correcto de nota para llamadas inbound. Política incumplida: estructura de notas (Reason / Solution / Type of case / Behavior / CN). Acción correcta: usar el título correcto según el motivo de la llamada.',
      "Error: usó lenguaje explícito y prohibido sobre la DCL ('discrepancia', detalles del cambio de versión) y además informó al cliente sobre el problema con su declaración. Política incumplida: la instrucción de Compliance Jun 2026 prohíbe mencionar 'discrepancia' o describir la diferencia, y no corresponde al agente informar al cliente sobre problemas con su DCL. Acción correcta: usar una plantilla neutral habilitada (Opción A o B) sin detalles, sin decir nada al cliente sobre el tema, y escalar internamente conforme al proceso.",
      'Error: no verificó los 3 filtros de seguridad antes de escribir la nota. Política incumplida: candados de seguridad. Acción correcta: verificar los filtros antes de continuar la llamada.',
      'Error: no ofreció asistencia adicional antes de cerrar la llamada. Política incumplida: paso 7 obligatorio. Acción correcta: preguntar si hay algo más en qué ayudar.'
    ], correct:1},
    {id:'e19', context:"El agente identifica que el número que llama corresponde a un cliente de la lista de no contacto, después de pasar los filtros de seguridad y confirmar la información en TramCase. Como 'el cliente insistió y sonaba urgente', el agente continúa la llamada con normalidad y le explica el estatus de su caso en detalle.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: continuó dando información del caso a un cliente en lista de no contacto en lugar de usar el speech de cierre habilitado por Compliance. Política incumplida: instrucción de Compliance Jun 2026 — al identificar a un cliente en la lista de no contacto, se debe usar el speech de cierre habilitado, mantener tono neutral, y reportar en #compliance-help, sin entrar en discusión ni dar más detalles. Acción correcta: cerrar la llamada con el speech habilitado, dejar nota interna y reportar en #compliance-help.',
      "Error: no ofreció una callback al cliente. Política incumplida: callbacks requieren autorización del TL. Acción correcta: ofrecer un callback al cliente.",
      'Error: no aplicó VDPC porque el cliente sonaba urgente, no molesto. Política incumplida: VDPC solo aplica a clientes molestos. Acción correcta: ninguna, VDPC no aplicaba.',
      "Error: no verificó el estatus del caso en USCIS antes de responder. Política incumplida: verificar siempre USCIS antes de informar estatus. Acción correcta: revisar USCIS antes de dar el estatus."
    ], correct:0},
    {id:'e20', context:"Tras identificar a un cliente de la lista de no contacto y cerrar la llamada con el speech habilitado, el agente le comenta verbalmente al TL lo ocurrido durante la junta de equipo de la tarde, pensando 'ya avisé, no hace falta más'. No se genera ningún reporte adicional.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no dejó nota interna en TramCase indicando que se aplicó el protocolo de cierre. Política incumplida: dejar nota interna es obligatorio. Acción correcta: dejar la nota correspondiente en TramCase.',
      'Error: no usó un tono neutral durante la llamada. Política incumplida: mantener tono neutral y cordial en todo momento. Acción correcta: revisar el tono usado en la llamada.',
      'Error: no esperó autorización del TL antes de cerrar la llamada. Política incumplida: autorización previa del TL para cierres de llamada. Acción correcta: pedir autorización antes de cerrar.',
      'Error: no levantó el reporte inmediato y obligatorio en el canal de Slack #compliance-help al finalizar la llamada, sustituyéndolo por un comentario informal al TL más tarde. Política incumplida: instrucción de Compliance Jun 2026 — al finalizar la llamada con un cliente en lista de no contacto, se debe levantar reporte de inmediato en #compliance-help, además de la nota interna en TramCase. Acción correcta: publicar el reporte en #compliance-help inmediatamente al terminar la llamada, sin sustituirlo por comentarios verbales posteriores.'
    ], correct:3},
  ],
  escalation: [
    {id:'esc01', context:'Un cliente llama para preguntar por qué USCIS no ha respondido. El agente revisa USCIS y TramCase y confirma que el caso está dentro de los tiempos de procesamiento vigentes. El cliente se muestra tranquilo.', correct:'A'},
    {id:'esc02', context:'Un hombre llama diciendo ser el esposo del titular del caso y pregunta amablemente por el estatus. El agente aplica el protocolo de Terceras Personas: no confirma ni niega el caso, lee el aviso de confidencialidad y cierra la llamada indicando que el titular debe comunicarse directamente. El llamante acepta y se despide.', correct:'A'},
    {id:'esc03', context:'Una clienta pregunta por qué su caso sigue "en espera". El agente revisa TramCase y ve que el caso está ON HOLD porque el abusador aún no cumple los 21 años y 3 meses requeridos.', correct:'A'},
    {id:'esc04', context:'Un cliente, preocupado por las noticias sobre inmigración, pregunta si su proceso VAWA seguirá adelante con los cambios de la administración actual. El agente aplica el guion de contención de la Parte 1, mencionando la experiencia de la abogada y la etapa actual del caso.', correct:'A'},
    {id:'esc05', context:'Un cliente con cita de consulta programada para dentro de 5 días llama para solicitar cambiarla a la próxima semana, con más de 12 horas de anticipación.', correct:'B'},
    {id:'esc06', context:'Tras aplicar VDPC durante 2 minutos, un cliente sigue insistiendo en cancelar su servicio y no acepta ninguna alternativa de contención.', correct:'B'},
    {id:'esc07', context:'Al revisar el caso, el agente nota que falta el recibo inicial correspondiente al trámite del cliente, quien presenta un atraso respecto a los tiempos de USCIS.', correct:'B'},
    {id:'esc08', context:'Un cliente cuyo caso aparece como CASO CANCELADO, sin callback ni Discovery Call programados, pregunta si puede retomar algún trámite con la firma.', correct:'B'},
    {id:'esc09', context:'Un cliente cuyo expediente está en la etapa de PACKETS (ensamblado) pide que se agilice porque necesita el documento pronto para una entrevista próxima.', correct:'B'},
    {id:'esc10', context:'Un cliente informa que recibió una carta de USCIS solicitando documentos adicionales para su trámite (RFE).', correct:'C'},
    {id:'esc11', context:'Un cliente pregunta detalles sobre una consulta que tiene programada con la abogada y quiere saber si puede agregar un tema adicional a tratar.', correct:'C'},
    {id:'esc12', context:'Un cliente llama fuera del horario habitual de atención de la oficina de CDMX y pregunta si puede pasar a dejar documentos en persona esa misma tarde.', correct:'C'},
    {id:'esc13', context:'El agente identifica que el cliente que llama está en la lista de no contacto. Aplica el speech de cierre habilitado por Compliance, mantiene tono neutral y termina la llamada sin incidentes.', correct:'C'},
    {id:'esc14', context:'Un cliente llama para preguntar si ya puede enviar documentación adicional en respuesta a un RFE que recibió hace dos semanas.', correct:'C'},
    {id:'esc15', context:'Un cliente molesto solicita una copia completa de su expediente porque tiene una audiencia migratoria en 48 horas.', correct:'D'},
    {id:'esc16', context:'Un cliente informa que recibió un documento citándolo a presentarse ante ICE en los próximos días.', correct:'D'},
    {id:'esc17', context:'Un cliente, ya con nota CASE CANCELED y reembolso en proceso, llama molesto porque ya pasaron 50 días hábiles sin recibir su reembolso.', correct:'D'},
    {id:'esc18', context:'Durante la llamada de un tercero que inicialmente parecía tranquilo, la persona comienza a insistir agresivamente en obtener información del caso y se niega a terminar la llamada.', correct:'D'},
    {id:'esc19', context:'Un cliente cumple con todos los requisitos para viajar (EAD vigente con Advance Parole, sin contacto previo con USCIS, pasaporte vigente y fecha de viaje definida) y solicita agendar su Travel Call.', correct:'D'},
    {id:'esc20', context:'Un cliente informa, alterado, que un familiar fue detenido por una autoridad (ICE, Sheriff u otra) hace pocas horas y no saben a dónde lo llevaron.', correct:'D'},
    {id:'esc21', context:'Durante la llamada, el cliente menciona explícitamente que va a presentar un "Bar Complaint" contra la abogada por la demora de su caso.', correct:'E'},
    {id:'esc22', context:'El cliente solicita directamente el número de licencia (Bar Number) de la abogada María Mendoza.', correct:'E'},
    {id:'esc23', context:'El cliente, molesto, afirma de forma directa: "voy a demandar a esta firma por negligencia, ya hablé con un abogado para hacerlo".', correct:'E'},
    {id:'esc24', context:'El cliente amenaza con publicar una reseña negativa en Google y Facebook sobre la firma, y además solicita expresamente hablar con MGM.', correct:'E'},
    {id:'esc25', context:'Un abogado externo contacta a nombre del cliente y solicita el expediente completo del caso para una segunda opinión.', correct:'E'},
