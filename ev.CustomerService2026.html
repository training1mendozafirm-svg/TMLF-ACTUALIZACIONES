  emergencies: [
    {id:'o01', context:"El titular del caso llama y reporta que fue detenido por ICE hace unos minutos; sigue en la llamada con el agente.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Realizar el triple registro: nota en TramCase con toda la información recopilada, Registro de llamadas → Emergencias → Detained, y formulario de Back Office.",
      "Decir el script mandatorio al cliente ('Lamento mucho saber que has sido detenido…') y notificar al TL de inmediato, antes de terminar la llamada.",
      "Informar al cliente que debería recibir una respuesta formal dentro de un día hábil, sin asumir representación automática ni comprometer nada.",
      "El TL reporta el caso en el chat de emergencias de líderes para que el departamento de remociones lo evalúe."
    ], correctOrder:[2,0,3,1]},
    {id:'o02', context:"Un familiar llama y reporta que el titular del caso fue detenido por ICE hace unas horas; el familiar no es el titular del caso.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "El TL reporta el caso al departamento de remociones a través del chat de emergencias de líderes.",
      "Agradecer al familiar la información, mantener empatía constante (VDPC) y explicarle que la firma evaluará la situación, sin prometer representación ni resultados.",
      "Sin confirmar al familiar que el cliente está en el sistema, recopilar de inmediato la información crítica: quién detuvo, cuándo y dónde, y notificar al TL antes de colgar.",
      "Registrar la nota en TramCase, marcar Registro de llamadas → Emergencias → Detained, y llenar el formulario de Back Office, indicando que quien llamó puede no ser el titular."
    ], correctOrder:[1,3,0,2]},
    {id:'o03', context:"El cliente informa que recibió un documento con una cita ante ICE/autoridad y pregunta qué debe hacer.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Explicar al cliente que su caso será canalizado a Courts and Removal, manteniendo la calma y sin especular sobre consecuencias o resultados.",
      "Realizar la escalación doble: formulario de Back Office y Registro de llamadas → Emergencias → ICE Call / ICE Appointment.",
      "Documentar en TramCase: cuándo recibió el documento, fecha de la cita, autoridad emisora, qué menciona el documento y cuántas hojas tiene; solicitar fotografía del documento.",
      "Indicar al cliente que NO se presente a la cita hasta que un abogado de la firma lo autorice, y notificar al TL de inmediato porque aplica para todo tipo de clientes y casos."
    ], correctOrder:[3,1,2,0]},
    {id:'o04', context:"ICE está, en este momento, en la puerta de la casa del cliente, quien llama mientras la situación ocurre.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Notificar al TL de inmediato como emergencia máxima, mientras se recuerda al cliente sus derechos: tiene derecho a NO abrir la puerta y a no responder.",
      "Dejar constancia en TramCase de la situación reportada y la hora en que se notificó al TL.",
      "El TL escala al chat de emergencias de líderes para canalización inmediata.",
      "Recordarle al cliente que la ÚNICA excepción para responder es si presentan una orden firmada por un juez con su nombre, y compartir la Red Card (PDF de derechos ante ICE) si la requiere."
    ], correctOrder:[0,2,1,3]},
    {id:'o05', context:"Un cliente llama agitado para reportar que fue detenido brevemente en un retén y ya fue liberado, pero quiere orientación.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Registrar en TramCase la información disponible (ubicación, hora, autoridad) y marcar Registro de llamadas → Emergencias → Detained.",
      "Indicar que NO debe firmar ningún documento sin revisión de un abogado de migración, y que en un retén tiene derecho a no responder preguntas.",
      "El TL reporta la situación al chat de emergencias de líderes para evaluación del departamento de remociones.",
      "Notificar al TL de inmediato y recordar al cliente que tiene derecho a permanecer en silencio y a pedir un abogado."
    ], correctOrder:[2,3,1,0]},
    {id:'o06', context:"Durante la llamada, el cliente molesto dice textualmente: 'voy a presentar un Bar Complaint contra esta firma'.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "El TL escala a Dirección + MGM + Atty escalation, por tratarse de un nivel CRITICAL.",
      "NO colgar la llamada y NO admitir errores, negligencia o responsabilidad legal; escalar de inmediato al TL mientras se mantiene al cliente en línea.",
      "Mantener un tono calmado, sin discutir emocionalmente ni minimizar la amenaza, hasta que el TL tome la llamada.",
      "Documentar en tiempo real: frases clave exactas del cliente, mood, amenaza específica, hora de escalación y acciones tomadas."
    ], correctOrder:[1,0,3,2]},
    {id:'o07', context:"El cliente exige: 'denme el Bar Number de la abogada María Mendoza, lo necesito ahora'.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Evitar minimizar la solicitud o discutir con el cliente; transmitir que su situación será atendida por el equipo correspondiente.",
      "Anotar la hora exacta de la solicitud, las frases textuales del cliente y el estatus del caso al momento de la escalación.",
      "Mantener la llamada activa, sin colgar, y escalar de inmediato al TL — nivel CRITICAL por solicitud de Bar Number.",
      "El TL escala a Dirección + MGM + Atty escalation manteniendo al cliente en línea."
    ], correctOrder:[3,2,0,1]},
    {id:'o08', context:"El cliente, molesto por el atraso de su caso, dice: 'voy a demandar a la firma, esto no se va a quedar así'.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "NO colgar la llamada; escalar de inmediato al TL — nivel HIGH (Threatens to sue, verbal) → Dirección + MGM.",
      "El TL escala a Dirección + MGM conforme al nivel HIGH correspondiente.",
      "Mantener calma, sin admitir responsabilidad ni discutir emocionalmente, hasta que el TL tome el control de la llamada.",
      "Documentar en tiempo real la amenaza específica realizada por el cliente y la hora de escalación."
    ], correctOrder:[0,1,3,2]},
    {id:'o09', context:"El cliente dice: 'voy a publicar todo esto en Facebook y TikTok, y quiero hablar con MGM directamente'.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Anotar las frases clave del cliente sobre redes sociales (Google, Facebook, TikTok, Instagram) y la solicitud de hablar con MGM.",
      "El TL escala a Dirección + MGM + Atty escalation manteniendo al cliente en línea.",
      "NO colgar la llamada; escalar de inmediato al TL — nivel HIGH (Social Media + solicitud de MGM) → Dirección + MGM + Atty escalation.",
      "Evitar minimizar la amenaza de redes sociales; mantener un tono neutral hasta que el TL tome la llamada."
    ], correctOrder:[2,1,0,3]},
    {id:'o10', context:"Un abogado externo contacta a CS solicitando una copia del expediente del cliente, indicando que ahora él representa el caso.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Cualquier envío del expediente a un abogado externo requiere aprobación de MGM/Wendy antes de cualquier acción.",
      "Documentar en TramCase los datos del abogado externo (nombre, teléfono y extensión, correo) y el motivo de la solicitud.",
      "Informar al cliente/abogado que su solicitud fue reportada para verificación y que un Team Lead dará seguimiento.",
      "Identificar que hay un abogado externo involucrado — nivel HIGH; escalar a Dirección."
    ], correctOrder:[1,2,3,0]},
    {id:'o11', context:"El cliente llama para reportar que recibió un mensaje de WhatsApp de alguien que dice ser de la firma y le pidió un pago para 'agilizar' su caso.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Enviar al cliente las redes y contactos oficiales de la firma (Facebook, Instagram, TikTok, página web, teléfono y correo oficiales) por mensaje de texto.",
      "Agradecer al cliente por compartir la información y comenzar a hacer las preguntas del protocolo (fecha, canal de contacto, qué le solicitaron).",
      "Registrar como Fraud en el Registro de llamadas → Emergencias y notificar al supervisor.",
      "Documentar los detalles del contacto, pedir capturas de pantalla como evidencia, y si realizó un pago, documentar monto y forma sin asegurar devolución."
    ], correctOrder:[3,0,1,2]},
    {id:'o12', context:"El cliente comenta que ya consultó con otro abogado porque 'aquí nadie le da resultados' y que ya no confía en la firma.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Reconocer la señal de alerta (antecedente de pérdida de confianza + consulta a otro abogado) y escalar al TL sin demora.",
      "Mantener un tono empático sin admitir errores ni discutir, aplicando VDPC mientras se coordina la escalación.",
      "Documentar en tiempo real las frases del cliente sobre pérdida de confianza y la consulta con otro abogado.",
      "El TL evalúa si corresponde escalar a Dirección + MGM, considerando que los antecedentes de Bar Complaint representan riesgo activo."
    ], correctOrder:[0,3,2,1]},
    {id:'o13', context:"El cliente, que ya canceló su caso, llama molesto porque su reembolso se ha retrasado y dice 'si no me lo regresan ya, lo voy a publicar en redes y en Google'.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Verificar primero si existe la nota 'CASE CANCELED' en TramCase y documentar la molestia del cliente por la demora.",
      "Si el cliente amenaza con redes sociales o menciona una fecha prometida para el reembolso, escalar de inmediato al TL (Hangouts o 8x8) — riesgo reputacional.",
      "No confirmar montos ni tiempos distintos a los ya establecidos (30-45 días hábiles, o más si cambió de cuenta bancaria) sin nota previa.",
      "Escalar también al formulario de Cancelaciones, en paralelo a la escalación al TL."
    ], correctOrder:[2,0,1,3]},
    {id:'o14', context:"Un cliente con corte migratoria en 48 horas solicita su expediente y, al sentir que el proceso es lento, agrega 'si no me lo dan ya, voy a meter un Bar Complaint contra la abogada'.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "Además de la escalación CRITICAL, reportar el File Request con carácter prioritario por la fecha de corte en 48 horas.",
      "Mantener un tono calmado y sin admitir responsabilidad, informando que su solicitud fue reportada para verificación y seguimiento prioritario.",

      "Al mencionar 'Bar Complaint', tratarlo como nivel CRITICAL: NO colgar la llamada y escalar de inmediato al TL para Dirección + MGM + Atty escalation."

    {id:'o15', context:"Llama una persona que no es el titular y, sin dar muchos detalles, exige saber de inmediato dónde está 'su pariente', diciendo que fue detenido por la policía local hace una hora.", prompt:'Ordena del 1 al 4 la secuencia correcta de respuesta (1 = primero, 4 = último).', items:[
      "El TL reporta el caso en el chat de emergencias de líderes para evaluación del departamento de remociones.",
      "Realizar el triple registro (TramCase, Registro de llamadas → Emergencias → Detained, formulario de Back Office), indicando que quien llamó puede no ser el titular.",
      "Sin confirmar al llamante que el cliente está en el sistema, recopilar la información crítica de la detención y notificar al TL de inmediato, con máxima prioridad.",
      "Explicar al llamante, con empatía constante (VDPC), que la firma evaluará el caso individualmente y que puede requerir nuevo retainer, sin comprometer nada."

  compliance: [
    {id:'c01', prompt:'Un cliente identificado en la lista de no contacto insiste mucho y comienza a llorar diciendo que necesita ayuda urgente. ¿Qué debe hacer el agente?', options:['Hacer una excepción a la política y dar información básica del caso, considerando la urgencia emocional que muestra el cliente','Mantener el speech habilitado por Compliance y, si insiste o prolonga la llamada, escalar al TL','Decirle directamente al cliente que está en una lista de no contacto y explicarle el motivo de esa restricción','Transferir la llamada directamente a Dirección, sin aplicar el speech ni reportar después en Slack'], correct:1},
    {id:'c02', prompt:'¿Cuál de las siguientes frases NO debe usarse al cerrar una llamada con un cliente de la lista de no contacto?', options:['"Gracias por la información, vamos a escalarla internamente."','"Su solicitud quedará registrada para el seguimiento correspondiente."','"No podemos continuar con esta comunicación."','"Le deseamos buen día."'], correct:2},
    {id:'c03', prompt:'Tras cerrar la llamada con un cliente de la lista de no contacto, el agente decide NO reportar en #compliance-help porque "el cliente no insistió mucho y la llamada fue breve". ¿Es correcto este criterio?', options:['Sí, el reporte solo es obligatorio si el cliente insiste mucho o se muestra molesto durante la llamada','No, el reporte en #compliance-help es obligatorio siempre que un cliente de la lista se contacte con CS','Sí, porque ya se aplicó correctamente el speech de cierre habilitado por Compliance','No, pero el reporte puede hacerse más tarde, durante la junta de equipo de la tarde'], correct:1},
    {id:'c04', prompt:'El agente detecta una discrepancia en la DCL y, al notar que "duda" un momento, el cliente pregunta directamente: "¿hay algún problema con mi declaración?". ¿Qué debe responder el agente?', options:['"Sí, efectivamente hay una discrepancia con la fecha que usted mencionó en su declaración."','Usar un mensaje neutral que no confirme ni niegue problemas con la declaración, sin usar palabras prohibidas','"No se preocupe, yo mismo voy a corregir eso en el sistema en este momento."','"Eso lo tiene que resolver usted directamente con su abogado, eso no me corresponde a mí."'], correct:1},
    {id:'c05', prompt:'¿Cuál de las siguientes opciones corresponde a una plantilla de nota HABILITADA por Compliance para discrepancias con la DCL?', options:['"Se detectó una discrepancia importante en la DCL respecto a la fecha exacta del incidente reportado."','"Se identifica información que requiere revisión interna antes de continuar con el seguimiento."','"El cliente cambió por completo su versión de los hechos sobre el abuso descrito."','"La DCL del cliente es incorrecta y requiere una corrección inmediata por parte del agente."'], correct:1},
    {id:'c06', prompt:'Un cliente, al ser cuestionado sobre fechas de su caso, dice: "mejor dígame usted qué fecha necesito decir y yo la repito, para que mi caso salga bien". ¿Qué representa esto?', options:['Una solicitud normal de aclaración de fechas, sin mayor relevancia','Una señal de posible intento de fraude que activa el Disclaimer Preventivo Anti-Fraude','Una solicitud que debe resolverse dándole la fecha correcta de inmediato','Un tema que no requiere ninguna acción especial por parte del agente'], correct:1},
    {id:'c07', prompt:'Durante la aplicación del script anti-fraude, ¿cuál de las siguientes acciones es INCORRECTA?', options:['Leer el script anti-fraude completo al cliente sin colgar ni interrumpir la llamada en ningún momento','Enviar el texto completo del script por mensaje de texto mientras la llamada permanece activa','Pausar la llamada y ponerlo en espera indefinida mientras se consulta "qué hacer" con su información','Pedirle al cliente que responda al mensaje de texto con "Acepto ser honesto al hablar de los hechos en mi caso"'], correct:2},
    {id:'c08', prompt:'Después de escuchar el script anti-fraude, el cliente responde: "ok está bien, no le voy a mentir... pero igual, ¿usted me puede decir qué pasa si yo digo que mi esposo me golpeaba aunque no sea cierto?". ¿Qué debe hacer el agente?', options:['Explicarle al cliente, hipotéticamente, qué pasaría si presentara esa versión de los hechos','Considerar esto como una señal más de posible fraude y reportarlo de inmediato a Compliance','Decirle "mejor no mencione nada de eso" y continuar con el resto de la llamada normalmente','Colgar la llamada de inmediato, sin reportar nada ni continuar con el resto del protocolo'], correct:1},
    {id:'c09', prompt:'Un cliente solicita "provocar" a su abusador para grabar evidencia y poder usarla en su caso de VAWA. ¿Cómo debe interpretarse esto?', options:['Como una estrategia válida que el agente puede sugerir para fortalecer el caso','Como una señal de alerta de posible fabricación de evidencia, que activa el protocolo anti-fraude','Como información que no requiere ninguna acción, ya que es decisión personal del cliente','Como un tema que debe resolverse ofreciendo una callback con el abogado para planear la grabación'], correct:1},
    {id:'c10', prompt:'¿Cuál de las siguientes es una "promesa indebida" que el agente NUNCA debe hacer?', options:['"La abogada le acompañará durante todo el proceso."','"Le mantendremos informado de cualquier actualización."','"Le garantizo que su caso será aprobado en los próximos meses."','"Vamos a escalar su solicitud para revisión."'], correct:2},
    {id:'c11', prompt:'La instrucción de Compliance Jun 2026 también prohíbe el uso de siglas o abreviaturas que hagan referencia a la discrepancia DCL en las notas. ¿Cuál de las siguientes opciones viola esa instrucción?', options:['Escribir "Se canaliza conforme al proceso aplicable."','Escribir "SID detectada, se turna a revisión."','Escribir "Se escala para revisión interna."','Escribir "Información en validación."'], correct:1},
    {id:'c12', prompt:'Un cliente en lista de no contacto pregunta directamente: "¿por qué ya no me pueden ayudar? ¿estoy en alguna lista negra?". ¿Qué NO debe hacer el agente?', options:['Mantener un tono neutral y cordial en todo momento','Confirmar al cliente que existe una lista y el motivo','Usar el speech de cierre habilitado por Compliance','Reportar la llamada en #compliance-help al finalizar'], correct:1},
    {id:'c13', prompt:'Durante una llamada, el cliente pide que el agente "ajuste" la fecha de una cita médica en una nota para que coincida con una fecha que necesita para su caso. ¿Cómo debe clasificarse esta solicitud?', options:['Como una solicitud administrativa normal que el agente puede realizar sin mayor revisión','Como manipulación de información, que requiere aplicar el script anti-fraude y reportar a Compliance','Como una solicitud que debe escalarse directamente al área de LawPay para su revisión','Como una simple solicitud de reagendar la cita de Intake o Consulta'], correct:1},
    {id:'c14', prompt:'Un agente, al notar una posible discrepancia DCL, decide no escribir nada en la nota "para no meter al cliente en problemas" y continúa la llamada con normalidad. ¿Es correcto este proceder?', options:['Sí, omitir cualquier nota es lo más seguro y discreto para el cliente','No: debe usarse una de las plantillas neutrales habilitadas y escalar conforme al proceso','Sí, siempre que sea el propio cliente quien lo pida expresamente','No, pero solo es necesario si el cliente insiste varias veces en corregir su declaración'], correct:1},
    {id:'c15', prompt:'¿Cuál de las siguientes situaciones NO activa el protocolo anti-fraude?', options:['El cliente dice "dígame qué tengo que decir para que mi caso pase"','El cliente pregunta de forma genuina sobre los tiempos de procesamiento de su caso','El cliente dice "puedo provocar a mi familiar para que me dé la evidencia que usted necesita"','El cliente dice "no le voy a mentir, eso no pasó, pero igual póngale que sí"'], correct:1},
    {id:'c16', prompt:'Tras leer el script anti-fraude, el cliente se molesta y dice "¿me están acusando de mentiroso?". ¿Qué debe hacer el agente?', options:['Disculparse por el script y decirle al cliente que fue un error generado por el sistema','Aplicar VDPC con empatía y reiterar que el script aplica a todos los clientes por igual','Retirar por completo el script de la conversación y continuar como si no hubiera pasado nada','Escalar de inmediato a Dirección y MGM únicamente por la reacción molesta del cliente'], correct:1},
    {id:'c17', prompt:'Un cliente de la lista de no contacto llama desde un número distinto al registrado. El agente pasa los filtros de seguridad y, al revisar TramCase, confirma que es el mismo cliente de la lista. ¿Qué debe hacer?', options:['Como llama desde un número diferente, tratarlo como un cliente nuevo sin ninguna restricción','Aplicar el mismo protocolo de Compliance (speech habilitado + reporte), ya que la restricción es por cliente','Pedirle con amabilidad que llame desde su número registrado y finalizar si se niega','Escalar de forma directa a Dirección sin aplicar antes el speech habilitado por Compliance'], correct:1},

function todayStr(){
  const d=new Date(); const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function buildItemList(secKey){
  if(secKey==='simulator'){
    const list=[];
    DATA.simulator.forEach((sim,si)=>{
      sim.questions.forEach((q,qi)=>{
        list.push({...q, _sim:sim, _simIndex:si, _qIndex:qi});
      });
    });
    return list;
  }
  if(secKey==='mastercase'){
    return DATA.mastercase.map(q=>({...q, _brief:DATA.mastercase_brief}));
  }
  return DATA[secKey];
}

function totalItemsInSection(sec){
  return buildItemList(sec.key).length;
}

function allItems(){
  let out=[];
  SECTIONS.forEach(s=>out.push(...buildItemList(s.key).map(it=>({...it,_section:s}))));
  return out;
}

function pct(num,den){return den===0?0:Math.round((num/den)*1000)/10;}

function fmtTime(sec){
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  const p=n=>String(n).padStart(2,'0');
  return h>0?`${p(h)}:${p(m)}:${p(s)}`:`${p(m)}:${p(s)}`;
}

/* ----- answer evaluation: returns {earned, max} ----- */
function evalItem(item){
  const a=STATE.answers[item.id];
  if(item._type==='mcq'||item._type==='escalation'){
    const max=item._weight||1;
    if(a===undefined || (Array.isArray(a) && a.length===0)) return {earned:0,max};
    if(Array.isArray(item.correct)){
      // multi-select: exact set match required
      const sel=Array.isArray(a)?[...a].sort():[];
      const req=[...item.correct].sort();
      const correct=sel.length===req.length && sel.every((v,i)=>v===req[i]);
      return {earned: correct?max:0, max};
    }
    return {earned: (a===item.correct? max:0), max};
  }
  if(item._type==='notebuild'){
    const max=item._weight||1;
    const n=item.fields.length;
    let correct=0;
    item.fields.forEach((f,i)=>{
      if(a && a[i]!==undefined && a[i]===f.correct) correct++;
    });
    return {earned: max*(correct/n), max};
  }
  if(item._type==='order4'){
    const max=item._weight||1;
    if(!a) return {earned:0,max};
    let correct=0;
    item.items.forEach((it,i)=>{
      if(a[i]!==undefined && (a[i]-1)===item.correctOrder[i]) correct++;
    });
    return {earned: max*(correct/4), max};
  }
  return {earned:0,max:1};
}

function isAnswered(item){
  const a=STATE.answers[item.id];
  if(item._type==='mcq'||item._type==='escalation') return a!==undefined && !(Array.isArray(a) && a.length===0);
  if(item._type==='notebuild') return a && a.every(v=>v!==undefined && v!=='');
  if(item._type==='order4') return a && a.every(v=>v!==undefined && v!=='');
  return false;
}

/* assign weights once */
const TYPE_MAP = {theory:'mcq', errors:'mcq', escalation:'escalation', simulator:'mcq', tramcase:'notebuild', emergencies:'order4', compliance:'mcq', mastercase:'mcq'};
function assignWeights(){
  SECTIONS.forEach(sec=>{
    const items=buildItemList(sec.key);
    const n=items.length;
    const t=TYPE_MAP[sec.key];
    items.forEach(it=>{ it._weight = sec.points/n; });
    // also tag category on items for scoring
    if(sec.key==='simulator'){
      DATA.simulator.forEach(sim=>sim.questions.forEach(q=>{q._weight=sec.points/n; q._cat=sec.key; q._type=t;}));
    } else if(sec.key==='mastercase'){
      DATA.mastercase.forEach(q=>{q._weight=sec.points/n; q._cat=sec.key; q._type=t;});
    } else {
      DATA[sec.key].forEach(q=>{q._weight=sec.points/n; q._cat=sec.key; q._type=t;});
    }
  });
}

}

    </div>

    <!-- ── RIGHT: FORMULARIO DE REGISTRO ───────────────── -->
    <div class="reg-form-wrap">
      <div class="reg-card">
        <div class="reg-head">
          <div class="seal-lg">M</div>
          <div class="eyebrow">The Mendoza Law Firm · Mendoza Learning Center</div>
          <h1>Certificación Operativa<br>Customer Service</h1>
          <p>Completa tus datos para registrar tu evaluación. El folio generado quedará vinculado a tus resultados.</p>
        </div>
        <div class="reg-form">
          <div class="field"><label>Nombre completo</label><input id="r-name" type="text" placeholder="Nombre y apellidos" value="${STATE.reg.name}"></div>
          <div class="field"><label>Team Leader</label><input id="r-tl" type="text" placeholder="Nombre de tu TL" value="${STATE.reg.tl}"></div>
          <div class="field"><label>Área</label><input id="r-area" type="text" placeholder="Inbound / Outbound / CS" value="${STATE.reg.area}"></div>
          <div class="field full"><label>Fecha</label><input id="r-date" type="date" value="${STATE.reg.date||todayStr()}"></div>
        </div>
        <div class="reg-note">8 secciones · 219 reactivos · El progreso se guarda en esta sesión.</div>
        <button class="btn btn-primary btn-block" id="r-start">Comenzar evaluación →</button>
        <div class="err-msg" id="r-err"></div>
      </div>
    </div>

  </div>`;
  document.getElementById('r-start').addEventListener('click',()=>{
    const name=document.getElementById('r-name').value.trim();
    const tl=document.getElementById('r-tl').value.trim();
    const area=document.getElementById('r-area').value.trim();
    const date=document.getElementById('r-date').value;
    const errEl=document.getElementById('r-err');
    if(!name||!tl||!area||!date){errEl.textContent='Todos los campos son obligatorios.';return;}
    STATE.reg={name,tl,area,date};
    STATE.folio='TMLF-CS-'+date.replace(/-/g,'')+'-'+Math.floor(1000+Math.random()*9000);
    STATE.startTime=Date.now();
    STATE.screen='overview';
    startTimer();
    render();
  });
}

function startTimer(){
  if(STATE.timerInterval) clearInterval(STATE.timerInterval);
  STATE.timerInterval=setInterval(()=>{
    STATE.elapsed=Math.floor((Date.now()-STATE.startTime)/1000);
    const t=document.getElementById('timer-val');
    if(t) t.textContent=fmtTime(STATE.elapsed);
  },1000);
}

function initials(name){
  return name.split(/\s+/).filter(Boolean).slice(0,2).map(w=>w[0].toUpperCase()).join('');
}

function renderSidebar(){
  const items=allItems();
  const total=items.length;
  const answered=items.filter(isAnswered).length;
  const overall=pct(answered,total);
  let secRows='';
  SECTIONS.forEach(sec=>{
    const secItems=buildItemList(sec.key);
    const done=secItems.filter(isAnswered).length;
    const isActive=STATE.screen==='section'&&STATE.currentSection===sec.id;
    const isDone=done===secItems.length;
    secRows+=`<button class="sn-item ${isActive?'active':''} ${isDone&&!isActive?'done':''}" data-goto-section="${sec.id}">
      <span class="sn-num">${isDone&&!isActive?'':sec.id}</span>
      <span class="sn-text"><span class="sn-name">${sec.title}</span><span class="sn-count">${done}/${secItems.length} respondidas</span></span>
    </button>`;
  });
  return `
  <div class="sidebar">
    <div class="brandmark">
      <div class="seal">M</div>
      <div class="tt">The Mendoza Law Firm<strong>Certificación CS</strong></div>
    </div>
    <div class="credential">
      <div class="ribbon">En curso</div>
      <div class="row">
        <div class="cred-avatar">${initials(STATE.reg.name||'??')}</div>
        <div>
          <div class="cred-name">${STATE.reg.name||'—'}</div>
          <div class="cred-meta">${STATE.reg.area||'—'} · TL: ${STATE.reg.tl||'—'}</div>
        </div>
      </div>
      <div class="cred-fields">
        <div><b>Fecha</b><span>${STATE.reg.date||'—'}</span></div>
        <div><b>Correo</b><span style="font-size:.68rem;">${STATE.reg.email||'—'}</span></div>
      </div>
      <div class="folio">Folio ${STATE.folio||'—'}</div>
    </div>
    <div class="progress-block">
      <div class="pb-top"><span class="eyebrow">Avance General</span><span class="pct">${overall}%</span></div>
      <div class="bar"><i style="width:${overall}%"></i></div>
      <div class="timer-row">
        <span>Tiempo transcurrido</span>
        <span class="tval" id="timer-val">${fmtTime(STATE.elapsed)}</span>
      </div>
    </div>
    <div class="sn-title">Ruta de Certificación</div>
    <div class="section-nav">${secRows}</div>
    <div class="sidebar-foot">TMLF Mendoza Learning Center · Uso interno · v2026</div>
  </div>`;
}

function renderOverview(){
  let cards='';
  SECTIONS.forEach(sec=>{
    cards+=`<div class="intro-card">
      <div class="num">${String(sec.id).padStart(2,'0')}</div>
      <div><h4>${sec.title}</h4><p>${sec.desc}</p><p style="margin-top:6px;"><span class="eyebrow dark">${totalItemsInSection(sec)} reactivos · ${sec.points} pts</span></p></div>
    </div>`;
  });
  return `
  <div class="section-head">
    <div class="eyebrow">Mapa de Certificación</div>
    <h2>Bienvenido/a, ${STATE.reg.name.split(' ')[0]}</h2>
    <p class="desc">Esta certificación combina conocimiento teórico, criterio operativo, escalaciones, documentación, compliance y manejo de emergencias. Avanza por las 8 secciones en cualquier orden — tu progreso se refleja en la barra lateral. Calificación aprobatoria: 90/100.</p>
  </div>
  <div class="intro-grid">${cards}</div>
  <div class="nav-row">
    <span></span>
    <div class="right"><button class="btn btn-primary" id="go-sec1">Iniciar Sección 1 →</button></div>
  </div>`;
}

function renderSectionCover(){
  const sec=SECTIONS.find(s=>s.id===STATE.currentSection);
  const items=buildItemList(sec.key);
  const answered=items.filter(isAnswered).length;
  const hasPrev=answered>0;
  const ICONS=['◈','⊘','↑','◎','▤','⚡','⊕','★'];
  const icon=ICONS[sec.id-1]||'◈';
  const typeLabels={theory:'Opción múltiple',errors:'Identificación de errores',escalation:'Selección de canal',simulator:'Análisis de caso',tramcase:'Construcción de nota',emergencies:'Ordenamiento de pasos',compliance:'Opción múltiple',mastercase:'Caso integral'};
  const typeLabel=typeLabels[sec.key]||'';
  return `
  <div class="sec-cover">
    <div class="sc-top">
      <div class="sc-progress-strip">
        ${SECTIONS.map(s=>`<div class="sc-pip ${s.id<sec.id?'past':s.id===sec.id?'active':''}"></div>`).join('')}
      </div>
      <span class="sc-step">Sección ${sec.id} de ${SECTIONS.length}</span>
    </div>

    <div class="sc-body">
      <div class="sc-icon">${icon}</div>
      <div class="sc-eyebrow">${typeLabel}</div>
      <h1 class="sc-title">${sec.title}</h1>
      <p class="sc-desc">${sec.desc}</p>

      <div class="sc-meta">
        <div class="sc-chip"><span class="sc-chip-val">${items.length}</span><span class="sc-chip-lbl">reactivos</span></div>
        <div class="sc-chip"><span class="sc-chip-val">${sec.points}</span><span class="sc-chip-lbl">puntos</span></div>
        ${hasPrev?`<div class="sc-chip sc-chip-done"><span class="sc-chip-val">${answered}</span><span class="sc-chip-lbl">respondidos</span></div>`:''}
      </div>

      <button class="btn btn-gold sc-btn" id="sc-start">
        ${hasPrev?`Continuar sección ${sec.id} →`:`Comenzar sección ${sec.id} →`}
      </button>
    </div>
  </div>`;
}

function renderSection(){
  const sec=SECTIONS.find(s=>s.id===STATE.currentSection);
  const items=buildItemList(sec.key);
  const n=items.length;
  if(STATE.currentIndex>=n) STATE.currentIndex=n-1;
  if(STATE.currentIndex<0) STATE.currentIndex=0;
  const item=items[STATE.currentIndex];
  const answeredCount=items.filter(isAnswered).length;

  let briefHtml='';
  if(sec.key==='simulator'){
    const sim=item._sim;
    briefHtml=`<div class="case-brief"><span class="tag">Simulación ${item._simIndex+1} de ${DATA.simulator.length} · ${sim.title}</span>
      ${sim.brief}
    </div>`;
  }
  if(sec.key==='mastercase'){
    briefHtml=`<div class="case-brief"><span class="tag">Caso Maestro</span>${DATA.mastercase_brief.html}</div>`;
  }

  let bodyHtml='';
  if(item._type==='mcq'){
    bodyHtml=renderMCQ(item, item.options, ['A','B','C','D']);
  } else if(item._type==='escalation'){
    bodyHtml=renderEscalation(item);
  } else if(item._type==='notebuild'){
    bodyHtml=renderNotebuild(item);
  } else if(item._type==='order4'){
    bodyHtml=renderOrder4(item);
  }

  const isFirst = STATE.currentIndex===0;
  const isLast = STATE.currentSection===SECTIONS.length && STATE.currentIndex===n-1;

  return `
  <div class="section-head">
    <div class="eyebrow">Sección ${sec.id} de ${SECTIONS.length}</div>
    <h2>${sec.title}</h2>
    <p class="desc">${sec.desc}</p>
  </div>
  <div class="q-meter">
    <span>Reactivo ${STATE.currentIndex+1} / ${n}</span>
    <div class="bar"><i style="width:${pct(answeredCount,n)}%"></i></div>
    <span>${answeredCount}/${n} respondidas</span>
  </div>
  <div class="card">
    ${briefHtml}
    ${bodyHtml}
  </div>
  <div class="nav-row">
    <button class="btn btn-ghost" id="nav-prev" ${isFirst?'disabled':''}>← Anterior</button>
    <div class="right">
      ${isLast?`<button class="btn btn-gold" id="nav-finish">Finalizar y ver resultados</button>`
              :`<button class="btn btn-primary" id="nav-next">Siguiente →</button>`}
    </div>
  </div>`;
}

function renderMCQ(item, options, letters){
  const a=STATE.answers[item.id];
  let optsHtml='';
  options.forEach((opt,i)=>{
    optsHtml+=`<div class="opt ${a===i?'selected':''}" data-mcq-id="${item.id}" data-mcq-idx="${i}">
      <span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>
    </div>`;
  });
  return `<div class="q-prompt">${item.context?`<span class="scenario">${item.context}</span>`:''}${item.prompt}</div>
  <div class="options">${optsHtml}</div>`;
}

function renderEscalation(item){
  const a=STATE.answers[item.id]||[];
  const isMulti=Array.isArray(item.correct)&&item.correct.length>1;
  let optsHtml='';
  ESCALATION_OPTIONS.forEach((opt,i)=>{
    const sel=Array.isArray(a)?a.includes(opt.k):a===opt.k;
    optsHtml+=`<div class="opt ${sel?'selected':''}" data-esc-id="${item.id}" data-esc-key="${opt.k}">
      <span class="opt-letter">${opt.k}</span><span class="opt-text">${opt.t}</span>
    </div>`;
  });
  const hint=isMulti?`<p class="q-hint" style="font-size:0.78rem;color:var(--gold);margin:4px 0 8px">Selecciona todas las que apliquen</p>`:'';
  return `<div class="q-prompt"><span class="scenario">${item.context}</span>¿Cómo debe proceder el asesor?</div>
  ${hint}<div class="options">${optsHtml}</div>`;
}

function renderNotebuild(item){
  const a=STATE.answers[item.id]||[];
  let fieldsHtml='';
  item.fields.forEach((f,i)=>{
    let optsHtml='<option value="">Selecciona…</option>';
    f.options.forEach((o,oi)=>{
      optsHtml+=`<option value="${oi}" ${a[i]===oi?'selected':''}>${o}</option>`;
    });
    fieldsHtml+=`<div class="fb-field ${f.full?'full':''}"><label>${f.label}</label><select data-nb-id="${item.id}" data-nb-field="${i}">${optsHtml}</select></div>`;
  });
  return `<div class="q-prompt"><span class="scenario">${item.context}</span>${item.prompt}</div>
  <div class="field-grid">${fieldsHtml}</div>`;
}

function renderOrder4(item){
  const a=STATE.answers[item.id]||[];
  let catsHtml='';
  ORDER_CATS.forEach((c,i)=>catsHtml+=`<span>${i+1}. ${c}</span>`);
  let rows='';
  item.items.forEach((txt,i)=>{
    let optsHtml='<option value="">—</option>';
    for(let p=1;p<=4;p++) optsHtml+=`<option value="${p}" ${a[i]===p?'selected':''}>${p}</option>`;
    rows+=`<div class="order-row"><select data-ord-id="${item.id}" data-ord-idx="${i}">${optsHtml}</select><span class="order-text">${txt}</span></div>`;
  });
  return `<div class="q-prompt"><span class="scenario">${item.context}</span>${item.prompt}</div>
  <div class="order-cats">${catsHtml}</div>
  <div class="order-list">${rows}</div>`;
}

/* =========================================================================
   RESULTS
   ========================================================================= */
function computeResults(){
  const catResults=SECTIONS.map(sec=>{
    const items=buildItemList(sec.key);
    let earned=0,max=0;
    items.forEach(it=>{const r=evalItem(it);earned+=r.earned;max+=r.max;});
    return {sec, earned, max, pct: pct(earned,max)};
  });
  const total=catResults.reduce((s,c)=>s+c.earned,0);
  return {catResults, total: Math.round(total*10)/10};
}

function classify(total){
  if(total>=90) return {label:'Certificado para Operación', cls:'ok', range:'90–100'};
  if(total>=80) return {label:'Requiere Coaching', cls:'mid', range:'80–89'};
  if(total>=70) return {label:'Reentrenamiento Parcial', cls:'warn', range:'70–79'};
  return {label:'No Aprobado', cls:'warn', range:'0–69'};
}

function renderResults(){
  const {catResults,total}=computeResults();
  const cls=classify(total);
  const strengths=catResults.filter(c=>c.pct>=85);
  const reinforce=catResults.filter(c=>c.pct>=70&&c.pct<85);
  const risk=catResults.filter(c=>c.pct<70);

  const barColor=c=>c.pct>=85?'var(--ok)':c.pct>=70?'var(--mid)':'var(--warn)';
  const pillCls=c=>c.pct>=85?'ok':c.pct>=70?'mid':'warn';

  let rows='';
  catResults.forEach(c=>{
    rows+=`<tr>
      <td><strong>${c.sec.title}</strong></td>
      <td>${c.earned.toFixed(1)} / ${c.max} pts</td>
      <td><div class="catbar"><i style="width:${c.pct}%;background:${barColor(c)}"></i></div></td>
      <td><span class="tagpill ${pillCls(c)}">${c.pct}%</span></td>
    </tr>`;
  });

  const recText = recommendation(total,cls,risk,reinforce);

  return `
  <div class="results-wrap">
    <div class="results-head">
      <div class="eyebrow">The Mendoza Law Firm · Mendoza Learning Center</div>
      <h2>Resultados de Certificación Operativa — Customer Service</h2>
      <div class="sub">${STATE.reg.name} · ${STATE.reg.area} · TL: ${STATE.reg.tl} · ${STATE.reg.date} · Folio ${STATE.folio} · Tiempo total: ${fmtTime(STATE.elapsed)}</div>
    </div>
    <div class="cred-stamp">
      <div class="stamp">
        <div class="stamp-sub">Clasificación</div>
        <div class="stamp-lvl">${cls.label}</div>
        <div class="stamp-score">${total}<span style="font-size:1.1rem;color:var(--navy);">/100</span></div>
      </div>
    </div>
    <table class="cat-table">
      <thead><tr><th>Categoría</th><th>Puntaje</th><th style="width:170px;">Desempeño</th><th>%</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="feedback-grid">
      <div class="fb-block"><h3>✓ Fortalezas</h3>${listOrEmpty(strengths,'Aún no se identifican fortalezas destacadas (≥85%).')}</div>
      <div class="fb-block"><h3>◔ Temas a Reforzar</h3>${listOrEmpty(reinforce,'No hay categorías en rango de refuerzo (70–84%).')}</div>
      <div class="fb-block full"><h3 style="color:var(--warn);">⚠ Áreas de Riesgo</h3>${listOrEmpty(risk,'No se identifican áreas de riesgo crítico (&lt;70%).')}</div>
    </div>
    <div class="rec-box">
      <h3>Recomendación Operativa</h3>
      <p>${recText}</p>
    </div>
    <div class="results-actions">
      <button class="btn btn-gold" id="btn-print">Descargar / Imprimir Reporte (PDF)</button>
      <button class="btn btn-ghost" id="btn-restart">Reiniciar evaluación</button>
    </div>
  </div>`;
}

function listOrEmpty(arr,emptyMsg){
  if(arr.length===0) return `<p style="font-size:.85rem;color:var(--ink-soft);">${emptyMsg}</p>`;
  return `<ul>${arr.map(c=>`<li><strong>${c.sec.title}</strong> — ${c.pct}% (${c.earned.toFixed(1)}/${c.max} pts)</li>`).join('')}</ul>`;
}

function recommendation(total,cls,risk,reinforce){
  if(total>=90){
    return `${STATE.reg.name.split(' ')[0]} alcanzó ${total}/100 puntos y queda <strong>certificado/a para operación sin supervisión directa</strong>. Se recomienda mantener este nivel mediante reforzamientos periódicos de los temas indicados como "a reforzar", si existen.`;
  }
  if(total>=80){
    const areas=risk.concat(reinforce).map(c=>c.sec.title).join(', ')||'las categorías marcadas';
    return `Con ${total}/100 puntos, se recomienda un <strong>plan de coaching dirigido</strong> antes de operar sin supervisión, enfocado en: ${areas}. Se sugiere sombra (shadowing) y retroalimentación 1:1 con el TL en estas áreas durante 1–2 semanas.`;
  }
  if(total>=70){
    const areas=risk.concat(reinforce).map(c=>c.sec.title).join(', ')||'múltiples categorías';
    return `Con ${total}/100 puntos, se requiere <strong>reentrenamiento parcial</strong> antes de operar sin supervisión. Prioriza: ${areas}. Se recomienda repetir esta certificación después del reentrenamiento.`;
  }
  return `Con ${total}/100 puntos, el resultado indica <strong>no aprobado</strong>. No se recomienda operación sin supervisión. Se requiere reentrenamiento integral, comenzando por las áreas de riesgo señaladas, antes de programar una nueva certificación.`;
}

/* =========================================================================
   HANDLERS
   ========================================================================= */
function attachGlobalHandlers(){
  const scStart=document.getElementById('sc-start');
  if(scStart) scStart.addEventListener('click',()=>{STATE.showCover=false;render();window.scrollTo(0,0);});

  document.querySelectorAll('[data-goto-section]').forEach(b=>{
    b.addEventListener('click',()=>{
      const newSec=parseInt(b.dataset.gotoSection,10);
      const changed=newSec!==STATE.currentSection || STATE.screen!=='section';
      STATE.currentSection=newSec;
      STATE.currentIndex=0;
      STATE.screen='section';
      STATE.showCover=changed; // show cover only when actually switching section
      render();
    });
  });
  const goSec1=document.getElementById('go-sec1');
  if(goSec1) goSec1.addEventListener('click',()=>{STATE.currentSection=1;STATE.currentIndex=0;STATE.screen='section';STATE.showCover=true;render();});

  document.querySelectorAll('[data-mcq-id]').forEach(el=>{
    el.addEventListener('click',()=>{
      STATE.answers[el.dataset.mcqId]=parseInt(el.dataset.mcqIdx,10);
      render();
      restoreScroll();
    });
  });
  document.querySelectorAll('[data-esc-id]').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.escId, key=el.dataset.escKey;
      const item=allItems().find(it=>it.id===id);
      if(item && Array.isArray(item.correct)){
        // multi-select: toggle
        const cur=Array.isArray(STATE.answers[id])?[...STATE.answers[id]]:[];
        const idx=cur.indexOf(key);
        if(idx>=0) cur.splice(idx,1); else cur.push(key);
        STATE.answers[id]=cur;
      } else {
        STATE.answers[id]=key;
      }
      render();
      restoreScroll();
    });
  });
  document.querySelectorAll('[data-nb-id]').forEach(el=>{
    el.addEventListener('change',()=>{
      const id=el.dataset.nbId, fi=parseInt(el.dataset.nbField,10);
      const arr=STATE.answers[id]||[];
      arr[fi]= el.value===''?undefined:parseInt(el.value,10);
      STATE.answers[id]=arr;
      render();
      restoreScroll();
    });
  });
  document.querySelectorAll('[data-ord-id]').forEach(el=>{
    el.addEventListener('change',()=>{
      const id=el.dataset.ordId, fi=parseInt(el.dataset.ordIdx,10);
      const arr=STATE.answers[id]||[];
      arr[fi]= el.value===''?undefined:parseInt(el.value,10);
      STATE.answers[id]=arr;
      render();
      restoreScroll();
    });
  });

  const prev=document.getElementById('nav-prev');
  if(prev) prev.addEventListener('click',()=>{
    if(STATE.currentIndex>0) STATE.currentIndex--;
    render();window.scrollTo(0,0);
  });
  const next=document.getElementById('nav-next');
  if(next) next.addEventListener('click',()=>{
    const sec=SECTIONS.find(s=>s.id===STATE.currentSection);
    const n=buildItemList(sec.key).length;
    if(STATE.currentIndex<n-1){STATE.currentIndex++;}
    else if(STATE.currentSection<SECTIONS.length){
      STATE.currentSection++;
      STATE.currentIndex=0;
      STATE.showCover=true;
    }
    render();window.scrollTo(0,0);
  });
  const finish=document.getElementById('nav-finish');
  if(finish) finish.addEventListener('click',()=>{
    STATE.screen='results';
    if(STATE.timerInterval) clearInterval(STATE.timerInterval);
    render();window.scrollTo(0,0);
  });

  const btnPrint=document.getElementById('btn-print');
  if(btnPrint) btnPrint.addEventListener('click',()=>window.print());
  const btnRestart=document.getElementById('btn-restart');
  if(btnRestart) btnRestart.addEventListener('click',()=>{
    if(confirm('¿Reiniciar la evaluación? Se perderán todas las respuestas.')){
      STATE.answers={};STATE.currentSection=1;STATE.currentIndex=0;STATE.screen='overview';STATE.elapsed=0;STATE.startTime=Date.now();startTimer();render();
    }
  });
}
let _scrollY=0;
function restoreScroll(){window.scrollTo(0,_scrollY);}
window.addEventListener('scroll',()=>{_scrollY=window.scrollY;});

/* INIT */
assignWeights();
render();
</script>
</body>
</html>
