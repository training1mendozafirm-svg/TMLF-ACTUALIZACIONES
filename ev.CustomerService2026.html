  simulator: [
    {id:'sim1', title:'Atraso de caso y cliente recurrente', brief:`<h4>Llamada inbound — I-130, cliente recurrente</h4>
      <p><span class="label">Contexto:</span> Cliente llama por la 4ª vez en el mes preguntando por el estatus de su trámite I-130. Pasa correctamente los 3 filtros de seguridad.</p>
      <p><span class="label">Historial del cliente:</span> En TramCase, las últimas notas no muestran que se haya levantado un Missing Receipt, y el caso presenta atraso frente a los tiempos vigentes de USCIS por falta del recibo inicial.</p>
      <p><span class="label">Estado emocional:</span> Frustrado pero no agresivo; repite que "ya llevo meses esperando".</p>
      <p><span class="label">Información relevante:</span> Atraso por falta de recibo inicial; 4ª llamada en el mes.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El cliente comenta que se mudó de casa hace un mes y pregunta si debe avisarlo.</p>`,
     questions:[
      {id:'sim1q1', prompt:'¿Qué harías primero?', options:['Aplicar de inmediato la metodología VDPC completa, ya que el cliente suena frustrado.','Dar el saludo corporativo y solicitar/verificar los 3 filtros de seguridad antes de continuar.','Revisar primero la hoja de tiempos de procesamiento para tener la respuesta lista.','Preguntar de inmediato si desea hacer un pago, ya que es la 4ª llamada del mes.'], correct:1},
      {id:'sim1q2', prompt:'¿Qué información solicitarías / verificarías?', options:['El número de teléfono de un familiar del cliente, por si se pierde la comunicación.','Confirmar en TramCase si ya existe un Missing Receipt levantado y revisar la fecha de envío a USCIS y los tiempos vigentes.','El correo electrónico de la abogada para que el cliente le escriba directamente.','Si el cliente desea agendar una Travel Call mientras espera respuesta de USCIS.'], correct:1},
      {id:'sim1q3', prompt:'¿Debes escalar esta situación?', options:['No, basta con explicarle al cliente que su caso sigue dentro de tiempos.','Sí, porque el caso presenta atraso y falta documentación (recibo) pendiente de gestionar.','Sí, pero únicamente porque el cliente llamó 4 veces, sin relación con el estatus del caso.','No, este tipo de situación se resuelve solo con la metodología VDPC.'], correct:1},
      {id:'sim1q4', prompt:'¿A quién corresponde escalar?', options:['Al canal de Slack #cdmx-oficina.','A Dirección y MGM directamente.','A Back Office, mediante el formulario de Missing Receipt en el Registro de llamadas.','Al canal de Slack #rfe-comunications.'], correct:2},
      {id:'sim1q5', prompt:'¿Qué Reason of Call / nota dejarías en TramCase?', options:['Case status → Regular status, sin notas adicionales.','Case status → Needs packet speed up, y marcar el caso en el apartado de Control Operativo por ser la 4ª llamada del mes.','Payment, documentando el cambio de domicilio del cliente.','Emergency, por tratarse de un caso urgente con USCIS.'], correct:1},
      {id:'sim1q6', prompt:'¿Qué errores debes evitar en esta llamada?', options:['Informar un plazo aproximado "de memoria" al cliente, y omitir el registro en Control Operativo a pesar de las llamadas recurrentes.','Ofrecer asistencia adicional al final de la llamada.','Verificar los 3 filtros de seguridad antes de dar información.','Documentar la nota en TramCase antes de despedirse.'], correct:0},
     ]},
    {id:'sim2', title:'Videollamada — revisión de documentos y cambio de domicilio', brief:`<h4>Videollamada agendada — I-485</h4>
      <p><span class="label">Contexto:</span> Videollamada agendada por DVS para revisar documentos del caso I-485. El cliente pide que se le muestre el estatus de su caso.</p>
      <p><span class="label">Historial del cliente:</span> Caso en stage de PACKETS, sin incidentes previos.</p>
      <p><span class="label">Estado emocional:</span> Tranquilo, colaborador.</p>
      <p><span class="label">Información relevante:</span> El cliente cambió de domicilio hace 2 semanas y aún no lo ha actualizado en su expediente.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El cliente comenta sobre el clima y pregunta por la salud de la abogada.</p>`,
     questions:[
      {id:'sim2q1', prompt:'¿Qué harías primero?', options:['Compartir de inmediato la pantalla con TramCase para que el cliente vea su expediente.','Realizar la verificación técnica inicial: confirmar audio, video y conexión, y conectarse desde la cuenta support para activar grabación y transcript.','Preguntar directamente por el nuevo domicilio del cliente.','Pedir 3 minutos para revisar el caso antes de saludar.'], correct:1},
      {id:'sim2q2', prompt:'¿Qué información solicitarías / verificarías?', options:['Los 3 filtros de seguridad (nombre completo, número de cliente o fecha de nacimiento, y teléfono/correo/dirección) y los datos completos del nuevo domicilio.','El nombre del médico que atendió a la abogada recientemente.','Si el cliente desea cambiar de Team Leader.','El motivo por el que el cliente eligió Google Meet en lugar de 8x8.'], correct:0},
      {id:'sim2q3', prompt:'¿Debes escalar / dar seguimiento a algo en esta llamada?', options:['No es necesario hacer nada con el cambio de domicilio.','Sí, se debe dejar nota o tarea para que el equipo correspondiente actualice el domicilio en el expediente.','Sí, se debe escalar a Dirección por el cambio de domicilio.','Sí, se debe reportar en #compliance-help.'], correct:1},
      {id:'sim2q4', prompt:'¿A quién/dónde corresponde dar seguimiento al cambio de domicilio?', options:['Al Team Leader, como emergencia.','Documentarlo en TramCase y, si aplica, dejar la tarea para el equipo correspondiente — no se requiere escalar a Dirección ni TL para un cambio de domicilio.','A Dirección y MGM.','Al canal de Slack #rfe-comunications.'], correct:1},
      {id:'sim2q5', prompt:'¿Qué Reason of Call / nota dejarías en TramCase?', options:['Incoming Call / Documents, documentando el cambio de domicilio y la revisión realizada durante la videollamada.','Outgoing Call / Chat Request, sin más detalle.','Emergency, por el cambio de domicilio.','TEXT MSG UPDATE, con el mensaje enviado al cliente.'], correct:0},
      {id:'sim2q6', prompt:'¿Qué errores debes evitar en una videollamada como esta?', options:['Confirmar que la grabación y el transcript estén activos antes de iniciar.','Compartir por error la ventana izquierda (TramCase, Dropbox, tiempos, Registro, ClickUp) en lugar de la ventana derecha.','Verificar los filtros de seguridad antes de mostrar información.','Documentar la nota en TramCase al finalizar.'], correct:1},
     ]},
    {id:'sim3', title:'Tercero solicita información — caso VAWA', brief:`<h4>Llamada de un presunto esposo — caso VAWA</h4>
      <p><span class="label">Contexto:</span> Llama un hombre diciendo ser el esposo de la clienta y pide información sobre "su" caso porque "ella está ocupada".</p>
      <p><span class="label">Historial del cliente:</span> El caso es VAWA y está en estatus ON HOLD, esperando que el abusador cumpla 21 años y 3 meses.</p>
      <p><span class="label">Estado emocional:</span> El llamante suena tranquilo y amable.</p>
      <p><span class="label">Información relevante:</span> Se trata de un caso VAWA con un tercero solicitando información — posible relación con el abusador del caso.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El llamante menciona que tienen una cita médica esa tarde.</p>`,
     questions:[
      {id:'sim3q1', prompt:'¿Qué harías primero?', options:['Confirmar el nombre completo del llamante, si es el titular del caso y, si no lo es, su relación con el cliente — sin dar información del caso.','Confirmar de inmediato que sí existe un caso VAWA a nombre de la esposa.','Explicarle que el caso está ON HOLD por el estatus del abusador.','Pedirle al llamante los 3 filtros de seguridad de la esposa para "verificarla".'], correct:0},
      {id:'sim3q2', prompt:'¿Qué información solicitarías?', options:['El número de cliente de la esposa, para localizar el caso y dárselo al esposo.','Ninguna información adicional sobre el caso; solo los datos de identidad del llamante para documentar la llamada.','Los datos del abogado del esposo.','El motivo de la cita médica que mencionó el llamante.'], correct:1},
      {id:'sim3q3', prompt:'¿Debes escalar esta llamada?', options:['Sí, siempre se escala a Dirección cuando llama un esposo.','Depende: si el llamante coopera y la llamada termina conforme al protocolo, no se requiere escalar más allá de documentar; si se torna agresivo o insiste, sí.','No, nunca se documenta ni se escala este tipo de llamadas.','Sí, se debe escalar de inmediato a #compliance-help.'], correct:1},
      {id:'sim3q4', prompt:'¿A quién corresponde escalar si el llamante se torna agresivo?', options:['A Back Office, mediante el formulario de Missing Receipt.','Al Team Leader de inmediato.','A #rfe-comunications, por tratarse de un caso VAWA.','A Dirección + MGM, sin excepción.'], correct:1},
      {id:'sim3q5', prompt:'¿Qué nota dejarías en TramCase?', options:['Plantilla obligatoria: THIRD-PARTY CALL / CASE INFORMATION REQUEST, indicando que no se proporcionó información del caso y que el titular debe comunicarse directamente.','Incoming Call / Case status, detallando el estatus ON HOLD del caso VAWA.','Outgoing Call / Chat Request, sin mencionar al llamante.','Emergency, por tratarse de un caso de violencia doméstica.'], correct:0},
      {id:'sim3q6', prompt:'¿Qué errores debes evitar?', options:['Usar el aviso de confidencialidad antes de terminar la llamada.','Confirmar que existe un caso VAWA a nombre de la esposa, o dar cualquier detalle sobre su estatus ON HOLD al llamante.','Documentar la llamada con la plantilla de terceros.','Mantener un tono calmado durante la llamada.'], correct:1},
     ]},
    {id:'sim4', title:'Pago de mensualidad con agente de Collections asignado', brief:`<h4>Llamada inbound — pago de mensualidad</h4>
      <p><span class="label">Contexto:</span> Cliente llama para ponerse al corriente con su mensualidad de $120 USD.</p>
      <p><span class="label">Historial del cliente:</span> En TramCase aparece que el cliente tiene un agente de Collections asignado (Roberto Salas).</p>
      <p><span class="label">Estado emocional:</span> Tranquilo y cooperador.</p>
      <p><span class="label">Información relevante:</span> El cliente tiene un agente de Collections ya asignado para temas de pago.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El cliente pregunta por una promoción de descuento que vio en redes sociales (no existe tal promoción).</p>`,
     questions:[
      {id:'sim4q1', prompt:'¿Qué harías primero?', options:['Procesar el cobro de inmediato ya que el cliente solicitó pagar.','Dar el saludo corporativo, verificar los filtros de seguridad y escuchar el motivo de la llamada (ponerse al corriente con su mensualidad).','Preguntar por la promoción de descuento que vio en redes sociales.','Pedir 2 minutos para documentar antes de hacer cualquier otra cosa.'], correct:1},
      {id:'sim4q2', prompt:'¿Qué información solicitarías?', options:['Si tiene un agente de Collections asignado (según TramCase) y, de tenerlo, si prefiere pagar con CS o con su agente.','El nombre de la promoción que vio en redes sociales para aplicarla.','Si desea cambiar su domicilio registrado.','Si tiene EAD vigente, por si desea viajar.'], correct:0},
      {id:'sim4q3', prompt:'¿Debes escalar esta llamada?', options:['No, siempre se procesa el pago directamente en LawPay sin más preguntas.','Depende: si el cliente tiene agente de Collections asignado y prefiere pagar con él, sí se escala; si no tiene agente, se procede directamente.','Sí, siempre se escala a Dirección cualquier pago.','Sí, se debe escalar a #rfe-comunications.'], correct:1},
      {id:'sim4q4', prompt:'¿A quién corresponde escalar si el cliente prefiere pagar con su agente?', options:['Al formulario de Collections del Registro de llamadas.','A Back Office, sin importar la respuesta del cliente.','Al Team Leader, por tratarse de un pago.','A #cdmx-oficina.'], correct:0},
      {id:'sim4q5', prompt:'Si se procede con el cobro directo, ¿qué debes documentar?', options:['Nota tipo Payment, con la fraseología de autorización leída textualmente y las 3 acciones post-cobro (copiar comprobante, dejarlo en TramCase y enviarlo por texto al cliente).','Incoming Call / Documents, sin mencionar el pago.','Emergency, por la mensualidad pendiente.','TEXT MSG UPDATE, sin nota adicional en TramCase.'], correct:0},
      {id:'sim4q6', prompt:'¿Qué errores debes evitar?', options:['Confirmar el nombre y monto correcto antes de procesar.','Cobrar sin preguntar primero por el agente de Collections, o procesar el cobro sin leer la fraseología de autorización y esperar el "sí" explícito del cliente.','Enviar el comprobante de pago al cliente.','Dejar el comprobante en las notas de TramCase.'], correct:1},
     ]},
    {id:'sim5', title:'Cancelación, demora en reembolso y amenaza de redes sociales', brief:`<h4>Llamada inbound — caso CASO CANCELADO</h4>
      <p><span class="label">Contexto:</span> Cliente con nota CASE CANCELED registrada hace 50 días hábiles, sin reembolso recibido.</p>
      <p><span class="label">Historial del cliente:</span> Cambió de cuenta bancaria recientemente.</p>
      <p><span class="label">Estado emocional:</span> Muy molesto; amenaza con publicar en Facebook y Google reviews si no recibe su dinero esta semana.</p>
      <p><span class="label">Información relevante:</span> Nota CASE CANCELED ya registrada; cambio de cuenta bancaria; amenaza de redes sociales con fecha límite.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El cliente menciona que tiene otro trámite con otra dependencia de gobierno, no relacionado con la firma.</p>`,
     questions:[
      {id:'sim5q1', prompt:'¿Qué harías primero?', options:['Explicarle de inmediato los tiempos de reembolso (30-45 días).','Aplicar VDPC: validar la emoción del cliente antes de dar cualquier explicación o información.','Decirle que publicar en redes va a afectar su caso.','Transferir la llamada a Dirección sin más.'], correct:1},
      {id:'sim5q2', prompt:'¿Qué información solicitarías / verificarías?', options:['Si tiene la nota CASE CANCELED registrada y si cambió de cuenta bancaria recientemente.','El nombre de la red social donde piensa publicar.','Si desea agendar una Travel Call.','El motivo de su otro trámite con otra dependencia de gobierno.'], correct:0},
      {id:'sim5q3', prompt:'¿Debes escalar esta llamada?', options:['No, basta con aplicar VDPC y despedirse.','Sí, por la demora en el reembolso y la amenaza de redes sociales.','Sí, pero solo se reporta en #cs-dvs.','No, se debe esperar a que el cliente se calme por sí solo.'], correct:1},
      {id:'sim5q4', prompt:'¿A quién corresponde escalar?', options:['Al Team Leader con prioridad (Hangouts o 8x8) por la amenaza de redes sociales, además del formulario de Cancelaciones.','Únicamente a Back Office.','A #rfe-comunications.','A #cdmx-oficina.'], correct:0},
      {id:'sim5q5', prompt:'¿Qué debes documentar en tiempo real?', options:['Frases clave exactas del cliente, estado de ánimo, la amenaza específica realizada, hora de escalación, estatus del caso y acciones tomadas.','Solo registrar "Cliente molesto, sin más detalle".','Registrar "CASE CANCELED" nuevamente, sin más información.','No es necesario dejar nota si ya se escaló verbalmente al TL.'], correct:0},
      {id:'sim5q6', prompt:'¿Qué errores debes evitar?', options:['Notificar al TL de inmediato.','Prometer una fecha exacta de reembolso, admitir negligencia de la firma, o minimizar la amenaza de redes sociales.','Verificar la nota CASE CANCELED antes de hablar de montos.','Documentar la conversación en TramCase.'], correct:1},
     ]},
    {id:'sim6', title:'Travel Call — cliente no cumple requisitos', brief:`<h4>Llamada inbound — solicitud de viaje urgente</h4>
      <p><span class="label">Contexto:</span> Cliente quiere viajar a su país de origen por una emergencia familiar en 3 semanas.</p>
      <p><span class="label">Historial del cliente:</span> Tiene EAD vigente desde hace 8 meses, sin Advance Parole, con aprobación de I-131 pendiente, y pasaporte vigente.</p>
      <p><span class="label">Estado emocional:</span> Ansioso, presiona por una respuesta rápida.</p>
      <p><span class="label">Información relevante:</span> Vigencia del EAD (8 meses, menor a 11 requeridos), sin Advance Parole, I-131 pendiente.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El cliente menciona que ya compró el boleto de avión.</p>`,
     questions:[
      {id:'sim6q1', prompt:'¿Qué harías primero?', options:['Decirle que sí puede viajar porque ya compró el boleto.','Revisar en TramCase y preguntar las preguntas obligatorias de viaje: tipo de visa/VAWA, contacto previo con USCIS, corte pendiente, EAD y su vigencia, Advance Parole, I-131, I-360, pasaporte y fecha de viaje.','Agendar de inmediato la Travel Call con el TL.','Decirle que no hay nada que hacer y terminar la llamada.'], correct:1},
      {id:'sim6q2', prompt:'¿Qué información solicitarías?', options:['La vigencia exacta del EAD, si tiene "Serves as I-512 Advance Parole" y si cuenta con la aprobación de I-131.','El precio del boleto de avión que compró.','Si tiene cuenta de Facebook para seguir a la abogada.','Si desea cambiar de Team Leader.'], correct:0},
      {id:'sim6q3', prompt:'¿Debes escalar para una llamada con la abogada?', options:['Sí, siempre se agenda la Travel Call sin importar los requisitos.','No amerita llamada con la abogada si no cumple los requisitos (EAD con menos de 11 meses de vigencia y sin Advance Parole/I-131), salvo que el TL lo autorice expresamente.','Sí, se debe escalar a Dirección de inmediato.','No, se le debe decir que cancele su viaje sin más explicación.'], correct:1},
      {id:'sim6q4', prompt:'¿A quién/cómo se comunica esto al cliente?', options:['Al cliente, informándole empáticamente que por el momento no es recomendable viajar; si insiste, consultar al TL.','A Back Office, para que autorice el viaje.','A #rfe-comunications.','A Dirección + MGM.'], correct:0},
      {id:'sim6q5', prompt:'¿Qué nota dejarías en TramCase?', options:['Las preguntas de viaje realizadas y las respuestas del cliente, indicando que no cumple los requisitos (vigencia de EAD insuficiente y sin Advance Parole/I-131).','No es necesario dejar nota porque no se autorizó el viaje.','Nota tipo Payment, por el costo del boleto.','Nota tipo Emergency, por la fecha próxima de viaje.'], correct:0},
      {id:'sim6q6', prompt:'¿Qué errores debes evitar?', options:['Informar empáticamente al cliente.','Agendar la Travel Call sin autorización del TL, o decirle al cliente que sí puede viajar porque ya compró el boleto.','Revisar TramCase antes de responder.','Documentar las respuestas de viaje del cliente.'], correct:1},
     ]},
    {id:'sim7', title:'Emergencia — ICE en la puerta del cliente', brief:`<h4>Llamada inbound — redada en curso</h4>
      <p><span class="label">Contexto:</span> Cliente llama en pánico diciendo que agentes de ICE están afuera de su casa en este momento, tocando la puerta.</p>
      <p><span class="label">Historial del cliente:</span> Sin incidentes previos relevantes en TramCase.</p>
      <p><span class="label">Estado emocional:</span> Pánico, voz entrecortada.</p>
      <p><span class="label">Información relevante:</span> ICE está presente AHORA, no han mostrado ninguna orden judicial.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El cliente menciona que su hijo está en la escuela.</p>`,
     questions:[
      {id:'sim7q1', prompt:'¿Qué harías primero?', options:['Pedirle al cliente que cuelgue y llame a la policía local.','Mantener la calma, informarle sus derechos (no abrir la puerta, no responder, permanecer dentro de su casa) y notificar al TL de inmediato como emergencia máxima.','Decirle que abra la puerta para evitar problemas legales.','Pedirle que firme un documento de autorización antes de continuar.'], correct:1},
      {id:'sim7q2', prompt:'¿Qué información solicitarías?', options:['Si los agentes presentaron una orden firmada por un juez (judge\'s order) con su nombre.','El nombre completo del oficial que está tocando la puerta, exigiendo que se lo confirme antes de continuar.','Si tiene pasaporte vigente para viajar.','El monto de su última mensualidad pagada.'], correct:0},
      {id:'sim7q3', prompt:'¿Debes escalar esta llamada?', options:['No, esto se resuelve solo informando los derechos del cliente.','Sí, de inmediato y con máxima prioridad — es la emergencia de mayor urgencia.','Sí, pero se puede hacer al finalizar la llamada con calma.','No, se debe transferir la llamada a LawPay.'], correct:1},
      {id:'sim7q4', prompt:'¿A quién corresponde escalar?', options:['Al Team Leader, de inmediato, como emergencia máxima.','A #cdmx-oficina.','A Back Office, sin prioridad.','A #rfe-comunications.'], correct:0},
      {id:'sim7q5', prompt:'¿Qué debes hacer respecto a la documentación / recursos para el cliente?', options:['Registro de llamadas → Emergencias, documentando lo ocurrido; compartir la Red Card con el cliente si aplica.','Case status → Regular status.','Payment, sin mención de la situación con ICE.','TEXT MSG UPDATE, sin más detalle.'], correct:0},
      {id:'sim7q6', prompt:'¿Qué errores debes evitar?', options:['Informar al cliente sus derechos con calma y claridad.','Decirle al cliente que abra la puerta o firme documentos sin asesoría legal, o especular sobre las consecuencias de la situación.','Notificar al TL de inmediato.','Mantener la calma durante toda la llamada.'], correct:1},
     ]},
    {id:'sim8', title:'Posible fraude — contacto sospechoso por WhatsApp', brief:`<h4>Llamada inbound — reporte de posible estafa</h4>
      <p><span class="label">Contexto:</span> Cliente recibió un mensaje de WhatsApp de un número desconocido pidiéndole $500 USD para "agilizar" su trámite, asegurando ser de la firma.</p>
      <p><span class="label">Historial del cliente:</span> Sin incidentes previos.</p>
      <p><span class="label">Estado emocional:</span> Preocupado pero tranquilo; tiene capturas de pantalla del mensaje.</p>
      <p><span class="label">Información relevante:</span> Mensaje de WhatsApp solicitando $500 USD, con capturas de pantalla disponibles.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El cliente pregunta si puede cambiar su número de teléfono registrado.</p>`,
     questions:[
      {id:'sim8q1', prompt:'¿Qué harías primero?', options:['Decirle al cliente que probablemente sea verdad y que pague para evitar problemas.','Agradecerle al cliente por compartir la información y explicarle que se le harán algunas preguntas para dar seguimiento.','Colgar la llamada de inmediato por seguridad.','Pedirle que bloquee el número sin más.'], correct:1},
      {id:'sim8q2', prompt:'¿Qué información solicitarías?', options:['La fecha del contacto, el canal exacto (WhatsApp), si tiene capturas de pantalla, qué le solicitaron y si llegó a realizar algún pago.','El nombre completo del remitente del mensaje.','Si desea cambiar su número de teléfono registrado, como prioridad sobre el resto.','El saldo actual de su cuenta bancaria.'], correct:0},
      {id:'sim8q3', prompt:'¿Debes escalar esta llamada?', options:['No, basta con decirle al cliente que ignore el mensaje.','Sí, todo posible intento de fraude se documenta y escala.','Solo si el cliente ya pagó el dinero solicitado.','No, se resuelve únicamente cambiando el número de teléfono registrado.'], correct:1},
      {id:'sim8q4', prompt:'¿A quién corresponde escalar?', options:['Notificar al supervisor (TL) y registrar como Fraud en el Registro de llamadas → Emergencias.','A #rfe-comunications.','A Back Office, mediante Missing Receipt.','A Dirección + MGM, sin pasar por el TL.'], correct:0},
      {id:'sim8q5', prompt:'¿Qué debes hacer al cierre de la llamada?', options:['Registrar como Fraud en Emergencias y enviarle al cliente, por mensaje de texto, las redes oficiales y datos de contacto verificados de la firma.','Case status → Regular status, sin mención del posible fraude.','Payment, documentando el monto solicitado por el estafador como si fuera un cobro real.','No es necesario dejar nota, basta con avisar verbalmente al TL.'], correct:0},
      {id:'sim8q6', prompt:'¿Qué errores debes evitar?', options:['Agradecer al cliente por reportarlo.','Asegurarle al cliente que, si ya pagó, se le devolverá el dinero, o no documentar el canal exacto de contacto ni enviarle las redes oficiales.','Pedir evidencia (capturas de pantalla).','Registrar el caso como Fraud en Emergencias.'], correct:1},
     ]},
    {id:'sim9', title:'Señales de fabricación de información — caso VAWA', brief:`<h4>Llamada inbound — evaluación de elegibilidad VAWA</h4>
      <p><span class="label">Contexto:</span> Durante una llamada sobre su elegibilidad VAWA, el cliente dice: "dígame qué tengo que decir para que mi caso se apruebe, yo le contesto lo que usted necesite".</p>
      <p><span class="label">Historial del cliente:</span> Caso en etapa de recolección de declaración (PWI).</p>
      <p><span class="label">Estado emocional:</span> Ansioso, desesperado por obtener una respuesta favorable.</p>
      <p><span class="label">Información relevante:</span> La frase del cliente es una señal de alerta directa del Disclaimer Preventivo Anti-Fraude.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El cliente comenta que tiene 3 hijos y todos están en la escuela.</p>`,
     questions:[
      {id:'sim9q1', prompt:'¿Qué harías primero?', options:['Darle un ejemplo de lo que otros clientes han dicho en casos similares para orientarlo.','Identificar la frase como una señal de alerta de posible fraude y prepararse para leer el script anti-fraude sin colgar la llamada.','Colgar la llamada de inmediato por seguridad.','Decirle que su caso no puede continuar y terminar la llamada.'], correct:1},
      {id:'sim9q2', prompt:'¿Qué información solicitarías?', options:['Ninguna información adicional sobre "qué decir"; en su lugar, se procede a leer el script anti-fraude.','Le pides que te diga exactamente qué le dijeron otros abogados que debía declarar, para anotarlo.','Cuántos hijos tiene y en qué escuela están, como prioridad.','Si desea agendar una Travel Call.'], correct:0},
      {id:'sim9q3', prompt:'¿Debes escalar esta situación?', options:['No, nunca se escala este tipo de situación.','Depende: se lee el script primero; si el cliente continúa con incoherencias o señales de fraude después, sí se escala a Compliance.','Sí, siempre se escala a Dirección de inmediato sin leer ningún script.','No, se resuelve dándole ejemplos de lo que debe decir.'], correct:1},
      {id:'sim9q4', prompt:'¿A quién corresponde escalar si las señales de fraude persisten tras el script?', options:['A Compliance, a través del canal/QR habilitado.','A #cdmx-oficina.','A Back Office mediante Missing Receipt.','A #rfe-comunications.'], correct:0},
      {id:'sim9q5', prompt:'¿Qué nota / documentación corresponde dejar?', options:['Documentar que se aplicó el disclaimer/script preventivo anti-fraude y que se envió el mensaje solicitando aceptar "ser honesto al hablar de los hechos en mi caso".','Registrar la conversación indicando exactamente qué le dijo el agente que debía declarar para que aprueben su caso.','Case status → Regular status, sin mención de la señal de alerta.','No dejar ninguna nota para evitar comprometer al cliente.'], correct:0},
      {id:'sim9q6', prompt:'¿Qué errores debes evitar?', options:['Leer el script anti-fraude completo al cliente.','Sugerirle al cliente ejemplos o ideas de qué decir para que su caso "pase", o colgar la llamada sin leer el script.','Enviar el script por mensaje de texto mientras continúa la llamada.','Reportar a Compliance si las señales de fraude persisten.'], correct:1},
     ]},
    {id:'sim10', title:'Cliente en lista de no contacto con posible discrepancia DCL', brief:`<h4>Llamada inbound — Compliance Jun 2026</h4>
      <p><span class="label">Contexto:</span> Cliente pasa los filtros de seguridad y, al confirmar en TramCase, el agente lo identifica en la lista de no contacto emitida por Compliance.</p>
      <p><span class="label">Historial del cliente:</span> Antes de ser identificado, el cliente mencionó una fecha del incidente que no coincide con su DCL registrada.</p>
      <p><span class="label">Estado emocional:</span> Tranquilo, conversador.</p>
      <p><span class="label">Información relevante:</span> Cliente en lista de no contacto + posible discrepancia DCL mencionada antes de la identificación.</p>
      <p><span class="label">Información irrelevante (distractor):</span> El cliente pregunta por el clima en la oficina de CDMX.</p>`,
     questions:[

  mastercase_brief: {html: `
    <h4>Sra. Marisol Andrade Castillo — Caso VAWA (I-360 + I-485)</h4>
    <p>Llamada inbound. La Sra. Andrade pasa los 3 filtros de seguridad correctamente. Desde el inicio de la llamada su tono es de enojo creciente.</p>
    <p><span class="label">Atraso de USCIS:</span> Su I-360 fue presentado hace 19 meses. La hoja de tiempos de procesamiento vigente indica un promedio de 16–18 meses para este trámite, y el caso aún no recibe respuesta ni recibo de actualización (Missing Receipt).</p>
    <p><span class="label">Solicitud de expediente:</span> Tiene una audiencia en corte migratoria en 30 días y necesita una copia completa de su expediente. Proporciona el nombre y teléfono con extensión de su abogado de corte.</p>
    <p><span class="label">Amenaza en redes / Bar Complaint:</span> Está muy molesta: "llevo casi 2 años esperando, ya no aguanto. Si no me resuelven esto voy a subir todo a TikTok y Facebook, y ya tengo el Bar Number de la abogada para reportarla al Colegio de Abogados."</p>
    <p><span class="label">Travel Call:</span> En 3 semanas quiere viajar a México porque su madre tiene una cirugía programada. Tiene EAD vigente con Advance Parole aprobado, pero el sistema muestra que tuvo una entrevista con USCIS hace 4 meses por un trámite anterior.</p>
    <p><span class="label">Información contradictoria (DCL):</span> Durante la llamada menciona que el incidente descrito en su DCL ocurrió "en 2021", pero la DCL registrada en el expediente indica 2019. Dice: "creo que nos equivocamos al llenarlo al principio, fue en 2021."</p>
    <p><span class="label">Posible fraude:</span> Hacia el final agrega: "mi prima me dijo que también le ponga que hubo abuso económico, aunque eso no pasó, para que se vea más fuerte el caso ante el juez."</p>
    <p><span class="label">Información irrelevante:</span> La clienta también comenta que cambió de número de teléfono hace un mes, y que su hijo menor cumple años esta semana.</p>
  `},

const STATE = {
  screen:'register', // register | overview | section | results
  reg:{name:'',tl:'',area:'',date:'',email:''},

function todayStr(){
  const d=new Date(); const p=n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
}

function buildItemList(secKey){
  if(secKey==='simulator'){
    const list=[];
    DATA.simulator.forEach((sim,si)=>{
      sim.questions.forEach((q,qi)=>{
        list.push({...q, _sim:sim, _simIndex:si, _qIndex:qi});
      });
    });
    return list;
  }
  if(secKey==='mastercase'){
    return DATA.mastercase.map(q=>({...q, _brief:DATA.mastercase_brief}));
  }
  return DATA[secKey];
}

function totalItemsInSection(sec){
  return buildItemList(sec.key).length;
}

function allItems(){
  let out=[];
  SECTIONS.forEach(s=>out.push(...buildItemList(s.key).map(it=>({...it,_section:s}))));
  return out;
}

function pct(num,den){return den===0?0:Math.round((num/den)*1000)/10;}

function fmtTime(sec){
  const h=Math.floor(sec/3600), m=Math.floor((sec%3600)/60), s=sec%60;
  const p=n=>String(n).padStart(2,'0');
  return h>0?`${p(h)}:${p(m)}:${p(s)}`:`${p(m)}:${p(s)}`;
}

/* ----- answer evaluation: returns {earned, max} ----- */
function evalItem(item){
  const a=STATE.answers[item.id];
  if(item._type==='mcq'||item._type==='escalation'){
    const max=item._weight||1;
    if(a===undefined) return {earned:0,max};
    return {earned: (a===item.correct? max:0), max};
  }
  if(item._type==='notebuild'){
    const max=item._weight||1;
    const n=item.fields.length;
    let correct=0;
    item.fields.forEach((f,i)=>{
      if(a && a[i]!==undefined && a[i]===f.correct) correct++;
    });
    return {earned: max*(correct/n), max};
  }
  if(item._type==='order4'){
    const max=item._weight||1;
    if(!a) return {earned:0,max};
    let correct=0;
    item.items.forEach((it,i)=>{
      if(a[i]!==undefined && (a[i]-1)===item.correctOrder[i]) correct++;
    });
    return {earned: max*(correct/4), max};
  }
  return {earned:0,max:1};
}

function isAnswered(item){
  const a=STATE.answers[item.id];
  if(item._type==='mcq'||item._type==='escalation') return a!==undefined;
  if(item._type==='notebuild') return a && a.every(v=>v!==undefined && v!=='');
  if(item._type==='order4') return a && a.every(v=>v!==undefined && v!=='');
  return false;
}

/* assign weights once */
const TYPE_MAP = {theory:'mcq', errors:'mcq', escalation:'escalation', simulator:'mcq', tramcase:'notebuild', emergencies:'order4', compliance:'mcq', mastercase:'mcq'};
function assignWeights(){
  SECTIONS.forEach(sec=>{
    const items=buildItemList(sec.key);
    const n=items.length;
    const t=TYPE_MAP[sec.key];
    items.forEach(it=>{ it._weight = sec.points/n; });
    // also tag category on items for scoring
    if(sec.key==='simulator'){
      DATA.simulator.forEach(sim=>sim.questions.forEach(q=>{q._weight=sec.points/n; q._cat=sec.key; q._type=t;}));
    } else if(sec.key==='mastercase'){
      DATA.mastercase.forEach(q=>{q._weight=sec.points/n; q._cat=sec.key; q._type=t;});
    } else {
      DATA[sec.key].forEach(q=>{q._weight=sec.points/n; q._cat=sec.key; q._type=t;});
    }
  });
}

}

function renderSection(){
  const sec=SECTIONS.find(s=>s.id===STATE.currentSection);
  const items=buildItemList(sec.key);
  const n=items.length;
  if(STATE.currentIndex>=n) STATE.currentIndex=n-1;
  if(STATE.currentIndex<0) STATE.currentIndex=0;
  const item=items[STATE.currentIndex];
  const answeredCount=items.filter(isAnswered).length;

  let briefHtml='';
  if(sec.key==='simulator'){
    const sim=item._sim;
    briefHtml=`<div class="case-brief"><span class="tag">Simulación ${item._simIndex+1} de ${DATA.simulator.length} · ${sim.title}</span>
      ${sim.brief}
    </div>`;
  }
  if(sec.key==='mastercase'){
    briefHtml=`<div class="case-brief"><span class="tag">Caso Maestro</span>${DATA.mastercase_brief.html}</div>`;
  }

  let bodyHtml='';
  if(item._type==='mcq'){
    bodyHtml=renderMCQ(item, item.options, ['A','B','C','D']);
  } else if(item._type==='escalation'){
    bodyHtml=renderEscalation(item);
  } else if(item._type==='notebuild'){
    bodyHtml=renderNotebuild(item);
  } else if(item._type==='order4'){
    bodyHtml=renderOrder4(item);
  }

  const isFirst = STATE.currentSection===1 && STATE.currentIndex===0;
  const isLast = STATE.currentSection===SECTIONS.length && STATE.currentIndex===n-1;

  return `
  <div class="section-head">
    <div class="eyebrow">Sección ${sec.id} de ${SECTIONS.length}</div>
    <h2>${sec.title}</h2>
    <p class="desc">${sec.desc}</p>

    <button class="btn btn-ghost" id="nav-prev" ${isFirst?'disabled':''}>← Anterior</button>

              :`<button class="btn btn-primary" id="nav-next">Siguiente →</button>`}

  </div>`;
}

function renderMCQ(item, options, letters){
  const a=STATE.answers[item.id];
  let optsHtml='';
  options.forEach((opt,i)=>{
    optsHtml+=`<div class="opt ${a===i?'selected':''}" data-mcq-id="${item.id}" data-mcq-idx="${i}">
      <span class="opt-letter">${letters[i]}</span><span class="opt-text">${opt}</span>
    </div>`;
  });
  return `<div class="q-prompt">${item.context?`<span class="scenario">${item.context}</span>`:''}${item.prompt}</div>
  <div class="options">${optsHtml}</div>`;
}

function renderEscalation(item){
  const a=STATE.answers[item.id];
  let optsHtml='';
  ESCALATION_OPTIONS.forEach((opt,i)=>{
    optsHtml+=`<div class="opt ${a===opt.k?'selected':''}" data-esc-id="${item.id}" data-esc-key="${opt.k}">
      <span class="opt-letter">${opt.k}</span><span class="opt-text">${opt.t}</span>
    </div>`;
  });
  return `<div class="q-prompt"><span class="scenario">${item.context}</span>¿Cómo debe proceder el asesor?</div>
  <div class="options">${optsHtml}</div>`;
}

function renderNotebuild(item){
  const a=STATE.answers[item.id]||[];
  let fieldsHtml='';
  item.fields.forEach((f,i)=>{
    let optsHtml='<option value="">Selecciona…</option>';
    f.options.forEach((o,oi)=>{
      optsHtml+=`<option value="${oi}" ${a[i]===oi?'selected':''}>${o}</option>`;
    });
    fieldsHtml+=`<div class="fb-field ${f.full?'full':''}"><label>${f.label}</label><select data-nb-id="${item.id}" data-nb-field="${i}">${optsHtml}</select></div>`;
  });
  return `<div class="q-prompt"><span class="scenario">${item.context}</span>${item.prompt}</div>
  <div class="field-grid">${fieldsHtml}</div>`;
}

function renderOrder4(item){
  const a=STATE.answers[item.id]||[];
  let catsHtml='';
  ORDER_CATS.forEach((c,i)=>catsHtml+=`<span>${i+1}. ${c}</span>`);
  let rows='';
  item.items.forEach((txt,i)=>{
    let optsHtml='<option value="">—</option>';
    for(let p=1;p<=4;p++) optsHtml+=`<option value="${p}" ${a[i]===p?'selected':''}>${p}</option>`;
    rows+=`<div class="order-row"><select data-ord-id="${item.id}" data-ord-idx="${i}">${optsHtml}</select><span class="order-text">${txt}</span></div>`;
  });
  return `<div class="q-prompt"><span class="scenario">${item.context}</span>${item.prompt}</div>
  <div class="order-cats">${catsHtml}</div>
  <div class="order-list">${rows}</div>`;
}

/* =========================================================================
   RESULTS
   ========================================================================= */
function computeResults(){
  const catResults=SECTIONS.map(sec=>{
    const items=buildItemList(sec.key);
    let earned=0,max=0;
    items.forEach(it=>{const r=evalItem(it);earned+=r.earned;max+=r.max;});
    return {sec, earned, max, pct: pct(earned,max)};
  });
  const total=catResults.reduce((s,c)=>s+c.earned,0);
  return {catResults, total: Math.round(total*10)/10};
}

function classify(total){
  if(total>=90) return {label:'Certificado para Operación', cls:'ok', range:'90–100'};
  if(total>=80) return {label:'Requiere Coaching', cls:'mid', range:'80–89'};
  if(total>=70) return {label:'Reentrenamiento Parcial', cls:'warn', range:'70–79'};
  return {label:'No Aprobado', cls:'warn', range:'0–69'};
}

function renderResults(){
  const {catResults,total}=computeResults();
  const cls=classify(total);
  const strengths=catResults.filter(c=>c.pct>=85);
  const reinforce=catResults.filter(c=>c.pct>=70&&c.pct<85);
  const risk=catResults.filter(c=>c.pct<70);

  const barColor=c=>c.pct>=85?'var(--ok)':c.pct>=70?'var(--mid)':'var(--warn)';
  const pillCls=c=>c.pct>=85?'ok':c.pct>=70?'mid':'warn';

  let rows='';
  catResults.forEach(c=>{
    rows+=`<tr>
      <td><strong>${c.sec.title}</strong></td>
      <td>${c.earned.toFixed(1)} / ${c.max} pts</td>
      <td><div class="catbar"><i style="width:${c.pct}%;background:${barColor(c)}"></i></div></td>
      <td><span class="tagpill ${pillCls(c)}">${c.pct}%</span></td>
    </tr>`;
  });

  const recText = recommendation(total,cls,risk,reinforce);

  return `
  <div class="results-wrap">
    <div class="results-head">
      <div class="eyebrow">The Mendoza Law Firm · Mendoza Learning Center</div>
      <h2>Resultados de Certificación Operativa — Customer Service</h2>
      <div class="sub">${STATE.reg.name} · ${STATE.reg.area} · TL: ${STATE.reg.tl} · ${STATE.reg.date} · Folio ${STATE.folio} · Tiempo total: ${fmtTime(STATE.elapsed)}</div>
    </div>
    <div class="cred-stamp">
      <div class="stamp">
        <div class="stamp-sub">Clasificación</div>
        <div class="stamp-lvl">${cls.label}</div>
        <div class="stamp-score">${total}<span style="font-size:1.1rem;color:var(--navy);">/100</span></div>
      </div>
    </div>
    <table class="cat-table">
      <thead><tr><th>Categoría</th><th>Puntaje</th><th style="width:170px;">Desempeño</th><th>%</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="feedback-grid">
      <div class="fb-block"><h3>✓ Fortalezas</h3>${listOrEmpty(strengths,'Aún no se identifican fortalezas destacadas (≥85%).')}</div>
      <div class="fb-block"><h3>◔ Temas a Reforzar</h3>${listOrEmpty(reinforce,'No hay categorías en rango de refuerzo (70–84%).')}</div>
      <div class="fb-block full"><h3 style="color:var(--warn);">⚠ Áreas de Riesgo</h3>${listOrEmpty(risk,'No se identifican áreas de riesgo crítico (&lt;70%).')}</div>
    </div>
    <div class="rec-box">
      <h3>Recomendación Operativa</h3>
      <p>${recText}</p>
    </div>
    <div class="results-actions">
      <button class="btn btn-gold" id="btn-print">Descargar / Imprimir Reporte (PDF)</button>
      <button class="btn btn-ghost" id="btn-restart">Reiniciar evaluación</button>
    </div>
  </div>`;
}

function listOrEmpty(arr,emptyMsg){
  if(arr.length===0) return `<p style="font-size:.85rem;color:var(--ink-soft);">${emptyMsg}</p>`;
  return `<ul>${arr.map(c=>`<li><strong>${c.sec.title}</strong> — ${c.pct}% (${c.earned.toFixed(1)}/${c.max} pts)</li>`).join('')}</ul>`;
}

function recommendation(total,cls,risk,reinforce){
  if(total>=90){
    return `${STATE.reg.name.split(' ')[0]} alcanzó ${total}/100 puntos y queda <strong>certificado/a para operación sin supervisión directa</strong>. Se recomienda mantener este nivel mediante reforzamientos periódicos de los temas indicados como "a reforzar", si existen.`;
  }
  if(total>=80){
    const areas=risk.concat(reinforce).map(c=>c.sec.title).join(', ')||'las categorías marcadas';
    return `Con ${total}/100 puntos, se recomienda un <strong>plan de coaching dirigido</strong> antes de operar sin supervisión, enfocado en: ${areas}. Se sugiere sombra (shadowing) y retroalimentación 1:1 con el TL en estas áreas durante 1–2 semanas.`;
  }
  if(total>=70){
    const areas=risk.concat(reinforce).map(c=>c.sec.title).join(', ')||'múltiples categorías';
    return `Con ${total}/100 puntos, se requiere <strong>reentrenamiento parcial</strong> antes de operar sin supervisión. Prioriza: ${areas}. Se recomienda repetir esta certificación después del reentrenamiento.`;
  }
  return `Con ${total}/100 puntos, el resultado indica <strong>no aprobado</strong>. No se recomienda operación sin supervisión. Se requiere reentrenamiento integral, comenzando por las áreas de riesgo señaladas, antes de programar una nueva certificación.`;
}

/* =========================================================================
   HANDLERS
   ========================================================================= */
function attachGlobalHandlers(){
  document.querySelectorAll('[data-goto-section]').forEach(b=>{
    b.addEventListener('click',()=>{
      STATE.currentSection=parseInt(b.dataset.gotoSection,10);
      STATE.currentIndex=0;
      STATE.screen='section';
      render();
    });
  });
  const goSec1=document.getElementById('go-sec1');
  if(goSec1) goSec1.addEventListener('click',()=>{STATE.currentSection=1;STATE.currentIndex=0;STATE.screen='section';render();});

  document.querySelectorAll('[data-mcq-id]').forEach(el=>{
    el.addEventListener('click',()=>{
      STATE.answers[el.dataset.mcqId]=parseInt(el.dataset.mcqIdx,10);
      render();
      restoreScroll();
    });
  });
  document.querySelectorAll('[data-esc-id]').forEach(el=>{
    el.addEventListener('click',()=>{
      STATE.answers[el.dataset.escId]=el.dataset.escKey;
      render();
      restoreScroll();
    });
  });
  document.querySelectorAll('[data-nb-id]').forEach(el=>{
    el.addEventListener('change',()=>{
      const id=el.dataset.nbId, fi=parseInt(el.dataset.nbField,10);
      const arr=STATE.answers[id]||[];
      arr[fi]= el.value===''?undefined:parseInt(el.value,10);
      STATE.answers[id]=arr;
      render();
      restoreScroll();
    });
  });
  document.querySelectorAll('[data-ord-id]').forEach(el=>{
    el.addEventListener('change',()=>{
      const id=el.dataset.ordId, fi=parseInt(el.dataset.ordIdx,10);
      const arr=STATE.answers[id]||[];
      arr[fi]= el.value===''?undefined:parseInt(el.value,10);
      STATE.answers[id]=arr;
      render();
      restoreScroll();
    });
  });

  const prev=document.getElementById('nav-prev');
  if(prev) prev.addEventListener('click',()=>{
    if(STATE.currentIndex>0){STATE.currentIndex--;}
    else if(STATE.currentSection>1){STATE.currentSection--;STATE.currentIndex=buildItemList(SECTIONS[STATE.currentSection-1].key).length-1;}
    render();window.scrollTo(0,0);
  });
  const next=document.getElementById('nav-next');
  if(next) next.addEventListener('click',()=>{
    const sec=SECTIONS.find(s=>s.id===STATE.currentSection);
    const n=buildItemList(sec.key).length;
    if(STATE.currentIndex<n-1){STATE.currentIndex++;}
    else if(STATE.currentSection<SECTIONS.length){STATE.currentSection++;STATE.currentIndex=0;}
    render();window.scrollTo(0,0);
  });
  const finish=document.getElementById('nav-finish');
  if(finish) finish.addEventListener('click',()=>{
    STATE.screen='results';
    if(STATE.timerInterval) clearInterval(STATE.timerInterval);
    render();window.scrollTo(0,0);
  });

  const btnPrint=document.getElementById('btn-print');
  if(btnPrint) btnPrint.addEventListener('click',()=>window.print());
  const btnRestart=document.getElementById('btn-restart');
  if(btnRestart) btnRestart.addEventListener('click',()=>{
    if(confirm('¿Reiniciar la evaluación? Se perderán todas las respuestas.')){
      STATE.answers={};STATE.currentSection=1;STATE.currentIndex=0;STATE.screen='overview';STATE.elapsed=0;STATE.startTime=Date.now();startTimer();render();
    }
  });
}
let _scrollY=0;
function restoreScroll(){window.scrollTo(0,_scrollY);}
window.addEventListener('scroll',()=>{_scrollY=window.scrollY;});

/* INIT */
assignWeights();
render();
</script>

</html>
