<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificación Operativa CS — The Mendoza Law Firm</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f1f3a;
  --navy-2:#173159;
  --navy-3:#21477c;
  --gold:#c9a227;
  --gold-light:#e8cd6c;
  --cream:#f7f2e6;
  --cream-deep:#eee4cd;
  --paper:#fffdf8;
  --ink:#1c1c1c;
  --ink-soft:#5b5b56;
  --line:rgba(16,32,60,.14);
  --ok:#2f7d4f;
  --ok-bg:#e7f1ea;
  --warn:#b3402a;
  --warn-bg:#f7e9e4;
  --mid:#a3791f;
  --mid-bg:#f6efdc;
  --radius:10px;
  --shadow:0 10px 30px -12px rgba(15,31,58,.35);
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--cream);
  color:var(--ink);
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}
h1,h2,h3,h4{font-family:'Cormorant Garamond',serif;font-weight:600;margin:0;color:var(--navy);}
.eyebrow{
  font-family:'Barlow Condensed',sans-serif;
  text-transform:uppercase;
  letter-spacing:.18em;
  font-size:.72rem;
  font-weight:600;
  color:var(--gold);
}
.eyebrow.dark{color:var(--navy-3);}
button{font-family:'DM Sans',sans-serif;cursor:pointer;}
a{color:var(--navy-3);}

/* ===================== LAYOUT ===================== */
#app{min-height:100vh;}
.app-shell{display:flex;min-height:100vh;}
.sidebar{
  width:308px;flex:0 0 308px;
  background:linear-gradient(180deg,var(--navy) 0%, var(--navy-2) 100%);
  color:#eef2f8;padding:28px 22px;display:flex;flex-direction:column;gap:22px;
  position:sticky;top:0;height:100vh;overflow-y:auto;
}
.main{flex:1;min-width:0;padding:36px 48px 80px;}
.brandmark{display:flex;align-items:center;gap:12px;}
.brandmark .seal{
  width:42px;height:42px;border:2px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--gold);font-size:1.1rem;
  flex:none;
}
.brandmark .tt{font-family:'Barlow Condensed',sans-serif;letter-spacing:.14em;text-transform:uppercase;font-size:.68rem;color:#b9c4d8;}
.brandmark .tt strong{display:block;font-size:.92rem;letter-spacing:.06em;color:#fff;font-weight:600;font-family:'DM Sans',sans-serif;margin-top:2px;}

/* Credential card */
.credential{
  background:linear-gradient(160deg,#13284a, #0c1830);
  border:1px solid rgba(201,162,39,.35);
  border-radius:var(--radius);
  padding:16px 16px 14px;
  position:relative;overflow:hidden;
}
.credential::before{
  content:"";position:absolute;top:-30px;right:-30px;width:110px;height:110px;
  background:radial-gradient(circle, rgba(201,162,39,.25), transparent 70%);
}
.credential .ribbon{
  position:absolute;top:10px;right:-26px;background:var(--gold);color:var(--navy);
  font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.14em;
  text-transform:uppercase;padding:3px 30px;transform:rotate(35deg);
  box-shadow:0 2px 8px rgba(0,0,0,.25);
}
.credential .row{display:flex;gap:12px;align-items:flex-start;}
.cred-avatar{
  width:46px;height:46px;border-radius:8px;background:rgba(201,162,39,.16);
  border:1px solid rgba(201,162,39,.4);display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--gold-light);font-size:1.25rem;flex:none;
}
.cred-name{font-family:'Cormorant Garamond',serif;font-size:1.18rem;color:#fff;font-weight:600;line-height:1.15;}
.cred-meta{font-size:.72rem;color:#aab8cf;margin-top:2px;}
.cred-fields{margin-top:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;font-size:.74rem;color:#cfd8e8;border-top:1px dashed rgba(201,162,39,.3);padding-top:10px;}
.cred-fields b{display:block;font-family:'Barlow Condensed',sans-serif;letter-spacing:.1em;text-transform:uppercase;font-size:.6rem;color:#8ea0bf;font-weight:600;margin-bottom:1px;}
.cred-fields span{color:#f1f4fa;font-weight:500;}
.folio{margin-top:10px;font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.18em;text-transform:uppercase;color:#7e90ad;}

/* Progress overall */
.progress-block .pb-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.progress-block .pb-top .pct{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--gold-light);}
.bar{height:6px;border-radius:6px;background:rgba(255,255,255,.08);overflow:hidden;}
.bar > i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:6px;transition:width .35s ease;}
.timer-row{display:flex;align-items:center;justify-content:space-between;font-family:'Barlow Condensed',sans-serif;letter-spacing:.06em;font-size:.78rem;color:#cfd8e8;margin-top:4px;}
.timer-row .tval{font-size:1.05rem;color:#fff;font-weight:600;}
.toggle{
  width:34px;height:18px;border-radius:10px;background:rgba(255,255,255,.14);position:relative;border:none;flex:none;
}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:#fff;transition:left .15s ease;}
.toggle.on{background:var(--gold);}
.toggle.on::after{left:18px;}

/* Section nav */
.section-nav{display:flex;flex-direction:column;gap:3px;flex:1;}
.sn-title{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.18em;font-size:.66rem;color:#8ea0bf;margin:4px 0 6px 4px;}
.sn-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;
  background:transparent;border:1px solid transparent;color:#c4cee2;text-align:left;width:100%;
  font-size:.84rem;transition:background .15s ease;
}
.sn-item:hover{background:rgba(255,255,255,.05);}
.sn-item.active{background:rgba(201,162,39,.14);border-color:rgba(201,162,39,.35);color:#fff;}
.sn-num{
  width:24px;height:24px;border-radius:50%;border:1.5px solid #50658a;display:flex;align-items:center;justify-content:center;
  font-family:'Barlow Condensed',sans-serif;font-size:.74rem;font-weight:700;flex:none;color:#aab8cf;
}
.sn-item.active .sn-num{border-color:var(--gold);color:var(--gold-light);}
.sn-item.done .sn-num{background:var(--gold);border-color:var(--gold);color:var(--navy);}
.sn-item.done .sn-num::after{content:"✓";}
.sn-text{flex:1;}
.sn-text .sn-name{display:block;font-weight:500;}
.sn-text .sn-count{display:block;font-size:.66rem;color:#7e90ad;font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;}

.sidebar-foot{font-family:'Barlow Condensed',sans-serif;font-size:.64rem;letter-spacing:.1em;color:#6f82a3;text-transform:uppercase;border-top:1px solid rgba(255,255,255,.08);padding-top:12px;}

/* ===================== REGISTRATION ===================== */
.reg-screen{
  min-height:100vh;display:flex;align-items:stretch;
  background:
    radial-gradient(circle at 18% 20%, rgba(201,162,39,.10), transparent 45%),
    radial-gradient(circle at 85% 80%, rgba(33,71,124,.18), transparent 45%),
    var(--navy);
}
/* ── left panel ── */
.reg-instr{
  flex:0 0 340px;padding:56px 40px 48px;
  display:flex;flex-direction:column;
  border-right:1px solid rgba(255,255,255,.07);
  background:rgba(0,0,0,.12);
}
.reg-instr .ri-logo{
  display:flex;align-items:center;gap:12px;margin-bottom:40px;
}
.reg-instr .ri-seal{
  width:40px;height:40px;flex-shrink:0;border:1.5px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'Cormorant Garamond',serif;font-weight:700;color:var(--gold);font-size:1.1rem;
}
.reg-instr .ri-brand{
  font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.15em;color:rgba(255,255,255,.4);
  line-height:1.4;
}
.reg-instr h2{
  font-size:1.55rem;color:#fff;font-weight:600;line-height:1.25;margin-bottom:6px;
}
.reg-instr .ri-tagline{
  font-size:.8rem;color:rgba(255,255,255,.4);margin-bottom:32px;letter-spacing:.01em;
}
.ri-rules{
  list-style:none;margin:0;padding:0;
  display:flex;flex-direction:column;
  border-top:1px solid rgba(255,255,255,.07);
}
.ri-rules li{
  display:flex;align-items:baseline;gap:12px;
  padding:13px 0;
  border-bottom:1px solid rgba(255,255,255,.07);
}
.ri-rules li .ri-dot{
  flex-shrink:0;width:5px;height:5px;border-radius:50%;
  background:var(--gold);opacity:.7;margin-top:2px;
}
.ri-rules li p{
  margin:0;font-size:.8rem;color:rgba(255,255,255,.6);line-height:1.5;
}
.ri-rules li p strong{
  color:rgba(255,255,255,.88);font-weight:600;display:block;margin-bottom:1px;
  font-size:.82rem;
}
.ri-footer{
  margin-top:auto;padding-top:28px;
  font-size:.73rem;color:rgba(255,255,255,.3);line-height:1.5;
  border-top:1px solid rgba(255,255,255,.07);
}
.ri-footer span{color:var(--gold);opacity:.7;}
/* ── right form area ── */
.reg-form-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:40px 48px;
}
.reg-card{
  max-width:480px;width:100%;background:var(--paper);border-radius:14px;padding:42px 44px 38px;
  box-shadow:var(--shadow);position:relative;border:1px solid var(--line);
}
.reg-card::before{
  content:"";position:absolute;inset:14px;border:1px solid rgba(201,162,39,.35);border-radius:8px;pointer-events:none;
}
.reg-head{text-align:center;margin-bottom:26px;}
.reg-head .seal-lg{
  width:64px;height:64px;margin:0 auto 14px;border:2px solid var(--gold);border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-weight:700;
  color:var(--gold);font-size:1.6rem;
}
.reg-head h1{font-size:1.9rem;margin-bottom:4px;}
.reg-head p{color:var(--ink-soft);font-size:.92rem;max-width:420px;margin:8px auto 0;}
.reg-form{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:22px;}
.reg-form .full{grid-column:1/-1;}
.field label{
  display:block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.12em;
  font-size:.68rem;font-weight:600;color:var(--navy-3);margin-bottom:6px;
}
.field input{
  width:100%;padding:11px 13px;border:1px solid var(--line);border-radius:8px;font-size:.92rem;
  font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);
}
.field input:focus{outline:none;border-color:var(--gold);background:#fff;}
.reg-note{
  margin-top:20px;font-size:.78rem;color:var(--ink-soft);background:var(--cream);border-radius:8px;padding:12px 14px;
  border-left:3px solid var(--gold);
}
.btn{
  border:none;border-radius:8px;padding:13px 26px;font-weight:600;font-size:.92rem;
  display:inline-flex;align-items:center;gap:8px;justify-content:center;transition:transform .1s ease, box-shadow .1s ease;
}
.btn-primary{background:var(--navy);color:#fff;}
.btn-primary:hover:not(:disabled){background:var(--navy-3);}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;}
.btn-gold{background:var(--gold);color:var(--navy);}
.btn-gold:hover{background:var(--gold-light);}
.btn-ghost{background:transparent;color:var(--navy);border:1px solid var(--line);}
.btn-ghost:hover{border-color:var(--navy-3);}
.btn-block{width:100%;margin-top:24px;justify-content:center;}
.err-msg{color:var(--warn);font-size:.74rem;margin-top:14px;text-align:center;min-height:1em;}

/* ===================== MAIN CONTENT ===================== */
.section-head{margin-bottom:22px;}
.section-head .eyebrow{margin-bottom:6px;}
.section-head h2{font-size:1.95rem;margin-bottom:6px;}
.section-head .desc{color:var(--ink-soft);font-size:.93rem;max-width:780px;}
.q-meter{
  display:flex;align-items:center;justify-content:space-between;margin:18px 0 22px;
  font-family:'Barlow Condensed',sans-serif;letter-spacing:.08em;font-size:.78rem;color:var(--ink-soft);
  text-transform:uppercase;
}
.q-meter .bar{flex:1;margin:0 16px;background:var(--cream-deep);}
.q-meter .bar>i{background:linear-gradient(90deg,var(--navy-3),var(--gold));}

.card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:28px 30px;box-shadow:var(--shadow);
}
.case-brief{
  background:var(--cream-deep);border-radius:var(--radius);padding:20px 22px;margin-bottom:20px;
  border-left:4px solid var(--navy-3);
}
.case-brief h4{font-size:1.15rem;margin-bottom:8px;}
.case-brief .tag{
  display:inline-block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;
  font-size:.62rem;font-weight:700;background:var(--navy);color:var(--gold-light);padding:3px 9px;border-radius:4px;margin-bottom:8px;
}
.case-brief p{font-size:.9rem;margin:6px 0;}
.case-brief .label{font-weight:700;color:var(--navy);}

.q-prompt{font-size:1.08rem;margin-bottom:18px;line-height:1.6;}
.q-prompt .scenario{display:block;color:var(--ink-soft);font-size:.92rem;margin-bottom:10px;font-style:italic;}

.options{display:flex;flex-direction:column;gap:10px;}
.opt{
  display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--line);border-radius:8px;
  cursor:pointer;background:var(--cream);transition:all .12s ease;
}
.opt:hover{border-color:var(--navy-3);background:#fff;}
.opt.selected{border-color:var(--gold);background:var(--cream-deep);box-shadow:0 0 0 1px var(--gold) inset;}
.opt .opt-letter{
  flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--navy-3);color:var(--navy-3);
  display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:.8rem;
}
.opt.selected .opt-letter{background:var(--gold);border-color:var(--gold);color:var(--navy);}
.opt .opt-text{font-size:.92rem;padding-top:2px;}

/* note builder fields */
.field-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.field-grid .full{grid-column:1/-1;}
.fb-field label{
  display:block;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;
  font-size:.68rem;font-weight:700;color:var(--navy-3);margin-bottom:6px;
}
.fb-field select{
  width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;background:var(--cream);
  font-family:'DM Sans',sans-serif;font-size:.86rem;color:var(--ink);
}
.fb-field select:focus{outline:none;border-color:var(--gold);}

/* order4 */
.order-list{display:flex;flex-direction:column;gap:10px;}
.order-row{display:flex;align-items:center;gap:14px;padding:12px 14px;border:1px solid var(--line);border-radius:8px;background:var(--cream);}
.order-row select{
  width:64px;flex:none;padding:8px;border:1px solid var(--line);border-radius:6px;background:#fff;font-weight:700;
  font-family:'Barlow Condensed',sans-serif;text-align:center;color:var(--navy);
}
.order-row .order-text{font-size:.9rem;}
.order-cats{display:flex;gap:8px;flex-wrap:wrap;margin:6px 0 16px;}
.order-cats span{
  font-family:'Barlow Condensed',sans-serif;font-size:.66rem;text-transform:uppercase;letter-spacing:.1em;font-weight:700;
  background:var(--navy);color:var(--gold-light);padding:4px 10px;border-radius:4px;
}

/* nav buttons */
.nav-row{display:flex;justify-content:space-between;align-items:center;margin-top:26px;}
.nav-row .right{display:flex;gap:10px;}

/* intro / overview */
.intro-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-top:24px;}
.intro-card{
  background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;
  display:flex;gap:14px;align-items:flex-start;
}
.intro-card .num{
  font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--gold);flex:none;width:40px;
}
.intro-card h4{font-size:1.05rem;margin-bottom:4px;}
.intro-card p{font-size:.82rem;color:var(--ink-soft);margin:0;}

/* ===================== RESULTS ===================== */
.results-wrap{max-width:920px;margin:0 auto;}
.cred-stamp{
  display:flex;justify-content:center;margin:6px 0 28px;
}
.stamp{
  width:190px;height:190px;border-radius:50%;border:3px double var(--gold);position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  background:radial-gradient(circle,#fff,var(--cream) 80%);box-shadow:var(--shadow);
}
.stamp .stamp-lvl{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:1.5rem;color:var(--navy);line-height:1.1;padding:0 18px;}
.stamp .stamp-sub{font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.16em;font-size:.6rem;color:var(--gold);margin-top:6px;font-weight:700;}
.stamp .stamp-score{font-family:'Cormorant Garamond',serif;font-weight:700;font-size:2.6rem;color:var(--gold);margin-top:2px;}
.results-head{text-align:center;margin-bottom:8px;}
.results-head h2{font-size:2.1rem;}
.results-head .sub{color:var(--ink-soft);font-size:.9rem;margin-top:4px;}

.cat-table{width:100%;border-collapse:collapse;margin:22px 0;}
.cat-table th{
  text-align:left;font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.1em;
  font-size:.68rem;color:var(--navy-3);padding:8px 10px;border-bottom:2px solid var(--navy);
}
.cat-table td{padding:10px 10px;border-bottom:1px solid var(--line);font-size:.86rem;vertical-align:middle;}
.cat-table .catbar{background:var(--cream-deep);border-radius:6px;height:8px;overflow:hidden;width:160px;}
.cat-table .catbar>i{display:block;height:100%;border-radius:6px;}
.tagpill{
  font-family:'Barlow Condensed',sans-serif;text-transform:uppercase;letter-spacing:.08em;font-size:.66rem;font-weight:700;
  padding:3px 9px;border-radius:5px;display:inline-block;
}
.tagpill.ok{background:var(--ok-bg);color:var(--ok);}
.tagpill.mid{background:var(--mid-bg);color:var(--mid);}
.tagpill.warn{background:var(--warn-bg);color:var(--warn);}

.feedback-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px;}
.fb-block{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;}
.fb-block h3{font-size:1.15rem;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.fb-block ul{margin:0;padding-left:18px;font-size:.85rem;color:var(--ink-soft);}
.fb-block ul li{margin-bottom:6px;}
.fb-block.full{grid-column:1/-1;}
.rec-box{
  margin-top:18px;padding:18px 20px;border-radius:var(--radius);background:var(--navy);color:#eef2f8;
}
.rec-box h3{color:var(--gold-light);font-size:1.15rem;margin-bottom:8px;}
.rec-box p{font-size:.9rem;margin:0;}

.results-actions{display:flex;justify-content:center;gap:12px;margin:28px 0 6px;}

/* print */
/* ===================== SECTION COVER ===================== */
.sec-cover{
  min-height:calc(100vh - 40px);display:flex;flex-direction:column;
  padding:0;
}
.sc-top{
  display:flex;align-items:center;gap:14px;
  padding:28px 36px 0;
}
.sc-progress-strip{
  display:flex;gap:6px;align-items:center;
}
.sc-pip{
  width:28px;height:3px;border-radius:2px;
  background:var(--line);transition:background .2s;
}
.sc-pip.past{background:var(--gold);opacity:.5;}
.sc-pip.active{background:var(--gold);width:44px;}
.sc-step{
  font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.18em;color:var(--ink-soft);
  margin-left:4px;
}
.sc-body{
  flex:1;display:flex;flex-direction:column;
  justify-content:center;align-items:flex-start;
  padding:48px 36px 60px;
  max-width:680px;
}
.sc-icon{
  font-size:2.8rem;line-height:1;color:var(--gold);
  margin-bottom:24px;opacity:.85;
  font-family:'Cormorant Garamond',serif;
}
.sc-eyebrow{
  font-family:'Barlow Condensed',sans-serif;font-size:.72rem;font-weight:600;
  text-transform:uppercase;letter-spacing:.2em;color:var(--gold);
  margin-bottom:10px;
}

    {id:'e05', context:"Un cliente molesto por la demora de su caso pide hablar con un abogado. El agente, para calmarlo, le dice 'claro, le agendo una llamada con el área legal para mañana a las 10am' y cuelga sin avisar a nadie más.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no aplicó la metodología VDPC completa antes de ofrecer algo. Política incumplida: VDPC es obligatorio para clientes molestos. Acción correcta: validar, disculparse, dar el puente y cerrar antes de ofrecer cualquier solución.',
      'Error: ofreció y agendó una callback sin autorización previa del TL. Acción correcta: notificar al TL, esperar su autorización y solo entonces ofrecer o agendar la callback.',
      "Error: no documentó la molestia del cliente en TramCase. Política incumplida: 'lo que no está documentado no existe'. Acción correcta: dejar nota detallada de la molestia.",
      'Error: no verificó el estatus del caso en USCIS antes de ofrecer la llamada. Política incumplida: verificar siempre en USCIS antes de informar. Acción correcta: revisar USCIS antes de prometer cualquier seguimiento.'
    ], correct:1},
    {id:'e06', context:"Durante un proceso de cancelación, el cliente pregunta cuándo recibirá su reembolso. El agente, queriendo tranquilizarlo, le dice 'un asesor le llamará el viernes a las 4pm para darle el detalle del reembolso' sin haber escalado nada todavía.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: contuvo al cliente por más de 2 minutos antes de escalar. Política incumplida: tiempo máximo de contención de 2 minutos en cancelaciones. Acción correcta: escalar al formulario de Cancelaciones tras 2 minutos de contención.',
      "Error: dio información sobre montos de reembolso sin verificar la nota 'CASE CANCELED'. Política incumplida: nunca dar montos ni tiempos sin esa nota previa. Acción correcta: verificar la nota antes de hablar de montos.",
      'Error: comprometió una fecha y hora específica de callback sin autorización del TL ni escalación previa. Acción correcta: informar que un área especializada se comunicará, sin comprometer fecha/hora, y escalar por el formulario de Cancelaciones.',
      "Error: no usó la frase 'Esa información se le dará en la llamada que va a recibir'. Política incumplida: frase estándar para preguntas sobre montos/tiempos. Acción correcta: usar esa frase exacta."
    ], correct:2},
    {id:'e07', context:"Un cliente ansioso pregunta si su I-360 va a ser aprobada. El agente, queriendo darle confianza, le responde: 'No se preocupe, su caso va a salir aprobado pronto, ya casi sale.'", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: prometió un resultado (aprobación) al cliente. Acción correcta: usar frases de cierre que transmitan confianza y acompañamiento, sin garantizar la aprobación ni los tiempos.',
      'Error: no verificó el estatus en USCIS antes de responder. Política incumplida: verificar siempre el estatus antes de informar. Acción correcta: revisar USCIS y TramCase antes de responder cualquier pregunta sobre el caso.',
      'Error: no usó la metodología VDPC porque el cliente no estaba molesto. Política incumplida: VDPC solo aplica a clientes molestos. Acción correcta: ninguna acción adicional, VDPC no era necesario aquí.',
      'Error: no escaló la pregunta a Back Office. Política incumplida: toda pregunta sobre aprobaciones debe escalarse. Acción correcta: escalar a Back Office la pregunta del cliente.'
    ], correct:0},
    {id:'e08', context:"Un cliente preocupado por los cambios en VAWA pregunta si su caso seguirá adelante. El agente responde: 'Le garantizo al 100% que su VAWA será aprobada, porque la abogada tiene más de 14 años de experiencia y nunca pierde un caso.'", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no compartió el video de referencia de la abogada en Facebook. Política incumplida: compartir el video si el cliente lo requiere. Acción correcta: enviar el enlace del video al cliente.',
      "Error: no registró el Reason of Call como 'Trump questions'. Política incumplida: estructura del Registro de llamadas. Acción correcta: registrar ese Reason of Call.",
      "Error: no mencionó la frase 'afortunadamente' adaptada a la etapa del caso. Política incumplida: guion de contención de la sección de Trump/VAWA. Acción correcta: adaptar la frase 'afortunadamente' según la etapa del caso del cliente.",
      "Error: convirtió un mensaje de confianza/contención en una garantía absoluta de aprobación. Acción correcta: usar el guion de contención (mencionar la experiencia de la abogada y casos previos) sin garantizar el resultado del caso."
    ], correct:3},
    {id:'e09', context:"El cliente dice que quiere ponerse al corriente con su mensualidad de $150 USD. El agente, en lugar de leer la fraseología exacta, improvisa: '¿Le parece si le hago el cobro de los $150?' El cliente responde 'sí' y el agente procesa el cargo.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no verificó si el cliente tiene un agente de Collections asignado. Política incumplida: verificar agente de Collections antes de cualquier cobro. Acción correcta: preguntar si tiene agente y, de ser así, escalar al formulario de Collections.',
      'Error: usó una versión improvisada de la fraseología en lugar de leerla textualmente. Política incumplida: la fraseología de autorización debe leerse word-for-word sin parafrasear. Acción correcta: leer la fraseología exacta obligatoria completa y esperar el sí explícito antes de procesar el cobro.',
      'Error: no envió el comprobante por mensaje de texto al cliente. Política incumplida: las 3 acciones post-cobro son obligatorias. Acción correcta: enviar el comprobante por TramCase y esperar confirmación de recibido.',
      'Error: no llenó correctamente el concepto del pago en LawPay. Política incumplida: llenar nombre, monto y concepto. Acción correcta: completar todos los campos de LawPay antes de procesar.'
    ], correct:1},
    {id:'e10', context:'El cliente autoriza verbalmente un cobro de $100 USD para su mensualidad. El agente, al llenar LawPay, ingresa por error $150 USD y procesa el cobro sin volver a confirmar con el cliente.', prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no copió el comprobante de pago ni lo dejó registrado en las notas de TramCase. Política incumplida: las 3 acciones post-cobro son obligatorias en todos los casos. Acción correcta: copiar el comprobante y dejarlo registrado antes de continuar.',
      'Error: no preguntó si el cliente tenía agente de Collections. Política incumplida: verificación previa de Collections. Acción correcta: preguntar antes de cualquier cobro.',
      'Error: procesó un monto distinto al autorizado verbalmente por el cliente. Acción correcta: corregir el monto en LawPay antes de procesar, y si ya se procesó, detenerse, informar al cliente y escalar para corregir el cobro.',
      "Error: no usó la palabra 'mensualidad' en la fraseología. Política incumplida: fraseología exacta de autorización. Acción correcta: usar la palabra exacta 'mensualidad' o 'pago mensual'."
    ], correct:2},
    {id:'e11', context:"Un cliente llama por tercera vez en el mes preguntando lo mismo sobre su estatus. Dice 'la semana pasada ya me explicaron esto, pero quiero confirmar otra vez'. El agente, sin revisar las notas previas, vuelve a explicar todo desde cero y no marca nada especial en el Registro de llamadas.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no revisó las notas previas en TramCase antes de atender la llamada, lo que generó que el cliente recibiera la misma explicación por tercera vez. Política incumplida: revisar siempre las notas internas previas durante los 3 minutos de revisión. Acción correcta: revisar las notas de TramCase antes de responder y marcar en el Registro de llamadas si el cliente llama de forma recurrente por el mismo tema.',
      'Error: no pidió los 3 filtros de seguridad porque el cliente ya había llamado antes. Política incumplida: los filtros se verifican en cada llamada, sin excepción. Acción correcta: pedir los 3 filtros de seguridad nuevamente al inicio de la llamada, sin asumir nada por llamadas previas.',
      'Error: no escaló el caso a Back Office por estar fuera de los tiempos de procesamiento vigentes. Política incumplida: los atrasos se escalan a Back Office mediante Missing Receipt o E-Request. Acción correcta: generar la escalación correspondiente a Back Office.',
      'Error: no ofreció una callback al cliente, a pesar de ser una llamada recurrente sobre el mismo tema. Política incumplida: las callbacks requieren autorización previa del TL. Acción correcta: notificar al TL y, si lo autoriza, ofrecer y agendar la callback.'
    ], correct:0},
    {id:'e12', context:"El agente encuentra en ClickUp una tarea de seguimiento sobre un documento pendiente de un cliente, se la autoasigna y realiza la llamada de inmediato sin consultar las notas de TramCase. El cliente responde molesto: 'ya hablé con alguien ayer y entregué todo, ¿por qué me vuelven a llamar?'.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: se autoasignó la tarea sin revisar primero las notas recientes de TramCase, generando un contacto innecesario que incomodó al cliente. Política incumplida: antes de autoasignarse una tarea de seguimiento, verificar en TramCase si el cliente ya se comunicó. Acción correcta: revisar las notas antes de actuar; si ya resolvió el pendiente, marcar la tarea como Completado sin llamar.',
      "Error: no usó el script de identificación del cliente al inicio de la llamada saliente. Política incumplida: script obligatorio '¿es usted el Sr./Sra. [Nombre]?'. Acción correcta: iniciar siempre con el script de identificación, confirmando que se está hablando con el titular antes de mencionar cualquier detalle.",
      'Error: no consultó al TL antes de autoasignarse la tarea. Política incumplida: cualquier tarea de ClickUp debe ser autorizada por el TL antes de ejecutarse. Acción correcta: consultar siempre al TL para obtener autorización antes de autoasignarse cualquier tarea pendiente.',
      'Error: no documentó la llamada con el título correcto en TramCase después de la llamada fallida. Política incumplida: toda llamada requiere nota en TramCase independientemente del resultado. Acción correcta: registrar la nota con el título correspondiente y marcar el resultado de la llamada.'
    ], correct:0},
    {id:'e13', context:"Durante una llamada por un tema de pago, el cliente menciona de paso: 'la semana pasada me detuvo migración pero ya salí, solo quería preguntar por mi mensualidad'. El agente procesa el pago y continúa la llamada sin mencionar nada más sobre la detención.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no verificó si el cliente tiene un agente de Collections asignado antes de procesar el pago. Política incumplida: la verificación de Collections debe hacerse antes de cualquier cobro. Acción correcta: preguntar por el agente de Collections antes de procesar el pago.',
      "Error: no notificó al TL sobre la mención de una detención, asumiendo que ya no era relevante porque el cliente 'ya salió'. Acción correcta: notificar al TL de inmediato, recopilar la información crítica de la detención y hacer el triple registro, además de continuar con el tema del pago.",
      'Error: no usó la fraseología exacta de autorización de LawPay. Política incumplida: fraseología obligatoria de cobro. Acción correcta: leer la fraseología completa de autorización y esperar la confirmación verbal del cliente antes de procesar cualquier cobro.',
      'Error: no ofreció asistencia adicional al cliente al concluir el tema del pago. Política incumplida: el paso 7 del flujo de 11 pasos exige ofrecer ayuda adicional antes de cerrar. Acción correcta: preguntar si hay algo más en qué pueda ayudar antes de despedirse.'
    ], correct:1},
    {id:'e14', context:"Un cliente informa que tiene una corte migratoria en 48 horas y necesita una copia urgente de su expediente. El agente responde 'está bien, lo voy a anotar' y registra una nota genérica sin escalar nada con prioridad ni pedir los datos del abogado.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no le dijo al cliente que su solicitud de expediente sería revisada antes de finalizar la llamada. Política incumplida: la frase de cierre estándar de File Request es obligatoria. Acción correcta: usar la frase de cierre estándar antes de despedirse.',
      'Error: no preguntó al cliente si deseaba cambiar de abogado, dado el contexto de la solicitud. Política incumplida: existe un guion específico para clientes que mencionan querer cambiar de abogado. Acción correcta: preguntar sobre el posible cambio de abogado antes de continuar.',
      'Error: no recopiló los datos del abogado y la corte ni reportó la solicitud con carácter prioritario dado el plazo de 48 horas. Acción correcta: recopilar los datos del abogado (nombre, teléfono con extensión, correo), el tipo de corte y la fecha; reportar el File Request como prioritario y escalar con el TL.',
      "Error: no verificó si el caso ya contaba con la nota 'CASE CANCELED' antes de continuar con la solicitud. Política incumplida: esta verificación es obligatoria antes de hablar de montos o reembolsos. Acción correcta: verificar esa nota antes de continuar con cualquier respuesta."
    ], correct:2},
    {id:'e15', context:"El cliente pregunta cuánto tiempo más tardará su trámite. El agente, sin abrir la hoja de tiempos de procesamiento, responde de memoria: 'normalmente esto tarda unos 8 meses, no se preocupe'.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: informó un plazo de memoria sin consultar la hoja de tiempos de procesamiento vigente. Acción correcta: revisar la hoja de tiempos durante los 3 minutos de revisión y dar el plazo vigente, no uno aproximado de memoria.',
      'Error: no preguntó el motivo de la llamada antes de responder. Política incumplida: paso 3 del flujo, escuchar el motivo sin asumir. Acción correcta: preguntar el motivo antes de dar cualquier información.',
      'Error: no aplicó VDPC porque el cliente no estaba molesto. Política incumplida: VDPC es solo para clientes molestos. Acción correcta: no era necesario aplicar VDPC en este caso.',
      "Error: no marcó el Reason of Call como 'Needs packet speed up'. Política incumplida: Reason of Call para atrasos. Acción correcta: marcar ese Reason of Call."
    ], correct:0},
    {id:'e16', context:"En una videollamada, el cliente pregunta cuánto falta para que llegue su EAD. Aunque el agente tiene la hoja de tiempos abierta en la ventana izquierda (no compartida), responde directamente de memoria sin consultarla, diciendo 'como unas 5 semanas más'.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: compartió la ventana incorrecta durante la videollamada. Política incumplida: solo se comparte la ventana derecha autorizada. Acción correcta: verificar qué ventana está siendo compartida antes de mostrar información.',
      'Error: respondió un plazo de memoria aunque tenía la hoja de tiempos disponible en pantalla. Política incumplida: consultar siempre la hoja de tiempos vigente antes de informar plazos. Acción correcta: revisarla en la ventana izquierda y dar el plazo real.',
      'Error: no confirmó la conexión de audio y video al inicio. Política incumplida: la verificación técnica inicial es obligatoria en videollamadas. Acción correcta: confirmar audio, video y conexión al inicio de cada videollamada.',
      'Error: no documentó la videollamada en el Drive. Política incumplida: las grabaciones y transcripts quedan en Drive/Meetings. Acción correcta: verificar que la grabación y transcript estén activos.'
    ], correct:1},
    {id:'e17', context:"El agente nota que la fecha del incidente que menciona el cliente no coincide con la registrada en la DCL del caso. Escribe en TramCase: 'El cliente indicó que la declaración tiene errores respecto a la fecha del incidente; se detectó discrepancia en la DCL.'", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no marcó el Reason of Call correcto para este tipo de discrepancias. Política incumplida: la estructura del Registro de llamadas exige un Reason of Call específico y neutral. Acción correcta: usar un Reason of Call neutral relacionado con revisión interna del expediente.',
      'Error: no escaló la discrepancia al área legal de inmediato por teléfono antes de finalizar la llamada con el cliente. Política incumplida: las discrepancias relacionadas con la DCL deben escalarse de forma verbal e inmediata. Acción correcta: llamar al área legal antes de colgar la llamada.',
      "Error: registró en la nota palabras prohibidas ('errores', 'discrepancia') y describió la naturaleza de la diferencia con la DCL. Acción correcta: usar una de las plantillas habilitadas (Opción A u Opción B), con lenguaje neutral, sin detallar la discrepancia, y escalar conforme al proceso.",
      'Error: no le informó al cliente, en ese momento, que su declaración presentaba un error respecto a la fecha mencionada. Política incumplida: transparencia con el cliente sobre el contenido de su expediente. Acción correcta: explicarle al cliente, con detalle, cuál es el error específico detectado en su DCL.'
    ], correct:2},
    {id:'e18', context:"El agente escribe en TramCase: 'Se detecta discrepancia en la DCL: el cliente cambió su versión de los hechos sobre el abuso descrito originalmente. Se notifica al cliente que esto podría afectar su caso.'", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no usó el título correcto de nota para esta llamada inbound, afectando la estructura general del registro. Política incumplida: la estructura de notas exige Reason, Solution, Behavior y CN según corresponda. Acción correcta: usar el título correcto según el motivo real de la llamada.',
      "Error: usó lenguaje prohibido sobre la DCL ('discrepancia', detalles del cambio de versión) e informó al cliente sobre el problema con su declaración. Acción correcta: usar una plantilla neutral habilitada (Opción A o B) sin detalles, sin decir nada al cliente, y escalar conforme al proceso.",
      'Error: no verificó los 3 filtros de seguridad con el cliente antes de continuar con el tema de la DCL. Política incumplida: los candados de seguridad son obligatorios al inicio de cualquier llamada. Acción correcta: verificar los 3 filtros antes de continuar con cualquier tema del caso.',
      'Error: no ofreció asistencia adicional al cliente antes de cerrar la llamada relacionada con su expediente. Política incumplida: el paso 7 del flujo de 11 pasos es obligatorio en toda llamada. Acción correcta: preguntar si hay algo más en qué pueda ayudar antes de despedirse.'
    ], correct:1},
    {id:'e19', context:"El agente identifica que el número que llama corresponde a un cliente de la lista de no contacto, después de pasar los filtros de seguridad y confirmar la información en TramCase. Como 'el cliente insistió y sonaba urgente', el agente continúa la llamada con normalidad y le explica el estatus de su caso en detalle.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: continuó dando información del caso a un cliente en lista de no contacto en lugar de usar el speech de cierre habilitado por Compliance. Acción correcta: cerrar la llamada con el speech habilitado, dejar nota interna y reportar en #compliance-help.',
      'Error: no ofreció una callback al cliente identificado en la lista de no contacto. Política incumplida: las callbacks siempre requieren autorización previa del TL. Acción correcta: notificar al TL y, de autorizarse, ofrecer la callback correspondiente.',
      'Error: no aplicó la metodología VDPC porque el cliente sonaba urgente y no abiertamente molesto. Política incumplida: VDPC se reserva para clientes molestos; en este caso no era el problema principal. Acción correcta: ninguna acción adicional de VDPC era necesaria en este punto.',
      'Error: no verificó el estatus del caso directamente en USCIS antes de comentar cualquier detalle al cliente. Política incumplida: siempre debe verificarse el estatus en USCIS antes de informar al cliente. Acción correcta: revisar USCIS y TramCase antes de dar cualquier información sobre el estatus.'
    ], correct:0},
    {id:'e20', context:"Tras identificar a un cliente de la lista de no contacto y cerrar la llamada con el speech habilitado, el agente le comenta verbalmente al TL lo ocurrido durante la junta de equipo de la tarde, pensando 'ya avisé, no hace falta más'. No se genera ningún reporte adicional.", prompt:'¿Cuál de las siguientes opciones identifica correctamente el error, la política incumplida y la acción correcta?', options:[
      'Error: no dejó nota interna en TramCase indicando que se aplicó el protocolo de cierre con el cliente de la lista de no contacto. Política incumplida: dejar la nota interna correspondiente es obligatorio en todos los casos. Acción correcta: dejar registrada esa nota en TramCase de inmediato.',
      'Error: no usó un tono neutral y cordial durante toda la llamada con el cliente de la lista de no contacto. Política incumplida: mantener un tono neutral es obligatorio en este tipo de llamadas. Acción correcta: revisar y ajustar el tono usado durante la conversación.',
      'Error: no esperó autorización del TL antes de cerrar la llamada con el cliente de la lista de no contacto. Política incumplida: el cierre de este tipo de llamadas requiere autorización previa del TL. Acción correcta: pedir autorización al TL antes de cerrar la llamada.',
      'Error: no levantó el reporte obligatorio en Slack #compliance-help al finalizar la llamada, sustituyéndolo por un comentario informal al TL durante la junta de la tarde. Acción correcta: publicar el reporte en #compliance-help inmediatamente al terminar la llamada, sin sustituirlo por comentarios verbales posteriores.'
    ], correct:3},
  ],
  escalation: [
    {id:'esc01', context:'Un cliente llama para preguntar por qué USCIS no ha respondido. El agente revisa USCIS y TramCase y confirma que el caso está dentro de los tiempos de procesamiento vigentes. El cliente se muestra tranquilo.', correct:['A']},
    {id:'esc02', context:'Un hombre llama diciendo ser el esposo del titular del caso y pregunta amablemente por el estatus. El agente aplica el protocolo de Terceras Personas: no confirma ni niega el caso, lee el aviso de confidencialidad y cierra la llamada indicando que el titular debe comunicarse directamente. El llamante acepta y se despide.', correct:['A']},
    {id:'esc03', context:'Una clienta pregunta por qué su caso sigue "en espera". El agente revisa TramCase y ve que el caso está ON HOLD porque el abusador aún no cumple los 21 años y 3 meses requeridos.', correct:['A']},
    {id:'esc04', context:'Un cliente, preocupado por las noticias sobre inmigración, pregunta si su proceso VAWA seguirá adelante con los cambios de la administración actual. El agente aplica el guion de contención de la Parte 1, mencionando la experiencia de la abogada y la etapa actual del caso.', correct:['A']},
    {id:'esc05', context:'Un cliente con cita de consulta programada para dentro de 5 días llama para solicitar cambiarla a la próxima semana, con más de 12 horas de anticipación.', correct:['C']},
    {id:'esc06', context:'Tras aplicar VDPC durante 2 minutos, un cliente sigue insistiendo en cancelar su servicio y no acepta ninguna alternativa de contención.', correct:['C']},
    {id:'esc07', context:'Al revisar el caso, el agente nota que falta el recibo inicial correspondiente al trámite del cliente, quien presenta un atraso respecto a los tiempos de USCIS.', correct:['C']},
    {id:'esc08', context:'Un cliente cuyo caso aparece como CASO CANCELADO, sin callback ni Discovery Call programados, pregunta si puede retomar algún trámite con la firma.', correct:['C']},
    {id:'esc09', context:'Un cliente cuyo expediente está en la etapa de PACKETS (ensamblado) pide que se agilice porque necesita el documento pronto para una entrevista próxima.', correct:['C']},
    {id:'esc10', context:'Un cliente en proceso activo de revisión con el equipo de RFE de la firma llama para preguntar si ya fueron revisados los documentos que envió hace una semana, y si necesita enviar algo más.', correct:['C']},
    {id:'esc11', context:'Un cliente pregunta detalles sobre una consulta que tiene programada con la abogada y quiere saber si puede agregar un tema adicional a tratar.', correct:['C']},
    {id:'esc12', context:'Un cliente llama fuera del horario habitual de atención de la oficina de CDMX y pregunta si puede pasar a dejar documentos en persona esa misma tarde.', correct:['C']},
    {id:'esc13', context:'El agente identifica que el cliente que llama está en la lista de no contacto. Aplica el speech de cierre habilitado por Compliance, mantiene tono neutral y termina la llamada sin incidentes.', correct:['A','D']},
    {id:'esc14', context:'Un cliente llama para cancelar su cita de consulta programada para HOY, que comienza en menos de 2 horas.', correct:['B']},

  simulator: [
    {id:'sim1', title:'Cita de biometría — I-485 (AOS)', brief:`<h4>Sr. Hernández — Caso I-485 (Adjustment of Status)</h4>
      <p>Un hombre llama al número de la firma. Habla rápido; dice que recibió una carta de "immigration" hace dos días y que no sabe si debe hacer algo. No da más detalles. Tiene un caso de AOS activo con la firma desde hace 11 meses y hay un EAD vigente registrado en el expediente.</p>`,
     questions:[
      {id:'sim1q1', prompt:'¿Cuál es el primer paso del agente al recibir esta llamada?', options:['Preguntar de inmediato sobre la carta para entender qué recibió','Dar el saludo corporativo y verificar los 3 filtros de seguridad antes de cualquier otra acción','Decirle al cliente que espere en línea mientras se revisa su caso en USCIS','Pedirle que llame de nuevo cuando tenga la carta a la mano'], correct:1},
      {id:'sim1q2', prompt:'Durante los 3 minutos de revisión, ¿qué debe verificar el agente en USCIS y TramCase?', options:['Solo si tiene mensualidad pendiente antes de atender la duda','Solo el estatus actual del caso en TramCase, sin revisar USCIS','El tipo de trámite, si hay alguna cita pendiente en USCIS y la hoja de tiempos de procesamiento vigente','Solo si el cliente tiene agente de Collections asignado'], correct:2},
      {id:'sim1q3', prompt:'El agente confirma en USCIS que hay una Biometrics Appointment (I-797C) programada. ¿Cómo comunica esto al cliente?', options:['Explicarle que es una cita rutinaria de huellas y que no hay de qué preocuparse','Indicarle que recibirá instrucciones por correo sin confirmar qué contiene la carta','Informarle que tiene una cita de biometría, orientarlo sobre lo que debe llevar, sin garantizar resultados ni interpretar la carta legalmente','Decirle que si ya recibió la carta es porque su I-485 va a ser aprobada pronto'], correct:2},
      {id:'sim1q4', prompt:'El cliente pregunta: "¿eso quiere decir que mi I-485 va a ser aprobada?" ¿Qué responde el agente?', options:['"Sí, la biometría es el último paso antes de la aprobación"','Transmitir acompañamiento y confianza sin hacer promesas sobre el resultado ni el plazo del trámite','"No le puedo decir nada de eso, tiene que hablar con la abogada"','"Depende de sus antecedentes, pero generalmente sí se aprueba"'], correct:1},
      {id:'sim1q5', prompt:'El cliente también menciona que su EAD expira en 6 semanas. ¿Qué debe hacer el agente?', options:['Ignorarlo, la biometría es el único tema de la llamada','Documentar el dato y escalar al área correspondiente para revisión del estatus de renovación','Decirle que con la biometría programada ya no necesita renovar el EAD','Prometerle que el EAD se renovará automáticamente al hacer la biometría'], correct:1},
      {id:'sim1q6', prompt:'¿Cuál de las siguientes acciones al documentar la llamada sería INCORRECTA?', options:['Indicar en TramCase que el cliente tiene una cita de biometría programada','Registrar el Reason of Call como "Case status — biometrics appointment"','Escribir en la nota: "I-485 aprobada pronto, biometría es el último paso"','Documentar que se orientó al cliente sobre el EAD próximo a vencer'], correct:2},
     ]},
    {id:'sim2', title:'EAD por vencer — AOS pendiente y posible Travel', brief:`<h4>Sra. Torres — Caso I-485 activo, 14 meses desde presentación</h4>
      <p>Una mujer llama a la firma. Dice que su "tarjeta verde" se vence en 21 días y que su jefe ya le pidió el documento actualizado. Quiere saber qué tiene que hacer. En el expediente hay una I-485 presentada hace 14 meses con estatus pending, y un EAD card próximo a vencer.</p>`,
     questions:[
      {id:'sim2q1', prompt:'Al escuchar que el cliente habla de su "tarjeta verde", ¿qué debe hacer el agente primero?', options:['Informarle de inmediato que probablemente tiene un EAD, no una Green Card','Verificar los 3 filtros de seguridad y revisar el tipo de documento exacto en el expediente antes de aclarar cualquier cosa','Pedirle que le envíe una foto del documento por WhatsApp antes de continuar','Decirle que la tarjeta verde y el EAD son lo mismo para no confundirla'], correct:1},
      {id:'sim2q2', prompt:'El agente confirma que es un EAD (no Green Card) que vence en 21 días, con I-485 pendiente. ¿Qué aplica en este escenario?', options:['El cliente debe ir a una oficina de USCIS en persona de inmediato para renovarlo','Si presentó la renovación a tiempo, puede aplicar la extensión automática de 180 días de EAD con I-485 pendiente','Al vencer el EAD, el cliente pierde todos sus derechos de trabajo automáticamente','No hay nada que hacer hasta que USCIS apruebe la I-485'], correct:1},
      {id:'sim2q3', prompt:'La clienta pregunta si puede seguir trabajando mientras espera la renovación. ¿Qué debe hacer el agente?', options:['Confirmarle que sí puede trabajar 180 días adicionales sin necesidad de verificar nada más','Decirle que no puede trabajar hasta que tenga el nuevo EAD en mano','Orientarla sobre la posibilidad de la extensión automática y escalar al área correspondiente para confirmar su caso específico, sin dar garantías','Decirle que hable directamente con USCIS para que le confirmen'], correct:2},
      {id:'sim2q4', prompt:'La clienta está ansiosa y pregunta si hay forma de acelerar el proceso. ¿Cuál es la acción correcta?', options:['Prometerle que el equipo hará todo lo posible para que llegue antes','Escalar la solicitud al área de Back Office documentando la urgencia por el plazo laboral','Decirle que no hay forma de acelerar y que debe esperar','Ofrecerle agendar una llamada con la abogada sin autorización del TL'], correct:1},
      {id:'sim2q5', prompt:'La clienta también menciona que quiere viajar a México el próximo mes para ver a su mamá. ¿Cómo maneja el agente este dato?', options:['Ignorarlo, el tema principal es el EAD','Decirle que puede viajar sin problema porque tiene EAD y Advance Parole','Registrar el dato y documentar que hay un posible Travel Call pendiente de evaluar antes de autorizar el viaje','Decirle de inmediato que no puede viajar mientras tenga la I-485 pendiente'], correct:2},
      {id:'sim2q6', prompt:'¿Cuál de los siguientes Reason of Call representa mejor esta llamada?', options:['"Regular status" sin más detalle','EAD renewal inquiry + expedite request + posible Travel Call pendiente de evaluar','"Needs packet speed up"','"Payment" porque mencionó que su jefe le pidió el documento'], correct:1},
     ]},
    {id:'sim3', title:'Tercero llama — mamá de clienta adulta con caso VAWA', brief:`<h4>Guadalupe Flores — Caso VAWA (I-360) activo</h4>
      <p>Una señora de mayor edad llama a la firma. Habla con urgencia y dice "soy la mamá de Lupita, quiero saber cómo va el caso de mi hija". Explica que su hija le pidió que llamara porque está muy ocupada en el trabajo. En TramCase hay un caso VAWA activo a nombre de Guadalupe Flores.</p>`,
     questions:[
      {id:'sim3q1', prompt:'¿Cuál es el primer paso del agente al recibir esta llamada?', options:['Localizar el caso de Guadalupe Flores en TramCase para preparar la información','Dar el saludo corporativo y pedir datos de identidad a la señora que llama','Preguntar si es la mamá biológica o adoptiva para determinar si puede recibir información','Pedirle el número de cliente para confirmar que existe un caso antes de continuar'], correct:1},
      {id:'sim3q2', prompt:'Una vez que la señora da su nombre, ¿qué debe hacer el agente con la información del caso?', options:['Dar el estatus actual porque es la mamá y es de confianza','Confirmar que hay un caso activo pero no dar ningún detalle por ser un tercero no autorizado','Decir que no puede confirmar si hay un caso porque haría falta el nombre de la titular','Pedirle a la mamá que se identifique con su propio número de cliente'], correct:1},
      {id:'sim3q3', prompt:'La señora insiste: "yo sé que Lupita tiene VAWA, ¿ya va a ser aprobado?" ¿Cómo responde el agente?', options:['Explicarle los tiempos del proceso VAWA ya que ella dice que ya sabe del caso','Leer el aviso de confidencialidad y no confirmar ni negar ningún detalle, aunque el tercero diga que ya sabe','Confirmar que hay un proceso VAWA porque de todas formas ella ya lo sabe','Pedirle que haga una autorización firmada para poder hablar con ella en futuras llamadas'], correct:1},
      {id:'sim3q4', prompt:'La señora se molesta y exige hablar con alguien de mayor rango. ¿Qué debe hacer el agente?', options:['Transferirle la llamada directamente al TL para que él le explique','Aplicar VDPC, explicar empáticamente que el protocolo aplica a todos por igual, y si persiste escalar al TL','Pedir disculpas por no poder ayudar y finalizar la llamada','Darle el número directo de la abogada para que la llame'], correct:1},
      {id:'sim3q5', prompt:'¿Cómo debe documentarse esta llamada en TramCase?', options:['Incoming Call / Case status con el resumen de lo que preguntó la mamá','THIRD-PARTY CALL / CASE INFORMATION REQUEST, indicando que se aplicó el protocolo de confidencialidad','No es necesario documentarla porque no se dio ninguna información','Outgoing Call / Chat Request porque el agente habló más que la señora'], correct:1},
      {id:'sim3q6', prompt:'¿Qué indicaría que el agente manejó INCORRECTAMENTE esta llamada?', options:['Aplicar el aviso de confidencialidad aunque la mamá dijera que ya sabía del caso','Documentar la llamada como tercero sin confirmar el tipo de trámite','Confirmar a la mamá el estatus de la I-360 porque "de todas formas ya lo sabía"','Escalar al TL cuando la mamá se puso molesta'], correct:2},
     ]},
    {id:'sim4', title:'NTA detectada en USCIS.gov — cliente angustiado', brief:`<h4>Sr. Medina — Caso I-485 (AOS) activo</h4>
      <p>Un joven llama muy angustiado. Dice que acaba de revisar el estatus de su caso en USCIS.gov y que vio algo que no entiende: una "NTA". Quiere saber qué significa y si eso quiere decir que lo van a deportar. Tiene un caso de AOS activo con la firma y biometría programada para dentro de 10 días.</p>`,
     questions:[
      {id:'sim4q1', prompt:'El agente debe verificar los filtros de seguridad. El joven dice que no recuerda su número de cliente. ¿Qué hace el agente?', options:['Proceder con la llamada sin los 3 filtros porque el cliente está muy angustiado','Verificar los otros 2 filtros posibles: fecha de nacimiento y teléfono/correo/dirección registrado','Pedirle que cuelgue, busque su número de cliente y vuelva a llamar','Preguntar solo el nombre completo y dar por verificada la identidad'], correct:1},
      {id:'sim4q2', prompt:'Al revisar TramCase, el agente ve una nota de Back Office: "NTA received — referred to Courts and Removal". ¿Qué debe hacer?', options:['Leer la nota al cliente textualmente para que sepa exactamente lo que dice el expediente','Aplicar VDPC y escalar de inmediato al TL, ya que una NTA es una situación de alta prioridad','Explicarle que la NTA no significa deportación para tranquilizarlo','Decirle que seguramente es un error de USCIS y que no se preocupe'], correct:1},
      {id:'sim4q3', prompt:'El cliente pregunta: "¿me van a deportar?" ¿Qué le dice el agente?', options:['"No, las NTA son normales y no significan deportación automática"','"Sí, por eso es importante que actúe rápido"','Transmitir calma y acompañamiento: que el equipo legal revisará la situación, sin interpretar el documento ni hacer promesas','"No le puedo decir nada, tiene que contratar a otro abogado"'], correct:2},
      {id:'sim4q4', prompt:'¿A qué área debe escalarse y por qué?', options:['A Back Office mediante formulario, porque hay un documento de USCIS que requiere seguimiento del área de Courts and Removal','Solo al TL verbalmente, no es necesario ningún formulario','A #compliance-help por Slack porque podría haber información falsa en USCIS','No requiere escalación, el agente puede resolverlo explicando el proceso'], correct:0},
      {id:'sim4q5', prompt:'El cliente menciona que tiene su biometría de I-485 en 10 días. ¿Qué hace el agente con esa información?', options:['Cancelarle la biometría porque si hay NTA, la I-485 ya no proseguirá','Ignorar ese dato, el tema principal es la NTA','Documentar ambos datos y escalarlos al área legal para revisión coordinada, sin tomar decisiones unilaterales sobre la cita','Confirmarle que puede ir a la biometría con toda tranquilidad'], correct:2},
      {id:'sim4q6', prompt:'Al documentar en TramCase, ¿cuál de las siguientes sería un ERROR?', options:['Registrar el Reason of Call como "NTA — urgente"','Incluir que el cliente llamó angustiado por información vista en USCIS.gov','Escribir "cliente en riesgo de deportación por NTA" como conclusión de la nota','Indicar que se escaló al TL y al área de Courts and Removal'], correct:2},
     ]},
    {id:'sim5', title:'Retención — cliente quiere cancelar por dificultad económica', brief:`<h4>Sra. Reyes — Caso I-360 (VAWA) activo, 8 meses</h4>
      <p>Una clienta llama y dice que quiere cancelar su contrato. Explica que perdió su trabajo el mes pasado y ya no puede pagar. Dice que entiende que perderá lo que pagó pero que no le queda otra opción. Su caso de I-360 fue presentado hace 8 meses, con mensualidades al corriente hasta el mes anterior.</p>`,
     questions:[
      {id:'sim5q1', prompt:'La clienta está tranquila y clara en su petición. ¿Cuál es el primer paso del agente?', options:['Empezar de inmediato a tramitar la cancelación porque ya tomó la decisión','Dar el saludo, verificar los filtros de seguridad y escuchar completo el motivo antes de cualquier acción','Decirle que las cancelaciones no son posibles una vez iniciado el proceso','Preguntarle de inmediato si quiere hablar con la abogada antes de decidir'], correct:1},
      {id:'sim5q2', prompt:'¿Cuánto tiempo debe intentar el agente retener a la clienta antes de escalar la cancelación?', options:['El tiempo que sea necesario hasta convencerla','No debe intentar retenerla porque ya tomó la decisión','Máximo 2 minutos de contención con VDPC; si insiste, informar que un área especializada se comunicará','5 minutos, porque el caso lleva menos de 12 meses activo'], correct:2},
      {id:'sim5q3', prompt:'Durante el intento de retención, ¿qué puede ofrecerle el agente?', options:['Un descuento en la mensualidad si decide quedarse','Que un área especializada se comunicará con ella para revisar sus opciones, sin prometer nada específico','Pausar su caso temporalmente sin costo mientras consigue trabajo','Devolverle lo pagado si decide quedarse 3 meses más'], correct:1},
      {id:'sim5q4', prompt:'La clienta insiste en cancelar. ¿Cuál es la acción correcta?', options:['Decirle que hable directamente con la abogada para cancelar','Escalar la solicitud al formulario de Cancelaciones e informar que un área especializada la contactará','Procesar la cancelación desde TramCase directamente','Pedirle que envíe un correo con su solicitud de cancelación por escrito'], correct:1},
      {id:'sim5q5', prompt:'La clienta pregunta cuánto dinero le regresarán. ¿Qué dice el agente?', options:['Calcularle el monto aproximado con base en los meses pagados','Decirle que no va a recibir reembolso porque canceló voluntariamente','Indicarle que esa información se le dará en la llamada que recibirá del área especializada, sin comprometer montos ni plazos','Prometerle que recibirá de regreso todo lo que pagó'], correct:2},
      {id:'sim5q6', prompt:'¿Cuál sería una acción INCORRECTA durante esta llamada?', options:['Aplicar VDPC al inicio para validar la situación de la clienta','Escalar la cancelación al formulario correspondiente','Prometerle que puede retomar el caso sin costo en el futuro si consigue trabajo','Documentar en TramCase la intención de cancelación y el resultado de la contención'], correct:2},
     ]},
    {id:'sim6', title:'Travel Call — cliente llama desde México queriendo volver', brief:`<h4>Sr. Guzmán — Caso I-485 (AOS) con EAD y Advance Parole aprobado</h4>
      <p>Un cliente llama desde México. Dice que viajó hace 3 semanas a visitar a su familia y que ahora quiere regresar. Pregunta cuándo puede cruzar. En su expediente hay un I-485 en proceso, un EAD vigente y un I-131 (Advance Parole) aprobado. El sistema muestra que el cliente tuvo una entrevista con USCIS hace 6 meses por su I-485.</p>`,
     questions:[
      {id:'sim6q1', prompt:'La llamada es desde México. ¿Qué debe verificar el agente al inicio?', options:['Que el cliente tenga todos sus documentos de viaje disponibles antes de continuar','Dar el saludo corporativo y verificar los 3 filtros de seguridad igual que en cualquier otra llamada','Preguntar directamente el motivo del viaje antes de verificar identidad','Transferir de inmediato al TL porque las llamadas internacionales son casos especiales'], correct:1},
      {id:'sim6q2', prompt:'¿Puede este cliente cruzar de regreso con su EAD y Advance Parole aprobado?', options:['Sí, el Advance Parole aprobado le permite entrar sin restricciones','Sí, mientras el EAD esté vigente puede cruzar en cualquier momento','No necesariamente: el contacto previo con USCIS (entrevista de I-485) es una variable que debe evaluarse antes de dar cualquier indicación','No, porque viajó sin notificárselo antes a la firma'], correct:2},
      {id:'sim6q3', prompt:'El cliente pregunta: "¿puedo cruzar mañana?" ¿Qué responde el agente?', options:['"Sí, con su Advance Parole no hay problema"','"No, espérese un mes más para estar seguro"','Explicarle que hay variables en su caso que deben revisarse primero, y que no puede dar una respuesta definitiva sin la evaluación del área de Travel','"Puede cruzar pero existe riesgo de detención"'], correct:2},
      {id:'sim6q4', prompt:'¿Cuál es el paso a seguir operativamente?', options:['Decirle que llame cuando ya esté en la frontera para confirmar','Escalar al TL para que autorice una Travel Call y evalúe el caso antes de que el cliente intente cruzar','Confirmarle que con Advance Parole aprobado puede cruzar sin riesgo','Escalar a #compliance-help porque el cliente viajó sin avisar'], correct:1},
      {id:'sim6q5', prompt:'El cliente dice que tiene que trabajar el lunes y necesita cruzar el viernes. ¿Cómo maneja la urgencia?', options:['Decirle que cruce el viernes y que llame si hay algún problema','Prometerle que el área de Travel lo llamará antes del viernes','Documentar la urgencia de la fecha y escalarla con prioridad al TL, sin comprometer una respuesta antes del viernes','Decirle que la urgencia laboral no es argumento para acelerar el proceso'], correct:2},
      {id:'sim6q6', prompt:'¿Cuál de las siguientes documentaciones en TramCase sería INCORRECTA?', options:['Indicar el EAD vigente, el Advance Parole aprobado y el contacto previo con USCIS','Registrar que el cliente llama desde México y necesita regresar','Escribir "Cliente viajó ilegalmente a México sin permiso de la firma"','Anotar la fecha límite en que necesita cruzar para el seguimiento del área de Travel'], correct:2},
     ]},
    {id:'sim7', title:'Emergencia — retén de ICE durante trayecto activo', brief:`<h4>Cliente con caso VAWA activo — llamada en tiempo real</h4>
      <p>Un cliente llama muy alterado mientras conduce. Dice que hay un retén de ICE adelante en la carretera y que no sabe qué hacer. Habla en voz baja y está visiblemente nervioso. Tiene un caso de VAWA activo con la firma. El agente no conoce aún el estatus migratorio específico del cliente.</p>`,
     questions:[
      {id:'sim7q1', prompt:'El cliente está en pánico. ¿Cuál es la primera acción del agente?', options:['Verificar los 3 filtros de seguridad antes de hacer cualquier otra cosa','Mantener la calma, recordarle que tiene derecho a no responder preguntas y notificar al TL de inmediato','Decirle que se dé la vuelta y evite el retén','Pedirle que espere en línea mientras el agente revisa su expediente'], correct:1},
      {id:'sim7q2', prompt:'¿En qué difiere un retén activo respecto a otras emergencias de ICE?', options:['No difiere, se aplica exactamente el mismo protocolo de triple registro','En un retén activo la prioridad es orientar al cliente sobre sus derechos en tiempo real sin colgar, y el TL debe notificarse mientras el cliente sigue en línea','Es menos urgente que una detención porque el cliente aún no ha sido detenido','Solo aplica el protocolo si el cliente tiene documentos vencidos'], correct:1},
      {id:'sim7q3', prompt:'El cliente pregunta: "¿si me hablan, qué les digo?" ¿Qué responde el agente?', options:['Decirle que muestre su EAD y Advance Parole si los tiene','Informarle que tiene derecho a no responder preguntas sobre su estatus migratorio y que puede pedir hablar con un abogado','Decirle que diga que es ciudadano para evitar problemas','Decirle que coopere con las autoridades para que todo salga bien'], correct:1},
      {id:'sim7q4', prompt:'El TL fue notificado. ¿Qué hace el agente mientras espera?', options:['Colgar para que el TL maneje el caso directamente','Poner al cliente en espera para coordinar con el TL','Mantener al cliente en línea, seguir orientándolo con calma y sin colgar hasta que el TL tome el caso','Decirle al cliente que llame de nuevo una vez que pase el retén'], correct:2},
      {id:'sim7q5', prompt:'El cliente pasa el retén sin incidentes. ¿Cómo procede el agente?', options:['Cerrar la llamada porque ya pasó la emergencia','Documentar la situación en TramCase, registrarla en el Registro de llamadas → Emergencias, y notificar al TL del cierre','No documentar porque el cliente no fue detenido','Decirle al cliente que todo está bien y que no hay nada que reportar'], correct:1},
      {id:'sim7q6', prompt:'¿Qué clasificación en el Registro de llamadas → Emergencias corresponde a este incidente?', options:['Detained — porque el cliente pudo haber sido detenido','ICE Call / ICE Checkpoint — la situación fue un retén activo en tiempo real','Fraud — porque podría ser un operativo de ICE fraudulento','Regular status — porque el cliente no fue detenido finalmente'], correct:1},
     ]},
    {id:'sim8', title:'File Request urgente — audiencia en 4 días con abogado externo', brief:`<h4>Sr. Castro — Caso AOS (I-485) activo</h4>
      <p>Un hombre llama diciendo que necesita su expediente completo con urgencia. Explica que contrató a un abogado externo porque tiene una audiencia en corte migratoria en 4 días. El expediente en TramCase muestra un caso de AOS activo con varios documentos, pero no hay nota previa indicando que el cliente notificó sobre el abogado externo.</p>`,
     questions:[
      {id:'sim8q1', prompt:'El cliente pide el expediente completo de inmediato. ¿Cuál es el primer paso?', options:['Enviárselo de inmediato porque la audiencia en 4 días es urgente','Verificar los 3 filtros de seguridad y revisar el expediente en TramCase antes de cualquier acción','Decirle que envíe un correo firmado solicitando el expediente','Informarle de inmediato que no se pueden enviar expedientes a abogados externos'], correct:1},
      {id:'sim8q2', prompt:'El cliente menciona que tiene un abogado externo. ¿Qué implica esto para el proceso?', options:['Nada, el expediente puede enviarse directamente al abogado','Cualquier envío a un abogado externo requiere aprobación previa de la firma, independientemente de la urgencia','El cliente puede pasarle el expediente directamente al abogado desde su cuenta personal','Significa que el caso debe cancelarse antes de hacer cualquier envío'], correct:1},
      {id:'sim8q3', prompt:'Dado el plazo de 4 días, ¿cómo debe escalarse esta solicitud?', options:['Como File Request regular, sin marcar urgencia especial','Al TL de inmediato con prioridad alta por la fecha de corte, recopilando datos del abogado externo (nombre, teléfono con extensión, correo)','Directamente a #compliance-help porque hay un abogado externo involucrado','Esperar al ciclo mensual de revisión de file requests'], correct:1},
      {id:'sim8q4', prompt:'El cliente pregunta: "¿me lo pueden mandar hoy mismo?" ¿Qué dice el agente?', options:['"Sí, lo mandamos en las próximas horas"','"No, los expedientes tardan al menos una semana"','Informarle que se escalará con prioridad máxima por la fecha de corte, sin comprometer una fecha específica de entrega','"Eso lo tiene que pedir por escrito a la abogada directamente"'], correct:2},
      {id:'sim8q5', prompt:'¿Qué datos del abogado externo debe recopilar el agente?', options:['Solo el nombre del abogado','Nombre completo, teléfono con extensión y correo del abogado de corte, más la fecha y tipo de audiencia','Solo el número de barra (Bar Number) del abogado externo','No es necesario recopilar datos del abogado, solo la fecha de corte'], correct:1},
      {id:'sim8q6', prompt:'¿Qué nivel de escalación adicional activa la mención del abogado externo?', options:['CRITICAL — al TL sin colgar la llamada','Ninguno, es un trámite rutinario','HIGH — requiere aprobación de MGM/Wendy antes de enviar cualquier documento al abogado externo','Solo a #compliance-help, no al TL'], correct:2},
     ]},
    {id:'sim9', title:'Fraude externo — cliente pagó a falso "USCIS"', brief:`<h4>Sra. Vargas — Caso VAWA activo</h4>
      <p>Una clienta llama muy alterada. Dice que ayer recibió una llamada de alguien que se identificó como oficial de USCIS. Le dijeron que tenía una "multa de inmigración" por no actualizar su dirección y que si no pagaba $600 en tarjetas de regalo en 2 horas, sería deportada. Ella pagó. Tiene un caso de VAWA activo con la firma.</p>`,
     questions:[
      {id:'sim9q1', prompt:'La clienta está muy alterada. ¿Cuál es el primer paso del agente?', options:['Preguntarle de inmediato el número del que la llamaron','Dar el saludo corporativo, verificar los 3 filtros de seguridad y escuchar completo el relato antes de actuar','Decirle que USCIS nunca llama, así que fue un fraude obvio','Pedirle el número del estafador para reportarlo a las autoridades'], correct:1},
      {id:'sim9q2', prompt:'Tras escuchar la situación, ¿cuál es la acción operativa inmediata?', options:['Decirle que llame a su banco para intentar recuperar el dinero','Aconsejarle que llame a la policía de inmediato','Iniciar el protocolo de fraude: documentar los detalles, notificar al TL y registrar en Emergencias → Fraud','Consultar con la abogada antes de hacer cualquier cosa'], correct:2},
      {id:'sim9q3', prompt:'La clienta pregunta: "¿USCIS puede llamarme para cobrarme?" ¿Qué responde el agente?', options:['"Sí, en casos especiales USCIS puede llamar para cobros"','"USCIS nunca llama para exigir pagos, especialmente en tarjetas de regalo; fue una estafa"','"Depende del tipo de trámite que tenga"','"No le puedo decir eso, consulte directamente con USCIS"'], correct:1},
      {id:'sim9q4', prompt:'La clienta pregunta: "¿me pueden devolver mi dinero?" ¿Qué dice el agente?', options:['"Vamos a hacer todo lo posible para recuperarlo"','"Sí, la firma le va a reembolsar los $600"','Explicarle que la firma no puede garantizarle la devolución, orientarla sobre posibles pasos (banco, FTC), sin hacer promesas','"Si lo pagó en tarjetas de regalo, ya no hay nada que hacer"'], correct:2},
      {id:'sim9q5', prompt:'¿Qué debe enviarle el agente a la clienta al finalizar la llamada?', options:['El número directo de la abogada para que la llame','Los contactos y redes sociales oficiales de la firma por mensaje de texto, para que sepa cómo identificar contactos legítimos','Un formulario de queja ante USCIS','No es necesario enviar nada, basta con documentar el caso'], correct:1},
      {id:'sim9q6', prompt:'¿Cuál de las siguientes frases NO debe decir el agente?', options:['"Vamos a registrar esta situación para darle seguimiento"','"Fue una estafa; USCIS no opera así"','"Le garantizo que recuperará su dinero porque tenemos contactos en el gobierno"','\"Le voy a pasar los contactos oficiales de la firma para que siempre sepa con quién está hablando\"'], correct:2},
     ]},
    {id:'sim10', title:'Entrevista de I-485 en 12 días — cliente con múltiples preguntas', brief:`<h4>Sr. Jiménez — Caso AOS (I-485) activo, entrevista próxima</h4>
      <p>Un cliente llama nervioso. Dice que tiene su entrevista de I-485 programada para dentro de 12 días y tiene muchas preguntas: qué documentos llevar, si puede ir con su esposa, si le van a preguntar sobre su trabajo anterior, y si la abogada ya sabe que la entrevista es con él. En TramCase hay una nota reciente de Back Office indicando que se preparó el paquete de entrevista.</p>`,
     questions:[
      {id:'sim10q1', prompt:'El cliente tiene muchas preguntas. ¿Cuál es el primer paso?', options:['Responder todas las preguntas en orden para no interrumpirlo','Dar el saludo corporativo, verificar los 3 filtros de seguridad y revisar el caso durante los 3 minutos antes de responder cualquier pregunta','Decirle que para preguntas de entrevista debe hablar directamente con la abogada','Transferirlo de inmediato al TL porque la entrevista es en 12 días'], correct:1},
      {id:'sim10q2', prompt:'El cliente pregunta qué documentos debe llevar. ¿Qué hace el agente?', options:['Dar la lista completa de documentos típicos para una entrevista de I-485','Decirle que no tiene que llevar nada porque la abogada llevará todo','Orientarlo sobre los documentos básicos sin hacer promesas y confirmar que Back Office ya preparó el paquete de entrevista','Decirle que esa pregunta solo la puede contestar la abogada'], correct:2},
      {id:'sim10q3', prompt:'El cliente pregunta si puede ir acompañado de su esposa. ¿Qué hace el agente?', options:['Confirmarle que sí puede llevar a su esposa sin ningún problema','Decirle que no, las entrevistas siempre son individuales','Indicarle que esa es parte de la preparación legal y que el equipo le confirmará los detalles antes de la entrevista','Preguntarle si su esposa está incluida como beneficiaria en el mismo caso'], correct:2},
      {id:'sim10q4', prompt:'El cliente pregunta: "¿la abogada ya sabe que mi entrevista es conmigo?" ¿Cómo responde el agente?', options:['Confirmarle que sí, la abogada ya está enterada de todo','Decirle que no, que llame directamente a la abogada para confirmarlo','Revisar si hay nota de coordinación en TramCase y, si no la hay, escalar al área correspondiente para verificar y confirmar la coordinación antes de la entrevista','Decirle que no se preocupe, que la abogada siempre está preparada'], correct:2},
      {id:'sim10q5', prompt:'El cliente sigue ansioso y pregunta: "¿qué pasa si no me aprueban en la entrevista?" ¿Qué dice el agente?', options:['"Normalmente las entrevistas salen bien si se prepararon bien"','"Si no aprueban, tendrán que iniciar el proceso de remoción"','Aplicar VDPC, transmitir confianza y acompañamiento sin prometer resultados, y reiterar que el equipo está trabajando en su preparación','"Eso es una pregunta legal, no le puedo responder"'], correct:2},
      {id:'sim10q6', prompt:'Al cerrar la llamada, ¿cuál es la acción final correcta del agente?', options:['Prometerle que todo saldrá bien en la entrevista','Documentar en TramCase todos los temas tratados y la escalación de la coordinación con el equipo legal, y ofrecer asistencia adicional','Decirle que llame de nuevo el día antes de la entrevista','Transferirlo al TL para que él haga el cierre de la llamada'], correct:1},
     ]},
  ],

    {id:'n15', context:'El cliente, que ya tiene conocimiento de una NTA porque la vio en la página de USCIS, solicita el documento. El agente lo trata como File Request: pregunta el motivo de manera discreta, no promete fechas ni envío, y escala al área de File Request para aprobación (no a Callbacks, por tratarse de NTA).', prompt:'Construye la nota correcta en TramCase seleccionando cada campo.', fields:[

      {label:'Reason', options:['Cliente, con conocimiento previo de una NTA por la página de USCIS, solicita el documento','Cliente reporta no tener conocimiento de ningún documento de USCIS','Cliente solicita información sobre un RFE que no conoce','Cliente solicita una callback con el área legal por su NTA'], correct:0},
      {label:'Solution', options:['Se trató como File Request: se preguntó el motivo de manera discreta sin prometer fechas ni envío, y se escaló al área de File Request para aprobación (no a Callbacks, por tratarse de NTA)','Se confirmó y amplió la información que el cliente vio en USCIS sobre su NTA','Se escaló a Callbacks como cualquier otro documento legal','Se le envió el documento de inmediato por correo electrónico'], correct:0},
