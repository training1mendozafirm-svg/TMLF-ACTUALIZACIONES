<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DIRECTORIO TMLF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:    #07111c;
  --navy2:   #0c1e30;
  --navy3:   #122540;
  --navy4:   #1a3354;
  --gold:    #c9a84c;
  --gold2:   #e2c06a;
  --gold-dim: rgba(201,168,76,.09);
  --gold-mid: rgba(201,168,76,.22);
  --gold-str: rgba(201,168,76,.55);
  --white:   #ffffff;
  --bg:      #f4f4f0;
  --ink:     #1a1a18;
  --muted:   #6b6b66;
  --border:  #e4e2da;
  --card:    #ffffff;
  --shadow:  0 2px 8px rgba(15,25,35,.07), 0 8px 28px rgba(15,25,35,.05);
  --r: 14px;

  --l1: #26215C; --l2: #0C447C; --l3: #085041;
  --l4: #3B6D11; --l5: #854F0B; --l6: #993556; --l7: #5F5E5A;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
}

/* ══ TOP NAV ══ */
.topnav {
  position: sticky; top: 0; z-index: 100;
  height: 58px;
  background: rgba(7,17,28,.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(201,168,76,.14);
  display: flex; align-items: center;
  padding: 0 24px; gap: 14px;
  box-shadow: 0 1px 0 rgba(201,168,76,.07), 0 4px 20px rgba(0,0,0,.18);
}

.brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 20px; font-weight: 700;
  color: var(--white);
  display: flex; align-items: center; gap: 12px;
  letter-spacing: .4px;
}
.brand .emblem {
  width: 34px; height: 34px; border-radius: 10px;
  background: linear-gradient(135deg, rgba(201,168,76,.28), rgba(201,168,76,.07));
  border: 1px solid rgba(201,168,76,.32);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
  box-shadow: 0 2px 8px rgba(201,168,76,.12);
}
.brand em { color: var(--gold); font-style: normal; }

.nav-chip {
  margin-left: auto;
  display: flex; align-items: center; gap: 7px;
  padding: 6px 16px; border-radius: 999px;
  font-size: 9.5px; font-weight: 700;
  letter-spacing: .8px; text-transform: uppercase;
  background: rgba(201,168,76,.10);
  border: 1px solid rgba(201,168,76,.24);
  color: var(--gold);
}
.nav-chip .dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--gold);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ══ SEARCH BAR ══ */
.search-wrap {
  background: rgba(7,17,28,.97);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 12px 24px 14px;
  border-bottom: 1px solid rgba(201,168,76,.08);
  position: sticky; top: 58px; z-index: 99;
}

.search-inner {
  max-width: 600px; margin: 0 auto;
  position: relative;
}
.search-icon {
  position: absolute; left: 14px; top: 50%;
  transform: translateY(-50%);
  color: rgba(255,255,255,.3);
  font-size: 15px; pointer-events: none;
}
#search {
  width: 100%;
  padding: 11px 16px 11px 40px;
  font-size: 14px; font-family: 'DM Sans', sans-serif;
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(201,168,76,.18);
  border-radius: 12px;
  color: var(--white);
  outline: none;
  transition: border-color .2s, background .2s;
}
#search::placeholder { color: rgba(255,255,255,.3); }
#search:focus {
  border-color: rgba(201,168,76,.5);
  background: rgba(255,255,255,.1);
}

/* ══ CONTENT ══ */
.content {
  max-width: 680px;
  margin: 0 auto;
  padding: 28px 20px 60px;
}

/* ══ SECTION HEADER ══ */
.section-head {
  display: flex; align-items: center;
  gap: 14px; margin-bottom: 20px;
}
.section-line {
  flex: 1; height: 1.5px;
  background: linear-gradient(90deg, rgba(201,168,76,.5), transparent);
}
.section-line.rev {
  background: linear-gradient(270deg, rgba(201,168,76,.5), transparent);
}
.section-label {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: var(--gold); white-space: nowrap;
}

/* ══ COUNT ══ */
.count {
  font-size: 11px; color: var(--muted);
  font-weight: 500; text-align: center;
  margin-bottom: 14px;
}

/* ══ ACCORDION ══ */
.accordion-list {
  display: flex; flex-direction: column; gap: 7px;
}

.acc-item {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--r);
  overflow: hidden;
  box-shadow: var(--shadow);
  transition: border-color .2s, box-shadow .2s, transform .2s;
}
.acc-item:hover {
  border-color: rgba(12,68,124,.2);
  transform: translateY(-1px);
  box-shadow: 0 4px 20px rgba(15,25,35,.1);
}
.acc-item.open {
  border-color: rgba(201,168,76,.45);
  box-shadow: 0 4px 24px rgba(201,168,76,.12), 0 8px 32px rgba(15,25,35,.08);
  transform: translateY(-1px);
}

/* Gold top accent bar */
.acc-item.open::before {
  content: '';
  display: block;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--gold2), rgba(201,168,76,.2));
  border-radius: var(--r) var(--r) 0 0;
}

.acc-header {
  display: flex; align-items: center; gap: 13px;
  padding: 13px 16px;
  cursor: pointer; user-select: none;
}
.acc-header:hover { background: rgba(12,68,124,.03); }
.acc-item.open .acc-header { background: rgba(201,168,76,.04); }

/* Avatar */
.avatar {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 700;
  flex-shrink: 0;
  transition: transform .2s cubic-bezier(.34,1.56,.64,1);
}
.acc-item.open .avatar { transform: scale(1.08); }

.acc-name-wrap { flex: 1; min-width: 0; }
.name {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px; font-weight: 600;
  line-height: 1.3; color: var(--ink);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.acc-item.open .name { color: var(--navy4); }

.badge {
  display: inline-block;
  font-family: 'DM Sans', sans-serif;
  font-size: 10.5px; font-weight: 700;
  letter-spacing: .4px;
  padding: 2px 10px; border-radius: 999px;
  margin-top: 4px;
}

.chevron {
  font-size: 10px; color: rgba(180,168,140,.6);
  transition: transform .28s cubic-bezier(.34,1.2,.64,1), color .2s;
  flex-shrink: 0;
}
.acc-item.open .chevron {
  transform: rotate(180deg);
  color: var(--gold);
}

/* Accordion body */
.acc-body { max-height: 0; overflow: hidden; transition: max-height .32s ease; }
.acc-item.open .acc-body { max-height: 180px; }

.acc-inner {
  padding: 0 16px 16px;
  border-top: 1px solid rgba(201,168,76,.12);
}

/* Phone row */
.phone-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 0 12px;
  font-size: 13px; color: var(--muted); font-weight: 500;
}
.phone-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: rgba(12,68,124,.07);
  border: 1px solid rgba(12,68,124,.1);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}

/* Buttons */
.actions { display: flex; gap: 8px; }

.btn {
  flex: 1; padding: 9px 0;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600;
  border-radius: 10px; cursor: pointer;
  text-align: center; text-decoration: none;
  display: block; transition: all .18s;
  letter-spacing: .2px;
}
.btn-call {
  background: linear-gradient(135deg, #0C447C, #185FA5);
  color: #fff; border: none;
  box-shadow: 0 2px 10px rgba(12,68,124,.25);
}
.btn-call:hover {
  opacity: .92;
  box-shadow: 0 4px 16px rgba(12,68,124,.35);
  transform: translateY(-1px);
}
.btn-wa {
  background: var(--bg);
  color: var(--ink);
  border: 1px solid var(--border);
}
.btn-wa:hover {
  background: rgba(201,168,76,.08);
  border-color: rgba(201,168,76,.3);
  color: #7a5200;
}

.empty {
  text-align: center; color: var(--muted);
  font-size: 14px; padding: 48px 0;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
}

/* ══ AVATAR + BADGE PALETTE ══ */
.av-0{background:#dce8f9;color:#0C447C}
.av-1{background:#c8ede0;color:#085041}
.av-2{background:#fde8c0;color:#633806}
.av-3{background:#f9d5e4;color:#72243E}
.av-4{background:#e2e0fc;color:#3C3489}
.av-5{background:#fad4d4;color:#791F1F}
.av-6{background:#d9edcc;color:#27500A}
.av-7{background:#fad5c0;color:#712B13}
.av-8{background:#d8eafc;color:#0C447C}
.av-9{background:#e4f9ee;color:#085041}
.av-10{background:#f9e8c2;color:#633806}

.bg-0{background:#B5D4F4;color:#0C447C}
.bg-1{background:#9FE1CB;color:#085041}
.bg-2{background:#FAC775;color:#633806}
.bg-3{background:#F4C0D1;color:#72243E}
.bg-4{background:#CECBF6;color:#3C3489}
.bg-5{background:#F7C1C1;color:#791F1F}
.bg-6{background:#C0DD97;color:#27500A}
.bg-7{background:#F5C4B3;color:#712B13}
.bg-8{background:#B5D4F4;color:#0C447C}
.bg-9{background:#9FE1CB;color:#085041}
.bg-10{background:#FAC775;color:#633806}

/* ══ FOOTER ══ */
footer {
  background: linear-gradient(135deg, #07111c 0%, #0f2236 50%, #1a3a5c 100%);
  margin: 32px 20px 0;
  border-radius: 16px;
  padding: 22px 28px;
  display: flex; align-items: center;
  justify-content: space-between; gap: 16px;
  border: 1px solid rgba(201,168,76,.09);
  box-shadow: 0 8px 28px rgba(7,17,28,.18);
  max-width: 640px; margin: 32px auto 0;
}
.footer-brand {
  font-family: 'Cormorant Garamond', serif;
  font-size: 15px; font-weight: 700;
  color: var(--gold); letter-spacing: .3px;
}
.footer-note {
  font-size: 11px; color: rgba(255,255,255,.35);
  font-weight: 500;
}
</style>
</head>
<body>

<!-- NAV -->
<nav class="topnav">
  <div class="brand">
    <div class="emblem">⚖️</div>
    The Mendoza <em>Law Firm</em>
  </div>
  <div class="nav-chip"><span class="dot"></span>Directorio Interno</div>
</nav>

<!-- STICKY SEARCH -->
<div class="search-wrap">
  <div class="search-inner">
    <span class="search-icon">🔍</span>
    <input id="search" type="text" placeholder="Buscar por nombre, área o número...">
  </div>
</div>

<!-- CONTENT -->
<div class="content">
  <div class="section-head">
    <div class="section-line"></div>
    <div class="section-label">Líderes de Área</div>
    <div class="section-line rev"></div>
  </div>
  <div class="count" id="count"></div>
  <div class="accordion-list" id="list"></div>
</div>

<footer>
  <div class="footer-brand">TMLF · Mendoza Law Firm LLC</div>
  <div class="footer-note">Uso interno exclusivo · 2026</div>
</footer>

<script>
const data = [
  { name: "Misael Raul Moreno",                area: "People",     phone: "56 2101 1940" },
  { name: "Julio Cesar Vargas Dominguez",       area: "PMO",        phone: "624 136 2161" },
  { name: "Juan Carlos Sandoval Villa",         area: "Packets",    phone: "55 4080 1367" },
  { name: "Jessica Berenice Suastegui Alcocer", area: "Packets",    phone: "55 5965 9822" },
  { name: "Brenda Castellanos Garcia",          area: "RFE",        phone: "55 6867 1710" },
  { name: "Horacio Alfonso Orantes Altuzar",    area: "Compliance", phone: "5625752281"   },
  { name: "Itzia Rivera Sodi",                  area: "WAES",       phone: "55 1726 8344" },
  { name: "Raul Escalante Lopez",               area: "Psychology", phone: "55 3703 9860" },
  { name: "Francisco Javier Monroy",            area: "Compliance", phone: "55 3279 7144" },
  { name: "Carlos Antonio Guzman",              area: "Truckers",   phone: "4426106506"   },
  { name: "Victor Eduardo Romo Trujillo",       area: "TI",         phone: "56 2005 2683" },
];

const colorIndex = {};
data.forEach((p,i) => colorIndex[p.name] = i % 11);

function initials(n) {
  return n.split(" ").filter((_,i)=>i<2).map(w=>w[0]).join("").toUpperCase();
}
function cleanPhone(p) { return p.replace(/\s/g,""); }
function sortedAZ(list) { return [...list].sort((a,b)=>a.name.localeCompare(b.name,"es")); }

function render(list) {
  const container = document.getElementById("list");
  const countEl   = document.getElementById("count");
  const sorted    = sortedAZ(list);
  countEl.textContent = sorted.length + (sorted.length===1?" contacto":" contactos");
  if (!sorted.length) {
    container.innerHTML = '<div class="empty">Sin resultados para esa búsqueda.</div>';
    return;
  }
  container.innerHTML = sorted.map(p => {
    const c = colorIndex[p.name];
    const tel = cleanPhone(p.phone);
    const wa  = "https://wa.me/52" + tel;
    return `
    <div class="acc-item">
      <div class="acc-header" onclick="toggle(this)">
        <div class="avatar av-${c}">${initials(p.name)}</div>
        <div class="acc-name-wrap">
          <div class="name">${p.name}</div>
          <span class="badge bg-${c}">${p.area}</span>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="acc-body">
        <div class="acc-inner">
          <div class="phone-row">
            <div class="phone-icon">📱</div>
            ${p.phone}
          </div>
          <div class="actions">
            <a class="btn btn-call" href="tel:${tel}">Llamar</a>
            <a class="btn btn-wa" href="${wa}" target="_blank">WhatsApp ↗</a>
          </div>
        </div>
      </div>
    </div>`;
  }).join("");
}

function toggle(header) {
  const item = header.closest(".acc-item");
  const isOpen = item.classList.contains("open");
  document.querySelectorAll(".acc-item.open").forEach(el => el.classList.remove("open"));
  if (!isOpen) item.classList.add("open");
}

render(data);

document.getElementById("search").addEventListener("input", function(){
  const q = this.value.toLowerCase().trim();
  render(q ? data.filter(p =>
    p.name.toLowerCase().includes(q) ||
    p.area.toLowerCase().includes(q) ||
    p.phone.includes(q)
  ) : data);
});
</script>
</body>
</html>
